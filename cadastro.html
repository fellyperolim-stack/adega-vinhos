<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastrar Vinho | Fellype & Hwlly 🍷</title>
    <meta name="description" content="Registre um novo vinho na adega de Fellype & Hwlly.">
    <meta property="og:title" content="Cadastrar Vinho | Adega Fellype & Hwlly">
    <meta property="og:type" content="website">
    <meta property="og:image" content="https://cdn-icons-png.flaticon.com/512/5821/5821090.png">
    <meta property="og:locale" content="pt_BR">

    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#800020">
    <link rel="icon" type="image/png" href="https://cdn-icons-png.flaticon.com/512/5821/5821090.png">

    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="shared.css">

    <style>
        body { font-family: 'Outfit', sans-serif; }

        /* --- CHAT LAYOUT --- */
        .bg-gradient {
            position: fixed; inset: 0;
            background: radial-gradient(circle at 50% 50%, #140306 0%, #050505 100%);
            z-index: -1;
        }

        .main-wrapper {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: calc(100vh - 70px);
            padding: 20px;
        }

        .chat-card {
            width: 100%;
            max-width: 480px;
            height: 85vh;
            background: rgba(255, 255, 255, 0.04);
            backdrop-filter: blur(28px);
            -webkit-backdrop-filter: blur(28px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 40px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 32px 80px rgba(0, 0, 0, 0.85), 0 0 0 1px rgba(201, 162, 39, 0.06);
            position: relative;
        }

        /* --- MENSAGENS --- */
        .shiba-spotlight {
            background: #fff; border-radius: 20px; padding: 2px;
            display: inline-flex; box-shadow: 0 0 15px rgba(255,255,255,0.1);
            border: 1.5px solid var(--dourado); overflow: hidden;
            justify-content: center; align-items: center;
        }
        .avatar-sm { width: 40px; height: 40px; border-radius: 8px; object-fit: cover; flex-shrink: 0; }
        .zoom-face { transform: scale(1.8); transform-origin: center 20%; }

        .chat-header {
            padding: 15px 25px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            display: flex; align-items: center; gap: 15px;
            background: rgba(0,0,0,0.3);
        }

        .chat-window {
            flex-grow: 1; padding: 25px;
            overflow-y: auto;
            display: flex; flex-direction: column; gap: 18px;
            scrollbar-width: none;
        }

        .msg { max-width: 85%; animation: msgPop 0.3s ease-out; display: flex; align-items: flex-end; gap: 10px; }
        .msg-bot { align-self: flex-start; }
        .msg-user { align-self: flex-end; flex-direction: row-reverse; }

        .bubble {
            padding: 12px 16px; border-radius: 18px;
            font-size: 15px; line-height: 1.5;
            font-family: 'Segoe UI', sans-serif;
        }
        .msg-bot .bubble { background: #fff; color: #050505; border-bottom-left-radius: 4px; }
        .msg-user .bubble { background: var(--vinho-escuro); color: #fff; border-bottom-right-radius: 4px; border: 1px solid rgba(255,255,255,0.1); }

        .msg-success .bubble {
            background: linear-gradient(135deg, #1a4a1a, #1e5e1e);
            color: #90ee90;
            border: 1px solid rgba(144,238,144,0.3);
        }

        /* --- INPUT --- */
        .input-container {
            padding: 20px;
            background: rgba(0,0,0,0.5);
            display: flex; gap: 10px;
        }

        .msg-input {
            flex-grow: 1;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 20px;
            padding: 12px 20px;
            color: white;
            outline: none;
            font-family: 'Segoe UI', sans-serif;
            font-size: 15px;
        }

        .msg-input:focus { border-color: var(--dourado); }

        .send-btn {
            background: var(--dourado);
            width: 45px; height: 45px;
            border-radius: 50%;
            border: none;
            cursor: pointer;
            color: #000;
            font-size: 18px;
            flex-shrink: 0;
            transition: 0.2s;
        }
        .send-btn:hover { background: var(--dourado-claro); transform: scale(1.05); }
        .send-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

        /* --- BOTÃO DESFAZER --- */
        .undo-bar {
            display: none;
            justify-content: flex-end;
            padding: 0 20px 6px;
        }
        .undo-bar.visible { display: flex; }
        .undo-btn {
            background: none;
            border: 1px solid #333;
            color: #666;
            font-size: 0.7rem;
            padding: 4px 10px;
            border-radius: 10px;
            cursor: pointer;
            font-family: 'Segoe UI', sans-serif;
            transition: 0.2s;
        }
        .undo-btn:hover { border-color: var(--dourado); color: var(--dourado); }

        @keyframes msgPop { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* --- MODAL DE AVALIAÇÃO --- */
        dialog {
            border: none;
            background: #0d0d0d;
            border: 1px solid var(--dourado);
            border-radius: 30px;
            padding: 25px;
            width: 95%;
            max-width: 380px;
            color: #fff;
        }
        dialog::backdrop { background: rgba(0,0,0,0.85); backdrop-filter: blur(5px); }

        .btn-gold {
            width: 100%;
            padding: 14px;
            background: var(--dourado);
            border: none;
            border-radius: 12px;
            font-weight: 700;
            cursor: pointer;
            margin-top: 15px;
            text-transform: uppercase;
            font-family: 'Segoe UI', sans-serif;
            font-size: 0.9rem;
            transition: 0.2s;
        }
        .btn-gold:hover { background: var(--dourado-claro); }
        .btn-gold:disabled { opacity: 0.6; cursor: not-allowed; }

        input[type="file"] { display: none; }
        .custom-file-upload {
            display: block; width: 100%; padding: 12px;
            background: rgba(255,255,255,0.05);
            border: 1px dashed var(--dourado);
            border-radius: 10px; text-align: center;
            cursor: pointer; color: var(--dourado);
            font-size: 13px; font-family: 'Segoe UI', sans-serif;
            transition: 0.2s;
        }
        .custom-file-upload:hover { background: rgba(212,175,55,0.1); }

        #preview {
            width: 100%; height: 100px; object-fit: cover;
            border-radius: 10px; margin-top: 10px;
            display: none;
        }

        .modal-label {
            font-size: 10px; color: var(--dourado);
            margin-bottom: 4px; display: block;
            font-family: 'Segoe UI', sans-serif;
            text-transform: uppercase; letter-spacing: 1px;
        }

        .modal-input {
            width: 100%; padding: 10px; border-radius: 10px;
            border: 1px solid #333; background: #1a1a1a;
            color: white; margin-bottom: 5px;
            font-family: 'Segoe UI', sans-serif;
        }
        .modal-input:focus { outline: none; border-color: var(--dourado); }

        /* --- CHIPS DE NOTA EXPANDIDOS --- */
        .nota-chips {
            display: flex; gap: 4px; margin-bottom: 10px;
            overflow-x: auto; padding-bottom: 4px;
            scrollbar-width: none;
        }
        .chip {
            background: rgba(255,255,255,0.05);
            border: 1px solid #444;
            color: #fff; padding: 4px 9px;
            border-radius: 6px; font-size: 11px;
            cursor: pointer; transition: 0.2s;
            white-space: nowrap;
            font-family: 'Segoe UI', sans-serif;
            flex-shrink: 0;
        }
        .chip:hover { border-color: var(--dourado); background: var(--vinho-escuro); }
        .chip.selected { background: var(--dourado); color: #000; border-color: var(--dourado); }

        @media (max-width: 992px) {
            .main-wrapper { padding: 10px; margin-top: 15px; min-height: calc(100vh - 70px); }
            .chat-card { height: 80vh; border-radius: 30px; }
        }
    </style>
</head>
<body>

    <datalist id="lista-paises">
        <option value="Argentina"><option value="Chile"><option value="Itália"><option value="França"><option value="Portugal"><option value="Espanha"><option value="Brasil"><option value="Uruguai"><option value="África do Sul"><option value="Austrália"><option value="Alemanha">
    </datalist>
    <datalist id="lista-uvas">
        <option value="Malbec"><option value="Cabernet Sauvignon"><option value="Merlot"><option value="Chardonnay"><option value="Primitivo"><option value="Sangiovese"><option value="Tempranillo"><option value="Syrah"><option value="Tannat"><option value="Carménère"><option value="Pinot Noir">
    </datalist>
    <datalist id="lista-tipos">
        <option value="Tinto"><option value="Branco"><option value="Rosé"><option value="Espumante"><option value="Sobremesa">
    </datalist>
    <datalist id="lista-classificacao">
        <option value="Seco"><option value="Meio Seco"><option value="Frisante"><option value="Blend"><option value="Doce"><option value="Espumante"><option value="Reserva"><option value="Gran Reserva">
    </datalist>

    <div id="navbar-placeholder"></div>

    <div class="bg-gradient"></div>

    <div class="main-wrapper">
        <div class="chat-card">
            <div id="chat-header" class="chat-header">
                <div id="header-content" style="display:flex; align-items:center; gap:12px; width:100%"></div>
            </div>

            <div id="chat-window" class="chat-window"></div>

            <div class="undo-bar" id="undo-bar">
                <button id="undo-btn" class="undo-btn" onclick="desfazerUltimo()" title="Corrigir última resposta">
                    ↩ Corrigir última resposta
                </button>
            </div>

            <div id="input-container" class="input-container">
                <input type="text" id="userInput" class="msg-input" placeholder="Envie uma mensagem..." autocomplete="off" aria-label="Sua resposta">
                <button class="send-btn" onclick="sendMessage()" aria-label="Enviar">
                    <i class="fas fa-paper-plane" aria-hidden="true"></i>
                </button>
            </div>
        </div>
    </div>

    <dialog id="ratingModal" aria-labelledby="modal-title">
        <h2 id="modal-title" style="font-family:'Cinzel',serif; text-align:center; margin-bottom:20px; color:var(--dourado)">Avaliação Final</h2>
        <div style="display:flex; flex-direction:column; gap:8px">

            <span class="modal-label">Nota Fellype</span>
            <div class="nota-chips" id="chips-fellype">
                <div class="chip" onclick="setNota('notF', '5.0', this)">5.0</div>
                <div class="chip" onclick="setNota('notF', '5.5', this)">5.5</div>
                <div class="chip" onclick="setNota('notF', '6.0', this)">6.0</div>
                <div class="chip" onclick="setNota('notF', '6.5', this)">6.5</div>
                <div class="chip" onclick="setNota('notF', '7.0', this)">7.0</div>
                <div class="chip" onclick="setNota('notF', '7.5', this)">7.5</div>
                <div class="chip" onclick="setNota('notF', '8.0', this)">8.0</div>
                <div class="chip" onclick="setNota('notF', '8.5', this)">8.5</div>
                <div class="chip" onclick="setNota('notF', '9.0', this)">9.0</div>
                <div class="chip" onclick="setNota('notF', '9.5', this)">9.5</div>
                <div class="chip" onclick="setNota('notF', '10', this)">10</div>
            </div>
            <input type="number" id="notF" step="0.5" min="0" max="10" class="modal-input" placeholder="0.0" aria-label="Nota Fellype">

            <span class="modal-label">Nota Hwlly</span>
            <div class="nota-chips" id="chips-hwlly">
                <div class="chip" onclick="setNota('notH', '5.0', this)">5.0</div>
                <div class="chip" onclick="setNota('notH', '5.5', this)">5.5</div>
                <div class="chip" onclick="setNota('notH', '6.0', this)">6.0</div>
                <div class="chip" onclick="setNota('notH', '6.5', this)">6.5</div>
                <div class="chip" onclick="setNota('notH', '7.0', this)">7.0</div>
                <div class="chip" onclick="setNota('notH', '7.5', this)">7.5</div>
                <div class="chip" onclick="setNota('notH', '8.0', this)">8.0</div>
                <div class="chip" onclick="setNota('notH', '8.5', this)">8.5</div>
                <div class="chip" onclick="setNota('notH', '9.0', this)">9.0</div>
                <div class="chip" onclick="setNota('notH', '9.5', this)">9.5</div>
                <div class="chip" onclick="setNota('notH', '10', this)">10</div>
            </div>
            <input type="number" id="notH" step="0.5" min="0" max="10" class="modal-input" placeholder="0.0" aria-label="Nota Hwlly">

            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px; margin-top:5px">
                <div>
                    <span class="modal-label">Voltaria a comprar?</span>
                    <select id="reCompra" class="modal-input"><option value="Sim">Sim</option><option value="Não">Não</option></select>
                </div>
                <div>
                    <span class="modal-label">Data do Consumo</span>
                    <input type="date" id="dataConsumo" class="modal-input">
                </div>
            </div>

            <div>
                <span class="modal-label">Foto do Brinde</span>
                <label class="custom-file-upload">
                    <input type="file" id="fileInput" accept="image/*" onchange="handleFile(event)">
                    <i class="fas fa-camera" aria-hidden="true"></i> Selecionar ou Tirar Foto
                </label>
                <img id="preview" alt="Pré-visualização da foto">
            </div>

            <button id="btnFinalizar" class="btn-gold" onclick="finishAll()">
                Finalizar Brinde 🍷
            </button>
        </div>
    </dialog>

    <div id="footer-placeholder"></div>

    <script src="nav.js"></script>
    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxvM8_kK9_BXLAhhEjdmsAIgofCEjWvw-BcPXx4G1GEXeKkJwILDCkckuvg29FsiHFf/exec";
        const IMG_L = "https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcS-TifEdyk31bue7ksGITNEiUrtAvl4H7_1V_UFojtvIA&s=10";
        const IMG_I = "https://ih1.redbubble.net/image.4410098886.0898/bg,f8f8f8-flat,750x,075,f-pad,750x1000,f8f8f8.jpg";

        let step = 0;
        let dataVinho = {};
        let isValidating = false;
        let base64Image = "";
        let historico = []; // Para o desfazer

        const fluxo = [
            { key: 'wineName',      q: "Qual o nome do rótulo?",                          bot: 'leblonzito', type: 'text' },
            { key: 'produtor',      q: "Quem é o produtor ou vinícola?",                  bot: 'ipanemita',  type: 'text' },
            { key: 'classificacao', q: "Qual a classificação? (Ex: Reserva, Blend...)",   bot: 'leblonzito', type: 'text', list: 'lista-classificacao' },
            { key: 'uva',           q: "Quais as uvas principais?",                       bot: 'ipanemita',  type: 'text', list: 'lista-uvas' },
            { key: 'wineType',      q: "Qual o tipo? (Tinto, Branco, Rosé...)",           bot: 'leblonzito', type: 'text', list: 'lista-tipos' },
            { key: 'year',          q: "Qual a safra (ano)?",                             bot: 'ipanemita',  type: 'number' },
            { key: 'pais',          q: "De qual país ele é?",                             bot: 'leblonzito', type: 'text', list: 'lista-paises' },
            { key: 'regiao',        q: "Qual a região?",                                  bot: 'ipanemita',  type: 'text' },
            { key: 'teor',          q: "Qual o teor alcoólico?",                          bot: 'leblonzito', type: 'text' },
            { key: 'tokenAcesso',   q: "Agora a senha de acesso para salvar:",            bot: 'leblonzito', type: 'password' }
        ];

        window.onload = () => {
            updateHeader('leblonzito');
            addMsg("Olá! Sou o Leblonzito. Vamos registrar esse brinde? " + fluxo[0].q, 'leblonzito');
            document.getElementById('dataConsumo').valueAsDate = new Date();

            const lastPais = localStorage.getItem('last_pais');
            if (lastPais) fluxo.find(f => f.key === 'pais').placeholder = `Último: ${lastPais}`;
        };

        function setNota(id, valor, el) {
            document.getElementById(id).value = valor;
            // Highlight chip selecionado
            const grupo = el.closest('.nota-chips');
            grupo.querySelectorAll('.chip').forEach(c => c.classList.remove('selected'));
            el.classList.add('selected');
        }

        function getAvatarHtml(imgUrl, nome) {
            return `<div class="shiba-spotlight"><img src="${imgUrl}" class="avatar-sm zoom-face" alt="${nome}"></div>`;
        }

        function addMsg(text, type) {
            const win = document.getElementById('chat-window');
            const div = document.createElement('div');
            let avatarHtml = '';

            if (type === 'leblonzito' || type === 'ipanemita') {
                const nome = type === 'leblonzito' ? 'Leblonzito' : 'Ipanemita';
                avatarHtml = getAvatarHtml(type === 'leblonzito' ? IMG_L : IMG_I, nome);
                div.className = 'msg msg-bot';
            } else if (type === 'final') {
                avatarHtml = `<div style="display:flex;">
                    <div class="shiba-spotlight" style="z-index:2; margin-right:-15px">${getAvatarHtml(IMG_L, 'Leblonzito').replace('class="shiba-spotlight"','')}</div>
                    <div class="shiba-spotlight" style="z-index:1">${getAvatarHtml(IMG_I, 'Ipanemita').replace('class="shiba-spotlight"','')}</div>
                  </div>`;
                div.className = 'msg msg-bot';
            } else if (type === 'success') {
                div.className = 'msg msg-bot msg-success';
            } else {
                div.className = 'msg msg-user';
            }

            const displayText = text.replace(/\n/g, '<br>');
            div.innerHTML = (type === 'user')
                ? `<div class="bubble">${displayText}</div>`
                : `${avatarHtml}<div class="bubble">${displayText}</div>`;

            win.appendChild(div);
            win.scrollTop = win.scrollHeight;
        }

        function updateHeader(bot) {
            const head = document.getElementById('header-content');
            if (bot === 'leblonzito') {
                head.innerHTML = `${getAvatarHtml(IMG_L, 'Leblonzito')} <div><div style="font-weight:600; color:var(--dourado); font-family:'Segoe UI',sans-serif;">Leblonzito</div><div style="font-size:10px; opacity:0.6; font-family:'Segoe UI',sans-serif;">Sommelier Online</div></div>`;
            } else if (bot === 'ipanemita') {
                head.innerHTML = `${getAvatarHtml(IMG_I, 'Ipanemita')} <div><div style="font-weight:600; color:#aaa; font-family:'Segoe UI',sans-serif;">Ipanemita</div><div style="font-size:10px; opacity:0.6; font-family:'Segoe UI',sans-serif;">Curadoria Inteligente</div></div>`;
            } else {
                head.innerHTML = `<div style="display:flex; width:100%; justify-content:center; gap:10px;">${getAvatarHtml(IMG_L, 'Leblonzito')}${getAvatarHtml(IMG_I, 'Ipanemita')}</div>`;
            }
        }

        async function sendMessage() {
            if (isValidating) return;
            const input = document.getElementById('userInput');
            let rawMsg = input.value.trim();

            if (rawMsg === "" && step > 0) {
                const currentKey = fluxo[step].key;
                if (currentKey === 'pais') rawMsg = localStorage.getItem('last_pais') || "";
                if (currentKey === 'uva') rawMsg = localStorage.getItem('last_uva') || "";
            }

            const msg = (rawMsg === "" && fluxo[step].key !== 'tokenAcesso') ? "Não informado" : rawMsg;
            if (!rawMsg && fluxo[step].key === 'tokenAcesso') return;

            const displayMsg = (fluxo[step].type === 'password' && rawMsg) ? '••••••••' : (rawMsg || "(pulado)");
            addMsg(displayMsg, 'user');
            input.value = "";

            // Salvar no histórico para desfazer
            historico.push({ step, key: fluxo[step].key, value: msg });
            dataVinho[fluxo[step].key] = msg;

            if (fluxo[step].key === 'pais' && rawMsg) localStorage.setItem('last_pais', rawMsg);
            if (fluxo[step].key === 'uva' && rawMsg) localStorage.setItem('last_uva', rawMsg);

            step++;

            // Mostrar botão desfazer (mas não na senha)
            if (step > 1 && step < fluxo.length) {
                document.getElementById('undo-bar').classList.add('visible');
            }

            if (step < fluxo.length) {
                const nextStep = fluxo[step];
                setTimeout(() => {
                    updateHeader(nextStep.bot);
                    addMsg(nextStep.q, nextStep.bot);
                    input.type = nextStep.type;
                    input.setAttribute('list', nextStep.list || "");
                    input.placeholder = nextStep.placeholder || "Pressione Enter para pular...";
                }, 600);
            } else {
                document.getElementById('undo-bar').classList.remove('visible');
                validarSenhaFinal();
            }
        }

        function desfazerUltimo() {
            if (historico.length <= 1) return;

            const ultimo = historico.pop();
            delete dataVinho[ultimo.key];
            step = ultimo.step;

            // Remover as últimas duas mensagens do chat (resposta do usuário + próxima pergunta do bot)
            const win = document.getElementById('chat-window');
            const msgs = win.querySelectorAll('.msg');
            // Remove a pergunta do step atual e a resposta do usuário
            if (msgs.length >= 2) {
                msgs[msgs.length - 1].remove();
                msgs[msgs.length - 2].remove();
            }

            // Restaurar estado do input
            const currentStep = fluxo[step];
            const input = document.getElementById('userInput');
            input.type = currentStep.type;
            input.setAttribute('list', currentStep.list || "");
            input.placeholder = currentStep.placeholder || "Pressione Enter para pular...";
            updateHeader(currentStep.bot);

            if (step <= 1) document.getElementById('undo-bar').classList.remove('visible');

            input.focus();
        }

        async function validarSenhaFinal() {
            isValidating = true;
            updateHeader('final');
            addMsg("Validando acesso...", 'final');

            try {
                const response = await fetch(SCRIPT_URL, {
                    method: 'POST',
                    body: JSON.stringify({ action: "verificarSenha", senha: dataVinho.tokenAcesso })
                });
                const res = await response.json();
                if (res.result === "success") {
                    isValidating = false;
                    addMsg("Acesso autorizado! Hora de dar as notas e finalizar o brinde. 🍷", 'final');
                    setTimeout(() => { document.getElementById('ratingModal').showModal(); }, 800);
                } else {
                    throw new Error();
                }
            } catch (e) {
                isValidating = false;
                step--;
                addMsg("Senha incorreta. Tente novamente:", 'leblonzito');
                updateHeader('leblonzito');
                document.getElementById('userInput').type = "password";
                document.getElementById('undo-bar').classList.remove('visible');
            }
        }

        function handleFile(event) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                const img = new Image();
                img.onload = function() {
                    const canvas = document.createElement('canvas');
                    const MAX_WIDTH = 800;
                    const scaleSize = MAX_WIDTH / img.width;
                    canvas.width = MAX_WIDTH;
                    canvas.height = img.height * scaleSize;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                    base64Image = canvas.toDataURL('image/jpeg', 0.8);
                    const preview = document.getElementById('preview');
                    preview.src = base64Image;
                    preview.style.display = "block";
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(file);
        }

        async function finishAll() {
            const btn = document.getElementById('btnFinalizar');
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Eternizando Memória...';
            btn.disabled = true;

            const notF_formatada = document.getElementById('notF').value.replace('.', ',');
            const notH_formatada = document.getElementById('notH').value.replace('.', ',');

            const payload = {
                action: "salvarVinho",
                tokenAcesso: dataVinho.tokenAcesso,
                wineName: dataVinho.wineName,
                produtor: dataVinho.produtor,
                classificacao: dataVinho.classificacao,
                uva: dataVinho.uva,
                wineType: dataVinho.wineType,
                year: dataVinho.year,
                pais: dataVinho.pais,
                regiao: dataVinho.regiao,
                teor: dataVinho.teor,
                ratingFellype: notF_formatada,
                ratingHwlly: notH_formatada,
                wouldBuy: document.getElementById('reCompra').value,
                base64Photo: base64Image,
                anoConsumo: document.getElementById('dataConsumo').value
            };

            try {
                await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify(payload) });
                document.getElementById('ratingModal').close();

                // Invalida o cache para que o catálogo carregue com dados frescos
                if (window.clearWineCache) window.clearWineCache();

                // Feedback in-chat em vez de alert()
                updateHeader('final');
                addMsg("🍷 Brinde eternizado com sucesso!\n\nO vinho foi adicionado à nossa adega. Redirecionando para o catálogo...", 'success');

                setTimeout(() => { location.href = "catalogo.html"; }, 2500);

            } catch (e) {
                document.getElementById('ratingModal').close();
                if (window.clearWineCache) window.clearWineCache();
                addMsg("✅ Brinde registrado! Redirecionando...", 'success');
                setTimeout(() => { location.href = "catalogo.html"; }, 2500);
            }
        }

        document.getElementById('userInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMessage();
        });
    </script>
</body>
</html>
