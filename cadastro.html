<html lang="pt-BR">
<head>

    <style>
        body { font-family: 'Outfit', sans-serif; }

        /* --- CHAT LAYOUT --- */
        .bg-gradient {
            position: fixed; inset: 0;
            background: radial-gradient(circle at 50% 50%, #140306 0%, #050505 100%);
            z-index: -1;
        }

        .main-wrapper {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: calc(100vh - 70px);
            padding: 20px;
        }

        .chat-card {
            width: 100%;
            max-width: 480px;
            height: 85vh;
            background: rgba(255, 255, 255, 0.04);
            backdrop-filter: blur(28px);
            -webkit-backdrop-filter: blur(28px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 40px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 32px 80px rgba(0, 0, 0, 0.85), 0 0 0 1px rgba(201, 162, 39, 0.06);
            position: relative;
        }

        /* --- MENSAGENS --- */
        .shiba-spotlight {
            background: #fff; border-radius: 20px; padding: 2px;
            display: inline-flex; box-shadow: 0 0 15px rgba(255,255,255,0.1);
            border: 1.5px solid var(--dourado); overflow: hidden;
            justify-content: center; align-items: center;
        }
        .avatar-sm { width: 40px; height: 40px; border-radius: 8px; object-fit: cover; flex-shrink: 0; }
        .zoom-face { transform: scale(1.8); transform-origin: center 20%; }

        .chat-header {
            padding: 15px 25px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            display: flex; align-items: center; gap: 15px;
            background: rgba(0,0,0,0.3);
        }

        .chat-window {
            flex-grow: 1; padding: 25px;
            overflow-y: auto;
            display: flex; flex-direction: column; gap: 18px;
            scrollbar-width: none;
        }

        .msg { max-width: 85%; animation: msgPop 0.3s ease-out; display: flex; align-items: flex-end; gap: 10px; }
        .msg-bot { align-self: flex-start; }
        .msg-user { align-self: flex-end; flex-direction: row-reverse; }

        .bubble {
            padding: 12px 16px; border-radius: 18px;
            font-size: 15px; line-height: 1.5;
            font-family: 'Segoe UI', sans-serif;
        }
        .msg-bot .bubble { background: #fff; color: #050505; border-bottom-left-radius: 4px; }
        .msg-user .bubble { background: var(--vinho-escuro); color: #fff; border-bottom-right-radius: 4px; border: 1px solid rgba(255,255,255,0.1); }

        .msg-success .bubble {
            background: linear-gradient(135deg, #1a4a1a, #1e5e1e);
            color: #90ee90;
            border: 1px solid rgba(144,238,144,0.3);
        }

        /* --- INPUT --- */
        .input-container {
            padding: 20px;
            background: rgba(0,0,0,0.5);
            display: flex; gap: 10px;
        }

        .msg-input {
            flex-grow: 1;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 20px;
            padding: 12px 20px;
            color: white;
            outline: none;
            font-family: 'Segoe UI', sans-serif;
            font-size: 15px;
        }

        .msg-input:focus { border-color: var(--dourado); }

        .send-btn {
            background: var(--dourado);
            width: 45px; height: 45px;
            border-radius: 50%;
            border: none;
            cursor: pointer;
            color: #000;
            font-size: 18px;
            flex-shrink: 0;
            transition: 0.2s;
        }
        .send-btn:hover { background: var(--dourado-claro); transform: scale(1.05); }
        .send-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

        /* --- BOTÃO DESFAZER --- */
        .undo-bar {
            display: none;
            justify-content: flex-end;
            padding: 0 20px 6px;
        }
        .undo-bar.visible { display: flex; }
        .undo-btn {
            background: none;
            border: 1px solid #333;
            color: #666;
            font-size: 0.7rem;
            padding: 4px 10px;
            border-radius: 10px;
            cursor: pointer;
            font-family: 'Segoe UI', sans-serif;
            transition: 0.2s;
        }
        .undo-btn:hover { border-color: var(--dourado); color: var(--dourado); }

        @keyframes msgPop { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* --- MODAL DE AVALIAÇÃO --- */
        dialog {
            border: none;
            background: #0d0d0d;
            border: 1px solid var(--dourado);
            border-radius: 30px;
            padding: 25px;
            width: 95%;
            max-width: 380px;
            color: #fff;
        }
        dialog::backdrop { background: rgba(0,0,0,0.85); backdrop-filter: blur(5px); }

        .btn-gold {
            width: 100%;
            padding: 14px;
            background: var(--dourado);
            border: none;
            border-radius: 12px;
            font-weight: 700;
            cursor: pointer;
            margin-top: 15px;
            text-transform: uppercase;
            font-family: 'Segoe UI', sans-serif;
            font-size: 0.9rem;
            transition: 0.2s;
        }
        .btn-gold:hover { background: var(--dourado-claro); }
        .btn-gold:disabled { opacity: 0.6; cursor: not-allowed; }

        input[type="file"] { display: none; }
        .custom-file-upload {
            display: block; width: 100%; padding: 12px;
            background: rgba(255,255,255,0.05);
            border: 1px dashed var(--dourado);
            border-radius: 10px; text-align: center;
            cursor: pointer; color: var(--dourado);
            font-size: 13px; font-family: 'Segoe UI', sans-serif;
            transition: 0.2s;
        }
        .custom-file-upload:hover { background: rgba(212,175,55,0.1); }

        #preview {
            width: 100%; height: 100px; object-fit: cover;
            border-radius: 10px; margin-top: 10px;
            display: none;
        }

        .modal-label {
            font-size: 10px; color: var(--dourado);
            margin-bottom: 4px; display: block;
            font-family: 'Segoe UI', sans-serif;
            text-transform: uppercase; letter-spacing: 1px;
        }

        .modal-input {
            width: 100%; padding: 10px; border-radius: 10px;
            border: 1px solid #333; background: #1a1a1a;
            color: white; margin-bottom: 5px;
            font-family: 'Segoe UI', sans-serif;
        }
        .modal-input:focus { outline: none; border-color: var(--dourado); }

        /* --- CHIPS DE NOTA EXPANDIDOS --- */
        .nota-chips {
            display: flex; gap: 4px; margin-bottom: 10px;
            overflow-x: auto; padding-bottom: 4px;
            scrollbar-width: none;
        }
        .chip {
            background: rgba(255,255,255,0.05);
            border: 1px solid #444;
            color: #fff; padding: 4px 9px;
            border-radius: 6px; font-size: 11px;
            cursor: pointer; transition: 0.2s;
            white-space: nowrap;
            font-family: 'Segoe UI', sans-serif;
            flex-shrink: 0;
        }
        .chip:hover { border-color: var(--dourado); background: var(--vinho-escuro); }
        .chip.selected { background: var(--dourado); color: #000; border-color: var(--dourado); }

        @media (max-width: 992px) {
            .main-wrapper { padding: 10px; margin-top: 15px; min-height: calc(100vh - 70px); }
            .chat-card { height: 80vh; border-radius: 30px; }
        }

        /* --- AUTOCOMPLETE CHIPS --- */
        #suggestions-bar { scrollbar-width: none; -webkit-overflow-scrolling: touch; }
        #suggestions-bar::-webkit-scrollbar { display: none; }
        .suggestion-chip {
            display: inline-flex; align-items: center; gap: 5px;
            padding: 5px 12px; border-radius: 16px;
            font-size: 12px; cursor: pointer;
            font-family: 'Segoe UI', sans-serif;
            white-space: nowrap; margin-right: 6px;
            transition: transform 0.15s, background 0.15s;
            border: 1px solid; background: none;
            animation: msgPop 0.2s ease-out;
        }
        .suggestion-chip.local { border-color: var(--dourado); color: var(--dourado); background: rgba(201,162,39,0.1); }
        .suggestion-chip.online { border-color: rgba(255,255,255,0.25); color: rgba(255,255,255,0.65); }
        .suggestion-chip:hover { transform: translateY(-1px); }
        .suggestion-chip.local:hover { background: rgba(201,162,39,0.25); }
        .suggestion-chip.online:hover { background: rgba(255,255,255,0.08); }
    </style>
</head>

    <div id="navbar-placeholder"></div>

    <script src="nav.js"></script>
    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxvM8_kK9_BXLAhhEjdmsAIgofCEjWvw-BcPXx4G1GEXeKkJwILDCkckuvg29FsiHFf/exec";
        const IMG_L = "https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcS-TifEdyk31bue7ksGITNEiUrtAvl4H7_1V_UFojtvIA&s=10";
        const IMG_I = "https://ih1.redbubble.net/image.4410098886.0898/bg,f8f8f8-flat,750x,075,f-pad,750x1000,f8f8f8.jpg";

        let step = 0;
        let dataVinho = {};
        let isValidating = false;
        let base64Image = "";
        let historico = []; // Para o desfazer

        const fluxo = [
            { key: 'wineName',      q: "Qual o nome do rótulo?",                          bot: 'leblonzito', type: 'text' },
            { key: 'produtor',      q: "Quem é o produtor ou vinícola?",                  bot: 'ipanemita',  type: 'text' },
            { key: 'classificacao', q: "Qual a classificação? (Ex: Reserva, Blend...)",   bot: 'leblonzito', type: 'text', list: 'lista-classificacao' },
            { key: 'uva',           q: "Quais as uvas principais?",                       bot: 'ipanemita',  type: 'text', list: 'lista-uvas' },
            { key: 'wineType',      q: "Qual o tipo? (Tinto, Branco, Rosé...)",           bot: 'leblonzito', type: 'text', list: 'lista-tipos' },
            { key: 'year',          q: "Qual a safra (ano)?",                             bot: 'ipanemita',  type: 'number' },
            { key: 'pais',          q: "De qual país ele é?",                             bot: 'leblonzito', type: 'text', list: 'lista-paises' },
            { key: 'regiao',        q: "Qual a região?",                                  bot: 'ipanemita',  type: 'text' },
            { key: 'teor',          q: "Qual o teor alcoólico?",                          bot: 'leblonzito', type: 'text' },
            { key: 'tokenAcesso',   q: "Agora a senha de acesso para salvar:",            bot: 'leblonzito', type: 'password' }
        ];

        window.onload = () => {
            updateHeader('leblonzito');
            addMsg("Olá! Sou o Leblonzito. Vamos registrar esse brinde? " + fluxo[0].q, 'leblonzito');
            document.getElementById('dataConsumo').valueAsDate = new Date();

            const lastPais = localStorage.getItem('last_pais');
            if (lastPais) fluxo.find(f => f.key === 'pais').placeholder = `Último: ${lastPais}`;

            preloadLocalWines();
        };

        // ── AUTOCOMPLETE INTELIGENTE ──────────────────────────────────
        let localWinesCache = null;
        let suggestionDebounce = null;

        async function preloadLocalWines() {
            try {
                const data = await window.fetchWithCache(SCRIPT_URL);
                localWinesCache = Array.isArray(data) ? data : (data.data || data.wines || []);
            } catch (e) { localWinesCache = []; }
        }

        function searchLocalWines(term) {
            if (!Array.isArray(localWinesCache) || term.length < 2) return [];
            const t = term.toLowerCase();
            try {
                return localWinesCache
                    .filter(w => w && typeof w['Nome do Vinho'] === 'string' && w['Nome do Vinho'].toLowerCase().includes(t))
                    .slice(0, 4);
            } catch (e) { return []; }
        }

        async function searchGroq(term) {
            if (term.length < 2) return null;
            try {
                const url = SCRIPT_URL + '?action=buscarVinho&query=' + encodeURIComponent(term);
                const res = await fetch(url);
                if (!res.ok) return null;
                const wine = await res.json();
                if (Array.isArray(wine) || !wine || !wine.nome || wine.erro) return null;
                return wine;
            } catch (e) { return null; }
        }

        const PAIS_MAP = {
            'france':'França','italy':'Itália','spain':'Espanha','portugal':'Portugal',
            'argentina':'Argentina','chile':'Chile','brazil':'Brasil','uruguay':'Uruguai',
            'australia':'Austrália','south africa':'África do Sul','germany':'Alemanha',
            'fr':'França','it':'Itália','es':'Espanha','pt':'Portugal','ar':'Argentina',
            'cl':'Chile','br':'Brasil','uy':'Uruguai','au':'Austrália','de':'Alemanha'
        };

        function normalizarPais(origem) {
            if (!origem) return null;
            const low = origem.toLowerCase();
            for (const [k, v] of Object.entries(PAIS_MAP)) {
                if (low.includes(k)) return v;
            }
            return null;
        }

        let suggestionMsgEl = null;

        function hideSuggestions() {
            const bar = document.getElementById('suggestions-bar');
            bar.style.display = 'none'; bar.innerHTML = '';
            if (suggestionMsgEl) { suggestionMsgEl.remove(); suggestionMsgEl = null; }
        }

        function continuarFluxoNormal() {
            const input = document.getElementById('userInput');
            const next = fluxo[1];
            updateHeader(next.bot);
            addMsg(next.q, next.bot);
            input.type = next.type;
            input.setAttribute('list', next.list || '');
            input.placeholder = next.placeholder || 'Digite e pressione Enter...';
        }

        // Chamada APÓS o usuário enviar o nome (step 0 já processado, step agora é 1)
        async function autocompletarVinho(nome) {
            try {
                // 1. Busca instantânea no catálogo local
                const local = searchLocalWines(nome);
                if (local.length) {
                    updateHeader('ipanemita');
                    showSuggestionChipsInChat(local, '🍷 Esse vinho está na adega! Clique para preencher tudo:');
                    return;
                }

                // 2. Busca via Groq (Llama 3.3)
                updateHeader('ipanemita');
                const loadingEl = addMsgEl('Consultando IA sobre esse vinho... ✨', 'ipanemita');
                let groq = null;
                try {
                    groq = await searchGroq(nome);
                } catch (e) { groq = null; }
                loadingEl.remove();

                if (groq) {
                    showGeminiResult(groq);
                } else {
                    continuarFluxoNormal();
                }
            } catch (e) {
                // Garante que o fluxo sempre avança, mesmo com erro inesperado
                continuarFluxoNormal();
            }
        }

        // Adiciona mensagem e retorna o elemento DOM
        function addMsgEl(text, type) {
            const win = document.getElementById('chat-window');
            const div = document.createElement('div');
            div.className = 'msg msg-bot';
            const img = type === 'leblonzito' ? IMG_L : IMG_I;
            div.innerHTML = `${getAvatarHtml(img, type)}<div class="bubble">${text}</div>`;
            win.appendChild(div);
            win.scrollTop = win.scrollHeight;
            return div;
        }

        function buildSuggestionBubble(imgSrc, label, items, skipLabel) {
            const input = document.getElementById('userInput');
            const win = document.getElementById('chat-window');
            const div = document.createElement('div');
            div.className = 'msg msg-bot';

            const bubble = document.createElement('div');
            bubble.className = 'bubble';
            bubble.style.cssText = 'background:#1a1a1a;border:1px solid rgba(255,255,255,0.08);min-width:200px;max-width:270px;color:#fff';

            const lbl = document.createElement('div');
            lbl.style.cssText = 'font-size:12px;opacity:0.85;margin-bottom:8px;color:#fff';
            lbl.textContent = label;
            bubble.appendChild(lbl);

            items.forEach(({ text, sub, gold, onclick }) => {
                const btn = document.createElement('button');
                btn.style.cssText = `display:block;width:100%;text-align:left;padding:9px 12px;margin-bottom:5px;border-radius:10px;cursor:pointer;font-family:Segoe UI,sans-serif;font-size:13px;border:1px solid ${gold ? 'var(--dourado)' : 'rgba(201,162,39,0.5)'};background:${gold ? 'rgba(201,162,39,0.18)' : 'rgba(201,162,39,0.08)'};color:#fff`;
                btn.innerHTML = `${text}${sub ? `<span style="display:block;font-size:11px;opacity:0.55;margin-top:2px">${sub}</span>` : ''}`;
                btn.onclick = onclick;
                bubble.appendChild(btn);
            });

            const skipBtn = document.createElement('button');
            skipBtn.style.cssText = 'display:block;width:100%;text-align:center;padding:6px;border-radius:8px;border:1px solid #2a2a2a;background:none;color:#555;cursor:pointer;font-family:Segoe UI,sans-serif;font-size:11px;margin-top:2px';
            skipBtn.textContent = skipLabel || 'Preencher manualmente →';
            skipBtn.onclick = () => {
                hideSuggestions();
                const next = fluxo[1];
                updateHeader(next.bot);
                addMsg(next.q, next.bot);
                input.type = next.type;
                input.setAttribute('list', next.list || '');
                input.placeholder = next.placeholder || 'Digite e pressione Enter...';
            };
            bubble.appendChild(skipBtn);

            div.innerHTML = getAvatarHtml(imgSrc, 'bot');
            div.appendChild(bubble);
            win.appendChild(div);
            win.scrollTop = win.scrollHeight;
            suggestionMsgEl = div;
        }

        function showSuggestionChipsInChat(localMatches, label) {
            buildSuggestionBubble(IMG_L, label,
                localMatches.map(w => ({
                    text: w['Nome do Vinho'],
                    sub: [w['Produtor'] || w['Vinícola'], w['País'] || w['Pais']].filter(Boolean).join(' · '),
                    gold: true,
                    onclick: () => applyCatalogWine(w)
                }))
            );
        }

        function showGeminiResult(wine) {
            const emoji = { tinto:'🍷', branco:'🥂', rosé:'🌸', espumante:'🍾' }[wine.tipo?.toLowerCase()] || '🍷';
            buildSuggestionBubble(IMG_I, '✨ Encontrei via IA! Clique para preencher tudo:',
                [{
                    text: `${emoji} ${wine.nome || dataVinho.wineName}`,
                    sub: [wine.produtor, wine.pais, wine.safra ? `Safra ${wine.safra}` : ''].filter(Boolean).join(' · '),
                    gold: false,
                    onclick: () => applyGeminiWine(wine)
                }]
            );
        }

        function applyGeminiWine(wine) {
            hideSuggestions();
            const input = document.getElementById('userInput');

            if (wine.nome)          dataVinho.wineName      = wine.nome;
            if (wine.produtor)      dataVinho.produtor      = wine.produtor;
            if (wine.classificacao) dataVinho.classificacao = wine.classificacao;
            if (wine.uva)           dataVinho.uva           = wine.uva;
            if (wine.tipo)          dataVinho.wineType      = wine.tipo;
            if (wine.safra)         dataVinho.year          = String(wine.safra);
            if (wine.pais)          dataVinho.pais          = wine.pais;
            if (wine.regiao)        dataVinho.regiao        = wine.regiao;
            if (wine.teor)          dataVinho.teor          = String(wine.teor);

            document.getElementById('undo-bar').classList.remove('visible');

            const emoji = { tinto:'🍷', branco:'🥂', rosé:'🌸', espumante:'🍾' }[wine.tipo?.toLowerCase()] || '🍷';
            updateHeader('ipanemita');
            const regInfo = wine.regiao ? ` · ${wine.regiao}` : '';
            addMsg(`${emoji} Preenchido pela IA:\n\n📍 ${wine.pais || '?'}${regInfo}\n🍇 ${wine.uva || '?'}\n🏭 ${wine.produtor || '?'}\n📅 Safra ${wine.safra || 'N/A'}`, 'ipanemita');

            // Encontra o primeiro campo em falta (steps 1 a 8)
            const missingStep = fluxo.findIndex((f, i) => i >= 1 && i <= 8 && !dataVinho[f.key]);

            setTimeout(() => {
                if (missingStep !== -1) {
                    step = missingStep;
                    const next = fluxo[missingStep];
                    updateHeader(next.bot);
                    addMsg(`Faltaram alguns dados. ${next.q}`, next.bot);
                    input.type = next.type || 'text';
                    input.setAttribute('list', next.list || '');
                    input.placeholder = next.placeholder || 'Digite e pressione Enter...';
                } else {
                    step = 9;
                    updateHeader('leblonzito');
                    addMsg(fluxo[9].q, 'leblonzito');
                    input.type = 'password';
                    input.placeholder = '';
                }
            }, 800);
        }

        function applyCatalogWine(wine) {
            hideSuggestions();
            const input = document.getElementById('userInput');
            const produtor  = wine['Produtor'] || wine['Vinícola'] || 'Não informado';
            const pais      = wine['País'] || wine['Pais'] || 'Não informado';
            const regiao    = wine['Região'] || wine['Regiao'] || 'Não informado';
            const uva       = wine['Uva(s)'] || wine['Uva'] || 'Não informado';
            const tipo      = wine['Tipo'] || 'Não informado';
            const safra     = wine['Safra'] || 'Não informado';
            const teor      = wine['Teor Alcoólico'] || wine['Teor'] || 'Não informado';
            const classif   = wine['Classificação'] || wine['Classificacao'] || 'Não informado';

            Object.assign(dataVinho, {
                wineName: wine['Nome do Vinho'], produtor, classificacao: classif,
                uva, wineType: tipo, year: safra, pais, regiao, teor,
            });

            step = 9;
            document.getElementById('undo-bar').classList.remove('visible');

            const emoji = { Tinto:'🍷', Branco:'🥂', Rosé:'🌸', Espumante:'🍾' }[tipo] || '🍷';
            updateHeader('ipanemita');
            const regInfo = regiao !== 'Não informado' ? ` · ${regiao}` : '';
            addMsg(`${emoji} Preenchendo automaticamente:\n\n📍 ${pais}${regInfo}\n🍇 ${uva}\n🏭 ${produtor}\n📅 Safra ${safra}`, 'ipanemita');
            setTimeout(() => {
                updateHeader('leblonzito');
                addMsg(fluxo[9].q, 'leblonzito');
                input.type = 'password';
                input.placeholder = '';
            }, 800);
        }



        function setNota(id, valor, el) {
            document.getElementById(id).value = valor;
            // Highlight chip selecionado
            const grupo = el.closest('.nota-chips');
            grupo.querySelectorAll('.chip').forEach(c => c.classList.remove('selected'));
            el.classList.add('selected');
        }

        function getAvatarHtml(imgUrl, nome) {
            return `<div class="shiba-spotlight"><img src="${imgUrl}" class="avatar-sm zoom-face" alt="${nome}"></div>`;
        }

        function addMsg(text, type) {
            const win = document.getElementById('chat-window');
            const div = document.createElement('div');
            let avatarHtml = '';

            if (type === 'leblonzito' || type === 'ipanemita') {
                const nome = type === 'leblonzito' ? 'Leblonzito' : 'Ipanemita';
                avatarHtml = getAvatarHtml(type === 'leblonzito' ? IMG_L : IMG_I, nome);
                div.className = 'msg msg-bot';
            } else if (type === 'final') {
                avatarHtml = `<div style="display:flex;">
                    <div class="shiba-spotlight" style="z-index:2; margin-right:-15px">${getAvatarHtml(IMG_L, 'Leblonzito').replace('class="shiba-spotlight"','')}</div>
                    <div class="shiba-spotlight" style="z-index:1">${getAvatarHtml(IMG_I, 'Ipanemita').replace('class="shiba-spotlight"','')}</div>
                  </div>`;
                div.className = 'msg msg-bot';
            } else if (type === 'success') {
                div.className = 'msg msg-bot msg-success';
            } else {
                div.className = 'msg msg-user';
            }

            const displayText = text.replace(/\n/g, '<br>');
            div.innerHTML = (type === 'user')
                ? `<div class="bubble">${displayText}</div>`
                : `${avatarHtml}<div class="bubble">${displayText}</div>`;

            win.appendChild(div);
            win.scrollTop = win.scrollHeight;
        }

        function updateHeader(bot) {
            const head = document.getElementById('header-content');
            if (bot === 'leblonzito') {
                head.innerHTML = `${getAvatarHtml(IMG_L, 'Leblonzito')} <div><div style="font-weight:600; color:var(--dourado); font-family:'Segoe UI',sans-serif;">Leblonzito</div><div style="font-size:10px; opacity:0.6; font-family:'Segoe UI',sans-serif;">Sommelier Online</div></div>`;
            } else if (bot === 'ipanemita') {
                head.innerHTML = `${getAvatarHtml(IMG_I, 'Ipanemita')} <div><div style="font-weight:600; color:#aaa; font-family:'Segoe UI',sans-serif;">Ipanemita</div><div style="font-size:10px; opacity:0.6; font-family:'Segoe UI',sans-serif;">Curadoria Inteligente</div></div>`;
            } else {
                head.innerHTML = `<div style="display:flex; width:100%; justify-content:center; gap:10px;">${getAvatarHtml(IMG_L, 'Leblonzito')}${getAvatarHtml(IMG_I, 'Ipanemita')}</div>`;
            }
        }

        async function sendMessage() {
            if (isValidating) return;
            const input = document.getElementById('userInput');
            let rawMsg = input.value.trim();

            if (rawMsg === "" && step > 0) {
                const currentKey = fluxo[step].key;
                if (currentKey === 'pais') rawMsg = localStorage.getItem('last_pais') || "";
                if (currentKey === 'uva') rawMsg = localStorage.getItem('last_uva') || "";
            }

            if (!rawMsg) return;

            const msg = rawMsg;
            const displayMsg = fluxo[step].type === 'password' ? '••••••••' : rawMsg;
            addMsg(displayMsg, 'user');
            input.value = "";

            // Salvar no histórico para desfazer
            historico.push({ step, key: fluxo[step].key, value: msg });
            dataVinho[fluxo[step].key] = msg;

            if (fluxo[step].key === 'pais' && rawMsg) localStorage.setItem('last_pais', rawMsg);
            if (fluxo[step].key === 'uva' && rawMsg) localStorage.setItem('last_uva', rawMsg);

            step++;

            // Pula campos já preenchidos pela IA
            while (step >= 1 && step <= 8 && dataVinho[fluxo[step].key]) step++;

            // Mostrar botão desfazer (mas não na senha)
            if (step > 1 && step < fluxo.length) {
                document.getElementById('undo-bar').classList.add('visible');
            }

            if (step === 1) {
                // Acabou de enviar o nome — busca antes de perguntar o próximo campo
                setTimeout(() => autocompletarVinho(msg).catch(() => continuarFluxoNormal()), 600);
            } else if (step < fluxo.length) {
                const nextStep = fluxo[step];
                setTimeout(() => {
                    updateHeader(nextStep.bot);
                    addMsg(nextStep.q, nextStep.bot);
                    input.type = nextStep.type;
                    input.setAttribute('list', nextStep.list || "");
                    input.placeholder = nextStep.placeholder || "Digite e pressione Enter...";
                }, 600);
            } else {
                document.getElementById('undo-bar').classList.remove('visible');
                validarSenhaFinal();
            }
        }

        function desfazerUltimo() {
            if (historico.length <= 1) return;

            const ultimo = historico.pop();
            delete dataVinho[ultimo.key];
            step = ultimo.step;

            // Remover as últimas duas mensagens do chat (resposta do usuário + próxima pergunta do bot)
            const win = document.getElementById('chat-window');
            const msgs = win.querySelectorAll('.msg');
            // Remove a pergunta do step atual e a resposta do usuário
            if (msgs.length >= 2) {
                msgs[msgs.length - 1].remove();
                msgs[msgs.length - 2].remove();
            }

            // Restaurar estado do input
            const currentStep = fluxo[step];
            const input = document.getElementById('userInput');
            input.type = currentStep.type;
            input.setAttribute('list', currentStep.list || "");
            input.placeholder = currentStep.placeholder || "Digite e pressione Enter...";
            updateHeader(currentStep.bot);

            if (step <= 1) document.getElementById('undo-bar').classList.remove('visible');

            input.focus();
        }

        async function validarSenhaFinal() {
            isValidating = true;
            updateHeader('final');
            addMsg("Validando acesso...", 'final');

            try {
                const response = await fetch(SCRIPT_URL, {
                    method: 'POST',
                    body: JSON.stringify({ action: "verificarSenha", senha: dataVinho.tokenAcesso })
                });
                const res = await response.json();
                if (res.result === "success") {
                    isValidating = false;
                    addMsg("Acesso autorizado! Hora de dar as notas e finalizar o brinde. 🍷", 'final');
                    setTimeout(() => { document.getElementById('ratingModal').showModal(); }, 800);
                } else {
                    throw new Error();
                }
            } catch (e) {
                isValidating = false;
                step--;
                addMsg("Senha incorreta. Tente novamente:", 'leblonzito');
                updateHeader('leblonzito');
                document.getElementById('userInput').type = "password";
                document.getElementById('undo-bar').classList.remove('visible');
            }
        }

        function handleFile(event) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                const img = new Image();
                img.onload = function() {
                    const canvas = document.createElement('canvas');
                    const MAX_WIDTH = 800;
                    const scaleSize = MAX_WIDTH / img.width;
                    canvas.width = MAX_WIDTH;
                    canvas.height = img.height * scaleSize;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                    base64Image = canvas.toDataURL('image/jpeg', 0.8);
                    const preview = document.getElementById('preview');
                    preview.src = base64Image;
                    preview.style.display = "block";
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(file);
        }

        async function finishAll() {
            const btn = document.getElementById('btnFinalizar');
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Eternizando Memória...';
            btn.disabled = true;

            const notF_formatada = document.getElementById('notF').value.replace('.', ',');
            const notH_formatada = document.getElementById('notH').value.replace('.', ',');

            const payload = {
                action: "salvarVinho",
                tokenAcesso: dataVinho.tokenAcesso,
                wineName: dataVinho.wineName,
                produtor: dataVinho.produtor,
                classificacao: dataVinho.classificacao,
                uva: dataVinho.uva,
                wineType: dataVinho.wineType,
                year: dataVinho.year,
                pais: dataVinho.pais,
                regiao: dataVinho.regiao,
                teor: dataVinho.teor,
                ratingFellype: notF_formatada,
                ratingHwlly: notH_formatada,
                wouldBuy: document.getElementById('reCompra').value,
                base64Photo: base64Image,
                anoConsumo: document.getElementById('dataConsumo').value
            };

            try {
                await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify(payload) });
                document.getElementById('ratingModal').close();

                // Invalida o cache para que o catálogo carregue com dados frescos
                if (window.clearWineCache) window.clearWineCache();

                // Feedback in-chat em vez de alert()
                updateHeader('final');
                addMsg("🍷 Brinde eternizado com sucesso!\n\nO vinho foi adicionado à nossa adega. Redirecionando para o catálogo...", 'success');

                setTimeout(() => { location.href = "catalogo.html"; }, 2500);

            } catch (e) {
                document.getElementById('ratingModal').close();
                if (window.clearWineCache) window.clearWineCache();
                addMsg("✅ Brinde registrado! Redirecionando...", 'success');
                setTimeout(() => { location.href = "catalogo.html"; }, 2500);
            }
        }

        document.getElementById('userInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMessage();
        });
    </script>
