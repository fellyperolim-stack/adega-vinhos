<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adega Exclusiva | Leblonzito & Ipanemita 🍷🐶</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #d4af37; --gold-dark: #aa8928; --wine: #4a0e0e;
            --black: #050505; --glass: rgba(255, 255, 255, 0.05); --glass-border: rgba(255, 255, 255, 0.1);
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { margin: 0; height: 100%; font-family: 'Outfit', sans-serif; background: var(--black); color: #fff; overflow: hidden; }
        
        .bg-gradient { position: fixed; inset: 0; background: radial-gradient(circle at 50% 50%, #1a0505 0%, #050505 100%); z-index: -1; }
        .main-wrapper { display: flex; justify-content: center; align-items: center; height: 100vh; padding: 20px; }
        
        .chat-card {
            width: 100%; max-width: 480px; height: 85vh; background: var(--glass); backdrop-filter: blur(25px);
            border: 1px solid var(--glass-border); border-radius: 40px; display: flex; flex-direction: column;
            overflow: hidden; box-shadow: 0 30px 60px rgba(0,0,0,0.8); position: relative;
        }

        /* Avatar Container com fundo para destaque */
        .shiba-spotlight {
            background: rgba(255, 255, 255, 0.9); /* Fundo branco para destacar os dogs */
            border-radius: 30px;
            padding: 5px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.2);
        }

        .avatar-lg { width: 110px; height: 110px; border-radius: 25px; border: 2px solid var(--gold); }
        .avatar-sm { width: 42px; height: 42px; border-radius: 12px; border: 1px solid var(--gold); flex-shrink: 0; }
        
        /* Ajuste do Filtro Ipanemita para não sumir */
        .avatar-ipanemita { 
            filter: brightness(0.2) contrast(1.1) saturate(0.8) sepia(0.2); 
            border-color: #555; 
        }

        /* Login Screen */
        #login-screen { position: absolute; inset: 0; z-index: 10; display: flex; flex-direction: column; justify-content: center; align-items: center; background: var(--black); padding: 40px; transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1); }
        h1 { font-family: 'Cinzel', serif; color: var(--gold); margin: 0; font-size: 24px; letter-spacing: 1px; text-align: center; }
        .input-premium { width: 100%; max-width: 280px; background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border); border-radius: 15px; padding: 15px; color: white; text-align: center; margin-top: 30px; font-size: 18px; outline: none; }
        
        /* Chat Header */
        .chat-header { padding: 20px 25px; border-bottom: 1px solid var(--glass-border); display: flex; align-items: center; gap: 15px; background: rgba(0,0,0,0.2); }
        
        /* Message Window */
        .chat-window { flex-grow: 1; padding: 25px; overflow-y: auto; display: flex; flex-direction: column; gap: 20px; scrollbar-width: none; }
        .msg { max-width: 90%; animation: msgPop 0.4s ease-out; display: flex; align-items: flex-end; gap: 12px; }
        .msg-bot { align-self: flex-start; }
        .msg-user { align-self: flex-end; flex-direction: row-reverse; }
        
        .bubble { padding: 14px 18px; border-radius: 20px; font-size: 15px; line-height: 1.6; position: relative; }
        .msg-bot .bubble { background: #fff; color: var(--black); border-bottom-left-radius: 4px; box-shadow: 0 4px 15px rgba(0,0,0,0.2); }
        .msg-user .bubble { background: linear-gradient(135deg, var(--wine), #2a0707); color: #fff; border-bottom-right-radius: 4px; border: 1px solid rgba(255,255,255,0.1); }
        
        /* Input Area */
        .input-container { padding: 20px; background: rgba(0,0,0,0.5); display: flex; gap: 12px; align-items: center; }
        .msg-input { flex-grow: 1; background: var(--glass); border: 1px solid var(--glass-border); border-radius: 20px; padding: 12px 20px; color: white; outline: none; }
        .send-btn { background: var(--gold); width: 45px; height: 45px; border-radius: 50%; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        
        @keyframes msgPop { from { opacity: 0; transform: scale(0.95) translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* Modal */
        dialog { border: none; background: var(--black); border: 1px solid var(--gold); border-radius: 30px; padding: 30px; width: 90%; max-width: 380px; color: #fff; }
        dialog::backdrop { background: rgba(0,0,0,0.85); backdrop-filter: blur(10px); }
        .btn-gold { width: 100%; padding: 15px; background: var(--gold); color: var(--black); border: none; border-radius: 15px; font-weight: 700; cursor: pointer; text-transform: uppercase; }
    </style>
</head>
<body>

    <div class="bg-gradient"></div>

    <div class="main-wrapper">
        <div class="chat-card">
            
            <div id="login-screen">
                <div style="display:flex; gap:20px; margin-bottom:30px">
                    <div class="shiba-spotlight"><img src="https://imgproxy.attic.sh/insecure/f:webp/q:90/w:750/plain/https://attic.sh/kg07d8c8yw5b3it3nvthjr8xpe00" class="avatar-lg" alt="Leblonzito"></div>
                    <div class="shiba-spotlight"><img src="https://imgproxy.attic.sh/insecure/f:webp/q:90/w:750/plain/https://attic.sh/kg07d8c8yw5b3it3nvthjr8xpe00" class="avatar-lg avatar-ipanemita" alt="Ipanemita"></div>
                </div>
                <h1>Adega Exclusiva</h1>
                <input type="password" id="passInput" class="input-premium" placeholder="Acesso Privado">
                <button onclick="checkAuth()" class="btn-gold" style="margin-top:20px; max-width:200px">Entrar</button>
            </div>

            <div id="chat-header" class="chat-header" style="display:none">
                <div id="header-content" style="display:flex; align-items:center; gap:12px; width:100%">
                    </div>
            </div>

            <div id="chat-window" class="chat-window" style="display:none"></div>

            <div id="input-container" class="input-container" style="display:none">
                <input type="text" id="userInput" class="msg-input" placeholder="Envie uma mensagem...">
                <button class="send-btn" onclick="sendMessage()">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="black" stroke-width="3"><path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"/></svg>
                </button>
            </div>
        </div>
    </div>

    <dialog id="ratingModal">
        <h2 style="font-family:'Cinzel'; text-align:center; margin-bottom:25px; color:var(--gold)">Avaliação Final</h2>
        <div style="display:flex; flex-direction:column; gap:15px">
            <div><label style="font-size:11px; color:var(--gold)">NOTA FELLYPE</label><input type="number" id="notF" style="width:100%; padding:10px; border-radius:10px; border:none; background:var(--glass); color:white"></div>
            <div><label style="font-size:11px; color:var(--gold)">NOTA HWLLY</label><input type="number" id="notH" style="width:100%; padding:10px; border-radius:10px; border:none; background:var(--glass); color:white"></div>
            <div><label style="font-size:11px; color:var(--gold)">RECOMPRARIA?</label><select id="reCompra" style="width:100%; padding:10px; border-radius:10px; background:var(--glass); color:white"><option value="Sim">Sim</option><option value="Não">Não</option></select></div>
            <div><label style="font-size:11px; color:var(--gold)">FOTO URL</label><input type="text" id="picUrl" style="width:100%; padding:10px; border-radius:10px; border:none; background:var(--glass); color:white"></div>
            <button class="btn-gold" onclick="finishAll()" style="margin-top:10px">Finalizar</button>
        </div>
    </dialog>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxvM8_kK9_BXLAhhEjdmsAIgofCEjWvw-BcPXx4G1GEXeKkJwILDCkckuvg29FsiHFf/exec";
        const SHIBA_IMG = "https://imgproxy.attic.sh/insecure/f:webp/q:90/w:750/plain/https://attic.sh/kg07d8c8yw5b3it3nvthjr8xpe00";
        let token = "";
        let step = 0;
        let dataVinho = {};

        const fluxo = [
            { key: 'wineName', q: "Olá! Leblonzito aqui. Qual o nome do rótulo?", bot: 'leblonzito' },
            { key: 'uva', q: "Oi! Ipanemita perguntando: qual a uva?", bot: 'ipanemita' },
            { key: 'pais', q: "De qual país ele é?", bot: 'leblonzito' },
            { key: 'year', q: "E qual a safra?", bot: 'ipanemita' }
        ];

        function checkAuth() {
            const pass = document.getElementById('passInput').value;
            const script = document.createElement('script');
            script.src = `${SCRIPT_URL}?action=verificarSenha&senha=${encodeURIComponent(pass)}&callback=authResult`;
            document.body.appendChild(script);
        }

        function authResult(res) {
            if (res.result === "success") {
                token = document.getElementById('passInput').value;
                document.getElementById('login-screen').style.transform = 'translateY(-100%)';
                setTimeout(() => {
                    document.getElementById('login-screen').style.display = 'none';
                    document.getElementById('chat-header').style.display = 'flex';
                    document.getElementById('chat-window').style.display = 'flex';
                    document.getElementById('input-container').style.display = 'flex';
                    addMsg(fluxo[0].q, 'leblonzito');
                    updateHeader('leblonzito');
                }, 600);
            } else { alert("Acesso negado."); }
        }

        function addMsg(text, type) {
            const win = document.getElementById('chat-window');
            const div = document.createElement('div');
            
            let avatarHtml = '';
            if (type === 'leblonzito') {
                avatarHtml = `<div class="shiba-spotlight" style="padding:3px"><img src="${SHIBA_IMG}" class="avatar-sm"></div>`;
                div.className = 'msg msg-bot';
            } else if (type === 'ipanemita') {
                avatarHtml = `<div class="shiba-spotlight" style="padding:3px"><img src="${SHIBA_IMG}" class="avatar-sm avatar-ipanemita"></div>`;
                div.className = 'msg msg-bot';
            } else if (type === 'final') {
                avatarHtml = `<div style="display:flex; gap:-10px">
                                <div class="shiba-spotlight" style="padding:2px; z-index:2; margin-right:-15px"><img src="${SHIBA_IMG}" class="avatar-sm"></div>
                                <div class="shiba-spotlight" style="padding:2px; z-index:1"><img src="${SHIBA_IMG}" class="avatar-sm avatar-ipanemita"></div>
                              </div>`;
                div.className = 'msg msg-bot';
            } else {
                div.className = 'msg msg-user';
            }

            div.innerHTML = (type === 'user') ? `<div class="bubble">${text}</div>` : `${avatarHtml}<div class="bubble">${text}</div>`;
            win.appendChild(div);
            win.scrollTop = win.scrollHeight;
        }

        function updateHeader(bot) {
            const head = document.getElementById('header-content');
            if(bot === 'leblonzito') {
                head.innerHTML = `<div class="shiba-spotlight" style="padding:3px"><img src="${SHIBA_IMG}" class="avatar-sm"></div>
                                  <div><div style="font-weight:600; color:var(--gold)">Leblonzito</div><div style="font-size:10px; opacity:0.6">Sommelier Online</div></div>`;
            } else if(bot === 'ipanemita') {
                head.innerHTML = `<div class="shiba-spotlight" style="padding:3px"><img src="${SHIBA_IMG}" class="avatar-sm avatar-ipanemita"></div>
                                  <div><div style="font-weight:600; color:#aaa">Ipanemita</div><div style="font-size:10px; opacity:0.6">Curadoria Inteligente</div></div>`;
            } else {
                head.innerHTML = `<div style="display:flex; width:100%; justify-content:center; gap:10px">
                                    <div class="shiba-spotlight" style="padding:3px"><img src="${SHIBA_IMG}" class="avatar-sm"></div>
                                    <div class="shiba-spotlight" style="padding:3px"><img src="${SHIBA_IMG}" class="avatar-sm avatar-ipanemita"></div>
                                  </div>`;
            }
        }

        async function sendMessage() {
            const input = document.getElementById('userInput');
            const msg = input.value.trim();
            if(!msg) return;

            addMsg(msg, 'user');
            input.value = "";
            dataVinho[fluxo[step].key] = msg;

            step++;
            if(step < fluxo.length) {
                const nextBot = fluxo[step].bot;
                setTimeout(() => {
                    updateHeader(nextBot);
                    addMsg(fluxo[step].q, nextBot);
                }, 700);
            } else {
                setTimeout(() => {
                    updateHeader('final');
                    addMsg("Tudo pronto! Vamos para as notas?", 'final');
                    document.getElementById('ratingModal').showModal();
                }, 900);
            }
        }

        function finishAll() {
            dataVinho.tokenAcesso = token;
            dataVinho.notF = document.getElementById('notF').value;
            dataVinho.notH = document.getElementById('notH').value;
            dataVinho.recompra = document.getElementById('reCompra').value;
            dataVinho.foto = document.getElementById('picUrl').value;
            fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(dataVinho) });
            alert("Vinho salvo com sucesso! 🍷🐾");
            location.href = "catalogo.html";
        }

        document.getElementById('userInput').addEventListener('keypress', (e) => { if(e.key === 'Enter') sendMessage(); });
    </script>
</body>
</html>
