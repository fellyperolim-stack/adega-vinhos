<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#2c0514">
    <title>VinhoChat Premium 🍷</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,700;1,400&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --wine-deep: #2c0514; --wine-vibrant: #5e0b25; --gold-soft: #c5a059;
            --gold-bright: #d4af37; --bg-canvas: #140209; --paper: #fdfaf7;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            font-family: 'Poppins', sans-serif; background: var(--bg-canvas);
            height: 100vh; margin: 0; display: flex; justify-content: center; align-items: center; color: #fff;
            background-image: radial-gradient(circle at 20% 30%, #3d081b 0%, transparent 40%);
        }
        .adventure-container {
            width: 100%; max-width: 450px; height: 92vh; background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 30px; display: flex; flex-direction: column; overflow: hidden; position: relative;
        }
        /* Login Section */
        #login-section { padding: 40px; text-align: center; display: flex; flex-direction: column; justify-content: center; height: 100%; }
        .login-input { width: 100%; padding: 15px; margin: 10px 0; background: rgba(255,255,255,0.05); border: 1px solid var(--gold-soft); color: white; border-radius: 12px; text-align: center; font-size: 18px; }
        
        /* Chat Section */
        #chat-container { display: none; flex-direction: column; height: 100%; }
        .chat-header { padding: 20px; background: rgba(255, 255, 255, 0.03); display: flex; align-items: center; gap: 15px; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .guide-avatar { width: 50px; height: 50px; border-radius: 18px; border: 2px solid var(--gold-soft); }
        .chat-window { flex-grow: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; scrollbar-width: none; }
        
        /* Bubbles */
        .message { max-width: 85%; animation: slideIn 0.3s ease-out; }
        .message-bot { align-self: flex-start; }
        .message-user { align-self: flex-end; }
        .message-bubble { padding: 12px 18px; border-radius: 15px; font-size: 14px; line-height: 1.5; }
        .message-bot .message-bubble { background: #fff; color: var(--wine-deep); border-radius: 4px 15px 15px 15px; }
        .message-user .message-bubble { background: var(--wine-vibrant); color: #fff; border-radius: 15px 15px 4px 15px; }

        .input-area { padding: 20px; background: rgba(0,0,0,0.3); display: flex; gap: 10px; }
        .input-wrapper { background: rgba(255,255,255,0.08); border-radius: 20px; flex-grow: 1; padding: 5px 15px; display: flex; align-items: center; }
        .input-area input { background: none; border: none; color: #fff; width: 100%; padding: 10px 0; outline: none; }
        .send-btn { background: var(--gold-soft); border: none; width: 45px; height: 45px; border-radius: 15px; color: var(--wine-deep); cursor: pointer; }
        
        @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        /* Modal */
        dialog { border: none; border-radius: 20px; padding: 25px; background: var(--paper); width: 90%; max-width: 350px; }
        dialog::backdrop { background: rgba(0,0,0,0.8); backdrop-filter: blur(4px); }
        .modal-group { margin-bottom: 15px; }
        .modal-group label { display: block; font-size: 10px; font-weight: bold; color: #888; margin-bottom: 5px; }
        .modal-group input, .modal-group select { width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #ddd; }
        .btn-final { width: 100%; padding: 15px; background: var(--wine-deep); color: white; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; margin-top: 10px; }
    </style>
</head>
<body>

    <div class="adventure-container">
        <div id="login-section">
            <h2 style="font-family:'Lora'; color:var(--gold-soft)">Adega Fellype & Hwlly</h2>
            <p style="font-size:12px; opacity:0.6">Identifique-se, Sommelier</p>
            <input type="password" id="senhaInput" class="login-input" placeholder="••••">
            <button class="send-btn" onclick="checkPass()" style="width:100%; margin-top:10px">ENTRAR</button>
        </div>

        <div id="chat-container">
            <div class="chat-header">
                <img src="https://imgproxy.attic.sh/insecure/f:webp/q:90/w:750/plain/https://attic.sh/kg07d8c8yw5b3it3nvthjr8xpe00" class="guide-avatar">
                <div><h2 style="margin:0; font-size:16px; color:var(--gold-soft)">Leblonzito</h2><p style="margin:0; font-size:10px; opacity:0.5">IA Sommelier</p></div>
            </div>
            <div class="chat-window" id="chat-window"></div>
            <div id="dynamic-actions" style="padding:0 20px"></div>
            <div class="input-area" id="input-area">
                <div class="input-wrapper"><input type="text" id="userInput" placeholder="Fale com o Leblonzito..."></div>
                <button class="send-btn" onclick="handleUserInput()">➤</button>
            </div>
        </div>
    </div>

    <dialog id="ratingModal">
        <h3 style="text-align:center; color:var(--wine-deep)">Avaliação Final 🌟</h3>
        <div class="modal-group"><label>NOTA FELLYPE</label><input type="number" id="nFellype"></div>
        <div class="modal-group"><label>NOTA HWLLY</label><input type="number" id="nHwlly"></div>
        <div class="modal-group">
            <label>COMPRARIA DE NOVO?</label>
            <select id="wouldBuy"><option value="Sim">Sim</option><option value="Não">Não</option></select>
        </div>
        <div class="modal-group">
            <label>FOTO (URL DO DRIVE)</label>
            <input type="text" id="photoUrl" placeholder="Link da foto">
        </div>
        <button class="btn-final" onclick="saveRatings()">GUARDAR NA ADEGA</button>
    </dialog>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxvM8_kK9_BXLAhhEjdmsAIgofCEjWvw-BcPXx4G1GEXeKkJwILDCkckuvg29FsiHFf/exec";
        let senhaValidada = "";
        let formData = {};
        let rowIndex = null;
        let step = 0;
        
        const steps = [
            { key: 'wineName', q: "Qual o nome do vinho que vamos registrar?" },
            { key: 'uva', q: "Qual a uva?" },
            { key: 'pais', q: "Qual o país de origem?" },
            { key: 'year', q: "Qual a safra (ano)?" }
        ];

        // Lógica de Login (JSONP)
        function loginCallback(data) {
            if (data.result === "success") {
                senhaValidada = document.getElementById('senhaInput').value;
                document.getElementById('login-section').style.display = 'none';
                document.getElementById('chat-container').style.display = 'flex';
                addMessage("Olá! Sou o Leblonzito. Vamos cadastrar seu vinho? Qual o nome dele?", 'bot');
            } else { alert("Senha Inválida!"); location.reload(); }
        }

        function checkPass() {
            const s = document.getElementById('senhaInput').value;
            const script = document.createElement('script');
            script.src = `${SCRIPT_URL}?action=verificarSenha&senha=${encodeURIComponent(s)}&callback=loginCallback`;
            document.body.appendChild(script);
        }

        function addMessage(text, sender) {
            const win = document.getElementById('chat-window');
            const div = document.createElement('div');
            div.className = `message message-${sender}`;
            div.innerHTML = `<div class="message-bubble">${text}</div>`;
            win.appendChild(div);
            win.scrollTop = win.scrollHeight;
        }

        async function handleUserInput() {
            const input = document.getElementById('userInput');
            const val = input.value;
            if(!val) return;

            addMessage(val, 'user');
            input.value = "";
            formData[steps[step].key] = val;

            if (step === 0) { // Se for o nome, tenta usar a IA para o resto
                addMessage("Buscando detalhes com IA...", 'bot');
                try {
                    const resp = await fetch(`${SCRIPT_URL}?action=getAI&query=${encodeURIComponent(val)}`);
                    const ai = await resp.json();
                    if(ai.uva) {
                        formData.uva = ai.uva; formData.pais = ai.pais; formData.year = ai.safra;
                        addMessage(`Encontrei: ${ai.uva} (${ai.pais}). Tudo certo?`, 'bot');
                        showFinalButton();
                        return;
                    }
                } catch(e) {}
            }

            step++;
            if(step < steps.length) {
                addMessage(steps[step].q, 'bot');
            } else {
                showFinalButton();
            }
        }

        function showFinalButton() {
            document.getElementById('dynamic-actions').innerHTML = `<button class="btn-final" onclick="saveToSheet()">SALVAR DADOS</button>`;
        }

        async function saveToSheet() {
            formData.tokenAcesso = senhaValidada;
            addMessage("Salvando na planilha...", 'bot');
            // Usamos mode no-cors para o POST do Apps Script
            fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(formData) });
            
            setTimeout(() => {
                addMessage("Dados básicos salvos! Agora, as notas finais:", 'bot');
                document.getElementById('ratingModal').showModal();
            }, 1500);
        }

        function saveRatings() {
            const finalData = {
                tokenAcesso: senhaValidada,
                action: "updateRatings",
                ratingFellype: document.getElementById('nFellype').value,
                ratingHwlly: document.getElementById('nHwlly').value,
                wouldBuy: document.getElementById('wouldBuy').value,
                foto: document.getElementById('photoUrl').value
            };
            fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(finalData) });
            alert("Vinho finalizado com sucesso! 🍷");
            location.href = "catalogo.html";
        }
    </script>
</body>
</html>
