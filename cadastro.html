<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VinhoChat | Fellype & Hwlly 🍷</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #d4af37; --wine: #4a0e0e;
            --black: #050505; --glass: rgba(255, 255, 255, 0.05); --glass-border: rgba(255, 255, 255, 0.1);
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { margin: 0; height: 100%; font-family: 'Outfit', sans-serif; background: var(--black); color: #fff; overflow: hidden; }
        
        .bg-gradient { position: fixed; inset: 0; background: radial-gradient(circle at 50% 50%, #1a0505 0%, #050505 100%); z-index: -1; }
        .main-wrapper { display: flex; justify-content: center; align-items: center; height: 100vh; padding: 20px; }
        
        .chat-card { width: 100%; max-width: 480px; height: 85vh; background: var(--glass); backdrop-filter: blur(25px); border: 1px solid var(--glass-border); border-radius: 40px; display: flex; flex-direction: column; overflow: hidden; box-shadow: 0 30px 60px rgba(0,0,0,0.8); position: relative; }

        /* Estilo dos Avatares Centralizados */
        .shiba-spotlight { background: #fff; border-radius: 25px; padding: 4px; display: inline-flex; box-shadow: 0 0 20px rgba(255, 255, 255, 0.2); border: 2px solid var(--gold); overflow: hidden; justify-content: center; align-items: center; }
        .avatar-lg { width: 100px; height: 100px; border-radius: 20px; object-fit: cover; }
        
        /* Avatares menores (chat/header) com tamanho fixo e object-fit */
        .avatar-sm { width: 40px; height: 40px; border-radius: 10px; object-fit: cover; flex-shrink: 0; }

        /* NOVA CLASSE: Zoom e Centralização forçada no rosto para avatares menores */
        .avatar-zoom {
            transform: scale(2.2) translateY(-10%); /* Dá zoom e sobe a imagem para focar no rosto */
            transform-origin: center center; /* Garante que o zoom seja a partir do centro */
        }

        /* Tela de Login Centralizada (aqui o zoom não é necessário, pois os avatares são grandes) */
        #login-screen { position: absolute; inset: 0; z-index: 10; display: flex; flex-direction: column; justify-content: center; align-items: center; background: var(--black); padding: 40px; transition: transform 0.6s ease; }
        h1 { font-family: 'Cinzel', serif; color: var(--gold); margin: 20px 0 0; font-size: 22px; letter-spacing: 1px; text-align: center; }
        .input-premium { width: 100%; max-width: 280px; background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border); border-radius: 15px; padding: 15px; color: white; text-align: center; margin-top: 30px; font-size: 18px; outline: none; }
        
        .chat-header { padding: 15px 25px; border-bottom: 1px solid var(--glass-border); display: flex; align-items: center; gap: 15px; background: rgba(0,0,0,0.3); }
        .chat-window { flex-grow: 1; padding: 25px; overflow-y: auto; display: flex; flex-direction: column; gap: 18px; scrollbar-width: none; }
        .msg { max-width: 85%; animation: msgPop 0.3s ease-out; display: flex; align-items: flex-end; gap: 10px; }
        .msg-bot { align-self: flex-start; }
        .msg-user { align-self: flex-end; flex-direction: row-reverse; }
        .bubble { padding: 12px 16px; border-radius: 18px; font-size: 15px; line-height: 1.5; }
        .msg-bot .bubble { background: #fff; color: var(--black); border-bottom-left-radius: 4px; }
        .msg-user .bubble { background: var(--wine); color: #fff; border-bottom-right-radius: 4px; border: 1px solid rgba(255,255,255,0.1); }
        
        .input-container { padding: 20px; background: rgba(0,0,0,0.5); display: flex; gap: 10px; }
        .msg-input { flex-grow: 1; background: var(--glass); border: 1px solid var(--glass-border); border-radius: 20px; padding: 12px 20px; color: white; outline: none; }
        .send-btn { background: var(--gold); width: 45px; height: 45px; border-radius: 50%; border: none; cursor: pointer; color: #000; font-size: 20px; }
        
        @keyframes msgPop { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        dialog { border: none; background: var(--black); border: 1px solid var(--gold); border-radius: 30px; padding: 25px; width: 90%; max-width: 350px; color: #fff; }
        dialog::backdrop { background: rgba(0,0,0,0.8); backdrop-filter: blur(5px); }
        .btn-gold { width: 100%; padding: 14px; background: var(--gold); border: none; border-radius: 12px; font-weight: 700; cursor: pointer; margin-top: 15px; text-transform: uppercase; }
    </style>
</head>
<body>

    <div class="bg-gradient"></div>

    <div class="main-wrapper">
        <div class="chat-card">
            
            <div id="login-screen">
                <div style="display:flex; gap:20px; justify-content: center;">
                    <div class="shiba-spotlight"><img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcS-TifEdyk31bue7ksGITNEiUrtAvl4H7_1V_UFojtvIA&s=10" class="avatar-lg" alt="Leblonzito"></div>
                    <div class="shiba-spotlight"><img src="https://ih1.redbubble.net/image.4410098886.0898/bg,f8f8f8-flat,750x,075,f-pad,750x1000,f8f8f8.jpg" class="avatar-lg" alt="Ipanemita"></div>
                </div>
                <h1>ADEGA EXCLUSIVA</h1>
                <input type="password" id="passInput" class="input-premium" placeholder="Acesso Privado">
                <button onclick="checkAuth()" class="btn-gold" style="max-width:180px">ENTRAR</button>
            </div>

            <div id="chat-header" class="chat-header" style="display:none">
                <div id="header-content" style="display:flex; align-items:center; gap:12px; width:100%"></div>
            </div>

            <div id="chat-window" class="chat-window" style="display:none"></div>

            <div id="input-container" class="input-container" style="display:none">
                <input type="text" id="userInput" class="msg-input" placeholder="Envie uma mensagem...">
                <button class="send-btn" onclick="sendMessage()">➤</button>
            </div>
        </div>
    </div>

    <dialog id="ratingModal">
        <h2 style="font-family:'Cinzel'; text-align:center; margin-bottom:25px; color:var(--gold)">Avaliação Final</h2>
        <div style="display:flex; flex-direction:column; gap:15px">
            <div><label style="font-size:11px; color:var(--gold)">NOTA FELLYPE</label><input type="number" id="notF" style="width:100%; padding:10px; border-radius:10px; border:none; background:var(--glass); color:white"></div>
            <div><label style="font-size:11px; color:var(--gold)">NOTA HWLLY</label><input type="number" id="notH" style="width:100%; padding:10px; border-radius:10px; border:none; background:var(--glass); color:white"></div>
            <div><label style="font-size:11px; color:var(--gold)">RECOMPRARIA?</label><select id="reCompra" style="width:100%; padding:10px; border-radius:10px; background:var(--glass); color:white"><option value="Sim">Sim</option><option value="Não">Não</option></select></div>
            <div><label style="font-size:11px; color:var(--gold)">FOTO URL</label><input type="text" id="picUrl" style="width:100%; padding:10px; border-radius:10px; border:none; background:var(--glass); color:white"></div>
            <button class="btn-gold" onclick="finishAll()" style="margin-top:10px">Finalizar</button>
        </div>
    </dialog>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxvM8_kK9_BXLAhhEjdmsAIgofCEjWvw-BcPXx4G1GEXeKkJwILDCkckuvg29FsiHFf/exec";
        
        const IMG_L = "https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcS-TifEdyk31bue7ksGITNEiUrtAvl4H7_1V_UFojtvIA&s=10"; 
        const IMG_I = "https://ih1.redbubble.net/image.4410098886.0898/bg,f8f8f8-flat,750x,075,f-pad,750x1000,f8f8f8.jpg"; 
        
        let token = "";
        let step = 0;
        let dataVinho = {};

        const fluxo = [
            { key: 'wineName', q: "Olá! Leblonzito aqui. Qual o nome do rótulo?", bot: 'leblonzito' },
            { key: 'uva', q: "Oi! Ipanemita perguntando: qual a uva?", bot: 'ipanemita' },
            { key: 'pais', q: "De qual país ele é?", bot: 'leblonzito' },
            { key: 'year', q: "E qual a safra?", bot: 'ipanemita' }
        ];

        function checkAuth() {
            const pass = document.getElementById('passInput').value;
            const script = document.createElement('script');
            script.src = `${SCRIPT_URL}?action=verificarSenha&senha=${encodeURIComponent(pass)}&callback=authResult`;
            document.body.appendChild(script);
        }

        function authResult(res) {
            if (res.result === "success") {
                token = document.getElementById('passInput').value;
                document.getElementById('login-screen').style.transform = 'translateY(-100%)';
                setTimeout(() => {
                    document.getElementById('login-screen').style.display = 'none';
                    document.getElementById('chat-header').style.display = 'flex';
                    document.getElementById('chat-window').style.display = 'flex';
                    document.getElementById('input-container').style.display = 'flex';
                    addMsg(fluxo[0].q, 'leblonzito');
                    updateHeader('leblonzito');
                }, 600);
            } else { alert("Acesso negado."); }
        }

        // Função auxiliar para criar HTML do avatar com spotlight e zoom
        function getAvatarHtml(imgUrl, isIpanemita = false) {
            const ipanemitaClass = isIpanemita ? 'ipanemita-style' : '';
            return `<div class="shiba-spotlight" style="padding:3px"><img src="${imgUrl}" class="avatar-sm avatar-zoom ${ipanemitaClass}"></div>`;
        }

        function addMsg(text, type) {
            const win = document.getElementById('chat-window');
            const div = document.createElement('div');
            
            let avatarHtml = '';
            if (type === 'leblonzito') {
                avatarHtml = getAvatarHtml(IMG_L);
                div.className = 'msg msg-bot';
            } else if (type === 'ipanemita') {
                avatarHtml = getAvatarHtml(IMG_I, true);
                div.className = 'msg msg-bot';
            } else if (type === 'final') {
                // Mensagem final com os dois avatares
                avatarHtml = `<div style="display:flex; gap:-10px">
                                <div class="shiba-spotlight" style="padding:2px; z-index:2; margin-right:-15px"><img src="${IMG_L}" class="avatar-sm avatar-zoom"></div>
                                <div class="shiba-spotlight" style="padding:2px; z-index:1"><img src="${IMG_I}" class="avatar-sm avatar-zoom ipanemita-style"></div>
                              </div>`;
                div.className = 'msg msg-bot';
            } else {
                div.className = 'msg msg-user';
            }

            div.innerHTML = (type === 'user') ? `<div class="bubble">${text}</div>` : `${avatarHtml}<div class="bubble">${text}</div>`;
            win.appendChild(div);
            win.scrollTop = win.scrollHeight;
        }

        function updateHeader(bot) {
            const head = document.getElementById('header-content');
            if(bot === 'leblonzito') {
                head.innerHTML = `${getAvatarHtml(IMG_L)}
                                  <div><div style="font-weight:600; color:var(--gold)">Leblonzito</div><div style="font-size:10px; opacity:0.6">Sommelier Online</div></div>`;
            } else if(bot === 'ipanemita') {
                head.innerHTML = `${getAvatarHtml(IMG_I, true)}
                                  <div><div style="font-weight:600; color:#aaa">Ipanemita</div><div style="font-size:10px; opacity:0.6">Curadoria Inteligente</div></div>`;
            } else {
                // Header final centralizado com os dois rostos em zoom
                head.innerHTML = `<div style="display:flex; width:100%; justify-content:center; gap:10px">
                                    ${getAvatarHtml(IMG_L)}
                                    ${getAvatarHtml(IMG_I, true)}
                                  </div>`;
            }
        }

        async function sendMessage() {
            const input = document.getElementById('userInput');
            const msg = input.value.trim();
            if(!msg) return;

            addMsg(msg, 'user');
            input.value = "";
            dataVinho[fluxo[step].key] = msg;

            step++;
            if(step < fluxo.length) {
                const nextBot = fluxo[step].bot;
                setTimeout(() => {
                    updateHeader(nextBot);
                    addMsg(fluxo[step].q, nextBot);
                }, 700);
            } else {
                setTimeout(() => {
                    updateHeader('final');
                    addMsg("Tudo pronto! Vamos para as notas?", 'final');
                    document.getElementById('ratingModal').showModal();
                }, 900);
            }
        }

        function finishAll() {
            dataVinho.tokenAcesso = token;
            dataVinho.notF = document.getElementById('notF').value;
            dataVinho.notH = document.getElementById('notH').value;
            dataVinho.recompra = document.getElementById('reCompra').value;
            dataVinho.foto = document.getElementById('picUrl').value;
            fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(dataVinho) });
            alert("Vinho salvo com sucesso! 🍷🐾");
            location.href = "catalogo.html";
        }

        document.getElementById('userInput').addEventListener('keypress', (e) => { if(e.key === 'Enter') sendMessage(); });
    </script>
</body>
</html>
