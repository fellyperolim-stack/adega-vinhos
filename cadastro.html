<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastrar Vinho | Fellype & Hwlly</title>
    <style>
        :root { --vinho: #800020; --dourado: #d4af37; --bg: #0a0a0a; --card: #1a1a1a; --texto: #e0e0e0; }
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--texto); display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        
        /* ÁREA DE LOGIN */
        #login-area { background: var(--card); padding: 40px; border-radius: 15px; border: 1px solid var(--dourado); text-align: center; width: 90%; max-width: 400px; }
        
        /* FORMULÁRIO DE CADASTRO (ESCONDIDO INICIALMENTE) */
        #form-area { display: none; background: var(--card); padding: 30px; border-radius: 15px; width: 90%; max-width: 500px; border: 1px solid #333; }
        
        h2 { color: var(--dourado); margin-bottom: 20px; font-weight: 300; }
        input, select, textarea { width: 100%; padding: 12px; margin: 10px 0; background: #111; border: 1px solid #333; color: white; border-radius: 8px; box-sizing: border-box; }
        
        button { width: 100%; padding: 15px; background: var(--vinho); color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; text-transform: uppercase; transition: 0.3s; margin-top: 10px; }
        button:hover { background: #a00028; transform: scale(1.02); }
        .nav-back { display: block; margin-top: 20px; color: #666; text-decoration: none; font-size: 0.8rem; }
    </style>
</head>
<body>

    <div id="login-area">
        <h2 style="font-size: 1.2rem;">Acesso Restrito ao Sommelier</h2>
        <input type="password" id="senha" placeholder="Digite a senha secreta...">
        <button onclick="verificarAcesso()">Entrar</button>
        <a href="index.html" class="nav-back">Voltar para Home</a>
    </div>

    <div id="form-area">
        <h2>Novo Rótulo</h2>
        <form id="wineForm">
            <input type="text" name="Nome do Vinho" placeholder="Nome do Vinho" required>
            <input type="text" name="Uva(s)" placeholder="Uva(s) (Ex: Malbec, Merlot)" required>
            <input type="text" name="País" placeholder="País de Origem" required>
            <input type="number" name="Safra" placeholder="Safra (Ano)" required>
            <input type="text" name="Foto" placeholder="Link da Foto (Google Drive)">
            
            <div style="display: flex; gap: 10px;">
                <input type="number" step="0.5" name="Pontuação Fellype" placeholder="Nota Fellype" required>
                <input type="number" step="0.5" name="Pontuação Hwlly" placeholder="Nota Hwlly" required>
            </div>
            
            <button type="submit" id="btnSalvar">Salvar na Adega 🍷</button>
        </form>
    </div>

    <script>
        const SENHA_MESTRA = "1234"; // <--- MUDE SUA SENHA AQUI!
        const SCRIPT_URL = "https://script.google.com/macros/s/SEU_NOVO_LINK_AQUI/exec";

        function verificarAcesso() {
            const pass = document.getElementById('senha').value;
            if(pass === SENHA_MESTRA) {
                document.getElementById('login-area').style.display = 'none';
                document.getElementById('form-area').style.display = 'block';
            } else {
                alert("Senha incorreta!");
            }
        }

        document.getElementById('wineForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btnSalvar');
            btn.innerText = "Enviando para a planilha...";
            btn.disabled = true;

            const formData = new FormData(e.target);
            const data = Object.fromEntries(formData);

            try {
                await fetch(SCRIPT_URL, {
                    method: 'POST',
                    mode: 'no-cors', // Necessário para Google Apps Script
                    body: JSON.stringify(data)
                });
                alert("Vinho cadastrado com sucesso! 🍷");
                window.location.href = "catalogo.html";
            } catch (error) {
                alert("Erro ao salvar. Verifique o console.");
                btn.disabled = false;
                btn.innerText = "Salvar na Adega 🍷";
            }
        });
    </script>
</body>
</html>
