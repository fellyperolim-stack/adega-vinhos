<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxvM8_kK9_BXLAhhEjdmsAIgofCEjWvw-BcPXx4G1GEXeKkJwILDCkckuvg29FsiHFf/exec";
    let senhaValidada = "";

    async function checkPass() {
        const campoSenha = document.getElementById('senhaInput');
        const btnLogin = document.querySelector('#login-section button');
        const senhaDigitada = campoSenha.value;

        btnLogin.innerText = "Verificando...";
        btnLogin.disabled = true;

        try {
            // Pergunta ao Google se a senha está certa via URL (GET)
            const response = await fetch(`${SCRIPT_URL}?action=verificarSenha&senha=${senhaDigitada}`);
            const data = await response.json();

            if (data.result === "success") {
                senhaValidada = senhaDigitada; // Guarda a senha correta apenas na memória temporária
                document.getElementById('login-section').style.display = 'none';
                document.getElementById('form-section').style.display = 'block';
            } else {
                alert("Senha Inválida!");
                campoSenha.value = "";
                btnLogin.innerText = "Desbloquear";
                btnLogin.disabled = false;
            }
        } catch (err) {
            alert("Erro ao conectar com o servidor.");
            btnLogin.disabled = false;
        }
    }

    document.getElementById('wineForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const btn = document.getElementById('btnSubmit');
        btn.innerText = "Salvando...";
        btn.disabled = true;

        const formData = Object.fromEntries(new FormData(e.target));
        formData.tokenAcesso = senhaValidada; // Envia a senha para o doPost validar

        await fetch(SCRIPT_URL, {
            method: 'POST',
            mode: 'no-cors',
            body: JSON.stringify(formData)
        });

        alert("Vinho salvo com sucesso!");
        window.location.href = "catalogo.html";
    });
</script>
