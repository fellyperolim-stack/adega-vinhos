<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro Restrito | Fellype & Hwlly</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --vinho: #800020; --dourado: #d4af37; --bg: #0a0a0a; --card: #1a1a1a; --texto: #e0e0e0; }
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--texto); display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        
        .container { background: var(--card); padding: 30px; border-radius: 15px; border: 1px solid #333; width: 90%; max-width: 450px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        h2 { color: var(--dourado); text-align: center; font-weight: 300; margin-bottom: 25px; }
        
        #login-section { text-align: center; }
        #form-section { display: none; }

        input, select { width: 100%; padding: 12px; margin: 8px 0; background: #111; border: 1px solid #333; color: white; border-radius: 8px; box-sizing: border-box; outline: none; }
        input:focus { border-color: var(--dourado); }
        
        button { width: 100%; padding: 15px; background: var(--vinho); color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; text-transform: uppercase; transition: 0.3s; margin-top: 15px; }
        button:hover { background: #a00028; transform: translateY(-2px); }
        
        .back-link { display: block; text-align: center; margin-top: 20px; color: #666; text-decoration: none; font-size: 0.8rem; }
        .back-link:hover { color: var(--dourado); }
    </style>
</head>
<body>

    <div class="container">
        <div id="login-section">
            <i class="fas fa-user-lock" style="font-size: 3rem; color: var(--vinho); margin-bottom: 15px;"></i>
            <h2>Acesso do Sommelier</h2>
            <input type="password" id="senhaInput" placeholder="Senha de Acesso">
            <button onclick="checkPass()">Desbloquear</button>
            <a href="index.html" class="back-link">Sair</a>
        </div>

        <div id="form-section">
            <h2>Cadastrar Novo Vinho</h2>
            <form id="wineForm">
                <input type="text" name="Nome do Vinho" placeholder="Nome do Vinho" required>
                <input type="text" name="Uva(s)" placeholder="Uva(s)" required>
                <input type="text" name="País" placeholder="País" required>
                <input type="number" name="Safra" placeholder="Safra (Ano)" required>
                <input type="text" name="Foto" placeholder="Link da Foto (Google Drive)">
                
                <div style="display: flex; gap: 10px;">
                    <input type="number" step="0.5" name="Pontuação Fellype" placeholder="Nota Fellype" required>
                    <input type="number" step="0.5" name="Pontuação Hwlly" placeholder="Nota Hwlly" required>
                </div>
                
                <button type="submit" id="btnSubmit">Salvar na Planilha 🍷</button>
            </form>
        </div>
    </div>

    <script>
        // DEFINA SUA SENHA AQUI
        const SENHA_CORRETA = "hwlly2026"; 
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxvM8_kK9_BXLAhhEjdmsAIgofCEjWvw-BcPXx4G1GEXeKkJwILDCkckuvg29FsiHFf/exec";

        function checkPass() {
            const digitada = document.getElementById('senhaInput').value;
            if(digitada === SENHA_CORRETA) {
                document.getElementById('login-section').style.display = 'none';
                document.getElementById('form-section').style.display = 'block';
            } else {
                alert("Senha incorreta, Fellype!");
            }
        }

        document.getElementById('wineForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btnSubmit');
            btn.innerText = "Enviando...";
            btn.disabled = true;

            const data = Object.fromEntries(new FormData(e.target));

            try {
                await fetch(SCRIPT_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    body: JSON.stringify(data)
                });
                alert("Vinho registrado com sucesso!");
                window.location.href = "catalogo.html";
            } catch (err) {
                alert("Erro ao salvar dados.");
                btn.disabled = false;
                btn.innerText = "Salvar na Planilha 🍷";
            }
        });
    </script>
</body>
</html>
