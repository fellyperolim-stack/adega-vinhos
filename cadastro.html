<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VinhoChat Premium | Fellype & Hwlly</title>
    <style>
        /* [COLE AQUI TODO O CONTEÚDO DO SEU <style> ANTIGO PARA MANTER O VISUAL DARK/GOLD] */
        /* ... */
        #login-section { padding: 40px; text-align: center; }
        #form-wrapper { display: none; height: 100%; flex-direction: column; }
    </style>
</head>
<body>
    <div class="adventure-container">
        <div id="login-section">
             <img src="https://imgproxy.attic.sh/insecure/f:webp/q:90/w:750/plain/https://attic.sh/kg07d8c8yw5b3it3nvthjr8xpe00" class="guide-avatar" style="width:80px; height:80px; margin-bottom:20px">
             <h2 style="color:#d4af37; font-family:'Lora'">Adega Fellype & Hwlly</h2>
             <input type="password" id="senhaInput" placeholder="Senha de Acesso" style="width:100%; padding:15px; background:#222; border:1px solid #444; color:white; border-radius:10px">
             <button id="btnLogin" onclick="checkPass()" style="width:100%; padding:15px; background:#800020; color:white; border:none; border-radius:10px; margin-top:15px; cursor:pointer">Entrar</button>
        </div>

        <div id="form-wrapper">
            <div class="chat-header">
                <img src="https://imgproxy.attic.sh/insecure/f:webp/q:90/w:750/plain/https://attic.sh/kg07d8c8yw5b3it3nvthjr8xpe00" class="guide-avatar">
                <div class="guide-info"><h2>Leblonzito</h2><p>Curadoria Inteligente</p></div>
                <div class="progress-bottle"><div class="wine-level" id="wine-level"></div></div>
            </div>
            <div class="chat-window" id="chat-window"></div>
            <div class="input-area" id="input-area"></div>
        </div>
    </div>

    <dialog id="ratingModal">
        </dialog>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxvM8_kK9_BXLAhhEjdmsAIgofCEjWvw-BcPXx4G1GEXeKkJwILDCkckuvg29FsiHFf/exec";
        let senhaValidada = "";
        let formData = {};
        let currentRowIndex = null;

        // --- LÓGICA DE LOGIN (SEGURANÇA) ---
        function loginCallback(data) {
            if (data.result === "success") {
                senhaValidada = document.getElementById('senhaInput').value;
                document.getElementById('login-section').style.display = 'none';
                document.getElementById('form-wrapper').style.display = 'flex';
                startChat();
            } else {
                alert("Senha incorreta!");
                location.reload();
            }
        }

        function checkPass() {
            const senha = document.getElementById('senhaInput').value;
            const script = document.createElement('script');
            script.src = `${SCRIPT_URL}?action=verificarSenha&senha=${encodeURIComponent(senha)}&callback=loginCallback`;
            document.body.appendChild(script);
        }

        // --- LÓGICA DO CHAT (INTELIGÊNCIA) ---
        // Aqui você deve manter as funções startChat, askNextQuestion, handleUserInput, etc.
        // A ÚNICA MUDANÇA É: Ao chamar o Google, envie o 'tokenAcesso'

        async function finalize() {
            // ... (coleta os dados finais dos inputs do card)
            formData.tokenAcesso = senhaValidada; // SEGURANÇA AQUI
            
            // Chama o salvamento principal
            google.script.run.withSuccessHandler(res => {
                currentRowIndex = res.rowIndex;
                // Mostra botão de avaliar...
            }).processFormInput(formData);
        }

        async function saveFullReview() {
            const reviewData = {
                tokenAcesso: senhaValidada, // SEGURANÇA AQUI
                rowIndex: currentRowIndex,
                ratingFellype: document.getElementById('ratingFellype').value,
                ratingHwlly: document.getElementById('ratingHwlly').value,
                wouldBuy: document.getElementById('wouldBuy').value,
                base64Photo: photoBase64
            };
            google.script.run.saveRatings(reviewData);
        }
    </script>
</body>
</html>
