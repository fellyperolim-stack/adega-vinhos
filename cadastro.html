<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leblonzito | Exclusive Sommelier</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #d4af37;
            --gold-dark: #aa8928;
            --wine: #4a0e0e;
            --black: #050505;
            --glass: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body, html {
            margin: 0; height: 100%; font-family: 'Outfit', sans-serif;
            background: var(--black); color: #fff; overflow: hidden;
        }

        /* Fundo Animado */
        .bg-gradient {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 50% 50%, #1a0505 0%, #050505 100%);
            z-index: -1;
        }

        .main-wrapper {
            display: flex; justify-content: center; align-items: center;
            height: 100vh; padding: 20px;
        }

        .chat-card {
            width: 100%; max-width: 480px; height: 85vh;
            background: var(--glass); backdrop-filter: blur(25px);
            border: 1px solid var(--glass-border); border-radius: 40px;
            display: flex; flex-direction: column; overflow: hidden;
            box-shadow: 0 30px 60px rgba(0,0,0,0.8);
            position: relative;
        }

        /* Login Screen */
        #login-screen {
            position: absolute; inset: 0; z-index: 10;
            display: flex; flex-direction: column; justify-content: center;
            align-items: center; background: var(--black); padding: 40px;
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .avatar-lg {
            width: 120px; height: 120px; border-radius: 35px;
            border: 3px solid var(--gold); margin-bottom: 20px;
            box-shadow: 0 0 30px rgba(212, 175, 55, 0.3);
        }

        h1 { font-family: 'Cinzel', serif; color: var(--gold); margin: 0; font-size: 24px; letter-spacing: 2px; }
        
        .input-premium {
            width: 100%; max-width: 280px; background: rgba(255,255,255,0.05);
            border: 1px solid var(--glass-border); border-radius: 15px;
            padding: 15px; color: white; text-align: center; margin-top: 30px;
            font-size: 18px; outline: none; transition: 0.3s;
        }

        .input-premium:focus { border-color: var(--gold); box-shadow: 0 0 15px rgba(212,175,55,0.2); }

        /* Header do Chat */
        .chat-header {
            padding: 25px; border-bottom: 1px solid var(--glass-border);
            display: flex; align-items: center; gap: 15px;
        }

        .avatar-sm { width: 45px; height: 45px; border-radius: 12px; border: 1px solid var(--gold); }

        /* Janela de Mensagens */
        .chat-window {
            flex-grow: 1; padding: 25px; overflow-y: auto;
            display: flex; flex-direction: column; gap: 20px;
            scrollbar-width: none;
        }

        .msg { max-width: 80%; animation: msgPop 0.4s ease-out; }
        .msg-bot { align-self: flex-start; }
        .msg-user { align-self: flex-end; }

        .bubble {
            padding: 14px 18px; border-radius: 22px; font-size: 15px;
            line-height: 1.6; position: relative;
        }

        .msg-bot .bubble {
            background: linear-gradient(135deg, #fff, #f0f0f0);
            color: var(--black); border-bottom-left-radius: 4px;
        }

        .msg-user .bubble {
            background: linear-gradient(135deg, var(--wine), #2a0707);
            color: #fff; border-bottom-right-radius: 4px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        /* Input Area */
        .input-container {
            padding: 20px; background: rgba(0,0,0,0.4);
            display: flex; gap: 12px; align-items: center;
        }

        .msg-input {
            flex-grow: 1; background: var(--glass); border: 1px solid var(--glass-border);
            border-radius: 20px; padding: 12px 20px; color: white; outline: none;
        }

        .send-btn {
            background: var(--gold); width: 45px; height: 45px; border-radius: 50%;
            border: none; cursor: pointer; display: flex; align-items: center; justify-content: center;
            transition: 0.3s;
        }

        .send-btn:hover { transform: scale(1.1); background: var(--gold-dark); }

        @keyframes msgPop {
            from { opacity: 0; transform: scale(0.9) translateY(10px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }

        /* Modal Ultra Premium */
        dialog {
            border: none; background: var(--black); border: 1px solid var(--gold);
            border-radius: 30px; padding: 30px; width: 90%; max-width: 380px; color: #fff;
        }

        dialog::backdrop { background: rgba(0,0,0,0.85); backdrop-filter: blur(10px); }

        .modal-field { margin-bottom: 20px; }
        .modal-field label { display: block; font-size: 11px; color: var(--gold); margin-bottom: 8px; font-weight: 600; text-transform: uppercase; }
        .modal-field input, .modal-field select {
            width: 100%; background: var(--glass); border: 1px solid var(--glass-border);
            padding: 12px; border-radius: 12px; color: white; outline: none;
        }

        .btn-gold {
            width: 100%; padding: 15px; background: var(--gold); color: var(--black);
            border: none; border-radius: 15px; font-weight: 700; cursor: pointer;
            text-transform: uppercase; letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <div class="bg-gradient"></div>

    <div class="main-wrapper">
        <div class="chat-card">
            
            <div id="login-screen">
                <img src="https://imgproxy.attic.sh/insecure/f:webp/q:90/w:750/plain/https://attic.sh/kg07d8c8yw5b3it3nvthjr8xpe00" class="avatar-lg">
                <h1>Leblonzito</h1>
                <input type="password" id="passInput" class="input-premium" placeholder="Acesso Privado">
                <button onclick="checkAuth()" class="btn-gold" style="margin-top:20px; max-width:200px">Entrar</button>
            </div>

            <div id="chat-header" class="chat-header" style="display:none">
                <img src="https://imgproxy.attic.sh/insecure/f:webp/q:90/w:750/plain/https://attic.sh/kg07d8c8yw5b3it3nvthjr8xpe00" class="avatar-sm">
                <div>
                    <div style="font-weight:600; color:var(--gold)">Leblonzito</div>
                    <div style="font-size:10px; opacity:0.6">Curadoria Inteligente</div>
                </div>
            </div>

            <div id="chat-window" class="chat-window" style="display:none"></div>

            <div id="input-container" class="input-container" style="display:none">
                <input type="text" id="userInput" class="msg-input" placeholder="Envie uma mensagem...">
                <button class="send-btn" onclick="sendMessage()">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"/></svg>
                </button>
            </div>
        </div>
    </div>

    <dialog id="ratingModal">
        <h2 style="font-family:'Cinzel'; text-align:center; margin-bottom:25px; color:var(--gold)">Avaliação</h2>
        <div class="modal-field"><label>Nota Fellype</label><input type="number" id="notF" placeholder="0-100"></div>
        <div class="modal-field"><label>Nota Hwlly</label><input type="number" id="notH" placeholder="0-100"></div>
        <div class="modal-field">
            <label>Recompraria?</label>
            <select id="reCompra"><option value="Sim">Com certeza</option><option value="Não">Desta vez não</option></select>
        </div>
        <div class="modal-field"><label>Foto (Link Drive)</label><input type="text" id="picUrl" placeholder="URL da imagem"></div>
        <button class="btn-gold" onclick="finishAll()">Concluir Registro</button>
    </dialog>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxvM8_kK9_BXLAhhEjdmsAIgofCEjWvw-BcPXx4G1GEXeKkJwILDCkckuvg29FsiHFf/exec";
        let token = "";
        let step = 0;
        let dataVinho = {};

        const fluxo = [
            { key: 'wineName', q: "Seja bem-vindo à adega. Qual rótulo vamos degustar hoje?" },
            { key: 'uva', q: "E as uvas? Pode me dizer a casta principal?" },
            { key: 'pais', q: "De qual país ele veio?" },
            { key: 'year', q: "Para finalizar o básico, qual a safra?" }
        ];

        // Autenticação
        function checkAuth() {
            const pass = document.getElementById('passInput').value;
            const script = document.createElement('script');
            script.src = `${SCRIPT_URL}?action=verificarSenha&senha=${encodeURIComponent(pass)}&callback=authResult`;
            document.body.appendChild(script);
        }

        function authResult(res) {
            if (res.result === "success") {
                token = document.getElementById('passInput').value;
                document.getElementById('login-screen').style.transform = 'translateY(-100%)';
                setTimeout(() => {
                    document.getElementById('login-screen').style.display = 'none';
                    document.getElementById('chat-header').style.display = 'flex';
                    document.getElementById('chat-window').style.display = 'flex';
                    document.getElementById('input-container').style.display = 'flex';
                    addMsg(fluxo[0].q, 'bot');
                }, 600);
            } else {
                alert("Acesso negado.");
            }
        }

        function addMsg(text, type) {
            const win = document.getElementById('chat-window');
            const div = document.createElement('div');
            div.className = `msg msg-${type}`;
            div.innerHTML = `<div class="bubble">${text}</div>`;
            win.appendChild(div);
            win.scrollTop = win.scrollHeight;
        }

        async function sendMessage() {
            const input = document.getElementById('userInput');
            const msg = input.value.trim();
            if(!msg) return;

            addMsg(msg, 'user');
            input.value = "";
            dataVinho[fluxo[step].key] = msg;

            step++;
            if(step < fluxo.length) {
                setTimeout(() => addMsg(fluxo[step].q, 'bot'), 600);
            } else {
                setTimeout(() => {
                    addMsg("Perfeito! Registrando dados básicos... Gostaria de dar sua nota agora?", 'bot');
                    document.getElementById('ratingModal').showModal();
                }, 800);
            }
        }

        function finishAll() {
            dataVinho.tokenAcesso = token;
            dataVinho.notF = document.getElementById('notF').value;
            dataVinho.notH = document.getElementById('notH').value;
            dataVinho.recompra = document.getElementById('reCompra').value;
            dataVinho.foto = document.getElementById('picUrl').value;

            // Envio silencioso para a planilha
            fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(dataVinho) });

            alert("Vinho catalogado com maestria! 🍷");
            location.href = "catalogo.html";
        }

        // Listener de Enter
        document.getElementById('userInput').addEventListener('keypress', (e) => {
            if(e.key === 'Enter') sendMessage();
        });
    </script>
</body>
</html>
