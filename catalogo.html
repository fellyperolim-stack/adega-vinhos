<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nossa Adega | Fellype & Hwlly</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --vinho-vivo: #800020; --dourado: #d4af37; --bg: #0a0a0a; --card: #1a1a1a; --texto: #e0e0e0;
        }
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--texto); }

        /* NAVBAR IGUAL À HOME */
        .navbar { background: #000; display: flex; justify-content: space-between; align-items: center; padding: 15px 5%; border-bottom: 1px solid #222; position: sticky; top: 0; z-index: 1000; }
        .nav-logo a { color: var(--dourado); text-decoration: none; font-weight: bold; font-size: 1.2rem; text-transform: uppercase; }
        .nav-links { list-style: none; display: flex; gap: 20px; }
        .nav-links a { text-decoration: none; color: #ccc; font-size: 0.8rem; text-transform: uppercase; }
        .nav-links a:hover { color: var(--dourado); }

        /* CABEÇALHO DO CATÁLOGO */
        .header-section { text-align: center; padding: 40px 20px; background: linear-gradient(to bottom, #111, #0a0a0a); }
        .header-section h1 { color: var(--dourado); margin-bottom: 10px; font-weight: 300; }
        #search { width: 100%; max-width: 600px; padding: 12px 20px; border-radius: 25px; border: 1px solid #333; background: #111; color: white; outline: none; margin-top: 20px; }

        /* GRID DE VINHOS */
        .vinho-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 30px; padding: 40px 5%; max-width: 1400px; margin: 0 auto; }
        .vinho-card { background: var(--card); border-radius: 12px; overflow: hidden; border: 1px solid #222; transition: 0.3s; position: relative; }
        .vinho-card:hover { transform: translateY(-5px); border-color: var(--vinho-vivo); }
        
        .vinho-img-container { width: 100%; height: 280px; background: #111; overflow: hidden; display: flex; align-items: center; justify-content: center; }
        .vinho-img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.5s ease; }
        .vinho-card:hover .vinho-img { transform: scale(1.05); }
        
        .vinho-info { padding: 20px; }
        .vinho-nome { font-size: 1.2rem; color: var(--dourado); margin: 0 0 10px 0; }
        .vinho-detalhes { font-size: 0.9rem; color: #aaa; margin-bottom: 15px; min-height: 45px; }
        .notas { display: flex; justify-content: space-between; border-top: 1px solid #333; padding-top: 15px; font-weight: bold; }
        .nota-box { text-align: center; flex: 1; }
        .nota-box span { display: block; font-size: 0.7rem; color: #666; text-transform: uppercase; }
        .nota-valor { color: var(--vinho-vivo); font-size: 1.1rem; }

        #loading { text-align: center; padding: 50px; color: var(--dourado); font-style: italic; }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="nav-logo"><a href="index.html">Fellype & Hwlly</a></div>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="catalogo.html" style="color: var(--dourado);">Adega</a></li>
            <li><a href="cadastro.html">Cadastrar</a></li>
        </ul>
    </nav>

    <div class="header-section">
        <h1>Nossa Coleção de Memórias</h1>
        <p>Explore os rótulos que marcaram nossa jornada.</p>
        <input type="text" id="search" placeholder="Busque por nome, uva ou país...">
    </div>

    <div id="loading">Consultando o sommelier... 🍷</div>
    <div class="vinho-grid" id="vinho-grid"></div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxvM8_kK9_BXLAhhEjdmsAIgofCEjWvw-BcPXx4G1GEXeKkJwILDCkckuvg29FsiHFf/exec";
        
        // IMAGEM PADRÃO (PLACEHOLDER)
        const IMG_PADRAO = "https://images.unsplash.com/photo-1584916201218-f4242ceb4809?q=80&w=600&auto=format&fit=crop";

        let vinhos = [];

        async function fetchVinhos() {
            try {
                const response = await fetch(SCRIPT_URL);
                vinhos = await response.json();
                renderVinhos(vinhos);
                document.getElementById('loading').style.display = 'none';
            } catch (error) {
                document.getElementById('loading').innerHTML = "Erro ao carregar adega. Verifique a conexão.";
            }
        }

        function renderVinhos(lista) {
            const grid = document.getElementById('vinho-grid');
            grid.innerHTML = lista.map(v => {
                // Verifica se existe foto e se não é apenas um link vazio ou espaço
                const temFoto = v["Foto"] && v["Foto"].toString().trim().length > 10;
                const urlFoto = temFoto ? v["Foto"] : IMG_PADRAO;

                return `
                <div class="vinho-card">
                    <div class="vinho-img-container">
                        <img class="vinho-img" 
                             src="${urlFoto}" 
                             alt="Vinho" 
                             onerror="this.src='${IMG_PADRAO}'">
                    </div>
                    <div class="vinho-info">
                        <h3 class="vinho-nome">${v["Nome do Vinho"]}</h3>
                        <div class="vinho-detalhes">
                            <span>🍇 ${v["Uva(s)"]}</span><br>
                            <span>🌍 ${v["País"]} | ${v["Safra"]}</span>
                        </div>
                        <div class="notas">
                            <div class="nota-box"><span>Fellype</span><div class="nota-valor">${v["Pontuação Fellype"] || '-'}</div></div>
                            <div class="nota-box"><span>Hwlly</span><div class="nota-valor">${v["Pontuação Hwlly"] || '-'}</div></div>
                        </div>
                    </div>
                </div>
                `;
            }).join('');
        }

        // Busca Viva
        document.getElementById('search').addEventListener('input', (e) => {
            const termo = e.target.value.toLowerCase();
            const filtrados = vinhos.filter(v => 
                v["Nome do Vinho"].toLowerCase().includes(termo) ||
                (v["Uva(s)"] && v["Uva(s)"].toLowerCase().includes(termo)) ||
                (v["País"] && v["País"].toLowerCase().includes(termo))
            );
            renderVinhos(filtrados);
        });

        fetchVinhos();
    </script>
</body>
</html>
