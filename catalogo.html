<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catálogo Completo de Vinhos - Fellype & Hwlly</title>
    <meta name="description" content="Explore nossa lista completa com mais de 95 vinhos degustados. Filtre por país, uva ou vinícola.">
    <meta property="og:title" content="Nossa Adega Digital - Catálogo Completo">
    <meta property="og:description" content="Explore nossa lista completa com mais de 95 vinhos degustados.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://fellypehwlly-vinhos.space/catalogo.html">
    <meta property="og:image" content="https://cdn-icons-png.flaticon.com/512/5821/5821090.png">
    <meta property="og:locale" content="pt_BR">

    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#800020">
    <link rel="icon" type="image/png" href="https://cdn-icons-png.flaticon.com/512/5821/5821090.png">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="shared.css">

    <style>
        /* --- CABEÇALHO --- */
        .search-section {
            padding: 65px 20px 15px;
            text-align: center;
            background: linear-gradient(to bottom, #0e0507, var(--bg));
        }

        .search-section h1 {
            color: var(--dourado);
            font-size: 2rem;
            font-family: 'Cinzel', serif;
            letter-spacing: 4px;
            margin-bottom: 6px;
        }

        .search-section h1::after {
            content: '';
            display: block;
            width: 36px;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--dourado), transparent);
            margin: 12px auto 0;
        }

        .search-section p.sub-titulo {
            color: var(--subtexto);
            font-size: 0.88rem;
            font-style: italic;
            margin-bottom: 28px;
            margin-top: 16px;
            opacity: 0.8;
            font-family: 'Outfit', sans-serif;
        }

        .search-container { position: relative; max-width: 580px; margin: 0 auto 20px; }
        .search-container i { position: absolute; left: 20px; top: 50%; transform: translateY(-50%); color: var(--dourado); opacity: 0.7; }

        #search {
            width: 100%;
            padding: 14px 20px 14px 54px;
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            background: rgba(255, 255, 255, 0.03);
            color: var(--texto);
            outline: none;
            transition: var(--transicao);
            font-size: 0.92rem;
            font-family: 'Outfit', sans-serif;
            letter-spacing: 0.3px;
        }
        #search::placeholder { color: #555; }
        #search:focus { border-color: rgba(201, 162, 39, 0.4); background: rgba(255, 255, 255, 0.04); }

        /* --- FILTROS --- */
        .filters-bar {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 8px;
            padding: 0 20px 25px;
            max-width: 900px;
            margin: 0 auto;
        }

        .filter-chip {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            color: #888;
            padding: 6px 18px;
            border-radius: 20px;
            font-size: 0.72rem;
            cursor: pointer;
            transition: var(--transicao);
            font-family: 'Outfit', sans-serif;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .filter-chip:hover { border-color: rgba(201, 162, 39, 0.4); color: var(--dourado-claro); }
        .filter-chip.active {
            background: linear-gradient(135deg, var(--vinho-vivo), var(--vinho-escuro));
            border-color: rgba(201, 162, 39, 0.2);
            color: rgba(255, 255, 255, 0.9);
        }

        .sort-bar {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 6px;
            padding: 0 20px 20px;
            font-family: 'Outfit', sans-serif;
            font-size: 0.72rem;
            color: #555;
            letter-spacing: 0.5px;
        }

        .sort-btn {
            background: none;
            border: 1px solid rgba(255, 255, 255, 0.07);
            color: #666;
            padding: 5px 12px;
            border-radius: 6px;
            font-size: 0.72rem;
            cursor: pointer;
            transition: var(--transicao);
            font-family: 'Outfit', sans-serif;
            font-weight: 500;
            letter-spacing: 0.5px;
        }
        .sort-btn:hover { border-color: rgba(201, 162, 39, 0.4); color: var(--dourado); }
        .sort-btn.active { border-color: rgba(201, 162, 39, 0.4); color: var(--dourado); background: rgba(201, 162, 39, 0.06); }

        /* --- GRID E CARDS --- */
        .vinho-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 24px;
            padding: 20px 5% 70px;
            max-width: 1300px;
            margin: 0 auto;
        }

        .vinho-card {
            background: var(--card);
            border-radius: 14px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.06);
            transition: var(--transicao);
            cursor: pointer;
            box-shadow: var(--sombra-card);
        }
        .vinho-card:hover {
            transform: translateY(-7px);
            border-color: rgba(201, 162, 39, 0.3);
            box-shadow: var(--sombra-hover);
        }

        .vinho-img-container { width: 100%; height: 280px; background: #000; overflow: hidden; }
        .vinho-img { width: 100%; height: 100%; object-fit: cover; transition: 0.5s ease; }
        .vinho-card:hover .vinho-img { transform: scale(1.04); }

        .vinho-info { padding: 20px; }

        .vinho-nome {
            font-size: 1rem;
            color: var(--dourado-claro);
            margin: 0 0 6px 0;
            font-family: 'Cinzel', serif;
            font-weight: 400;
            letter-spacing: 0.5px;
            line-height: 1.4;
        }

        .vinho-data {
            font-size: 0.72rem;
            color: #555;
            display: block;
            margin-bottom: 12px;
            font-family: 'Outfit', sans-serif;
            letter-spacing: 0.5px;
        }

        .vinho-detalhes {
            font-size: 0.82rem;
            color: #888;
            margin-bottom: 18px;
            line-height: 1.6;
            font-family: 'Outfit', sans-serif;
        }

        .notas {
            display: flex;
            justify-content: space-between;
            border-top: 1px solid rgba(255, 255, 255, 0.06);
            padding-top: 14px;
        }

        .nota-box { text-align: center; flex: 1; }

        .nota-box span {
            display: block;
            font-size: 0.58rem;
            color: #555;
            text-transform: uppercase;
            font-family: 'Outfit', sans-serif;
            letter-spacing: 1.5px;
            font-weight: 600;
            margin-bottom: 3px;
        }

        .nota-valor {
            color: var(--dourado);
            font-size: 1.2rem;
            font-weight: 600;
            font-family: 'Cinzel', serif;
        }

        /* --- EMPTY STATE --- */
        .empty-state {
            text-align: center;
            padding: 80px 20px;
            color: var(--subtexto);
            font-family: 'Outfit', sans-serif;
            grid-column: 1 / -1;
        }
        .empty-state i { font-size: 2.5rem; color: #2a2a2a; margin-bottom: 18px; display: block; }
        .empty-state h3 { color: #444; font-size: 1rem; margin: 0 0 8px; font-weight: 400; font-family: 'Cinzel', serif; letter-spacing: 1px; }
        .empty-state p { margin: 0; font-size: 0.85rem; color: #555; }

        .btn-limpar {
            display: inline-block;
            margin-top: 18px;
            padding: 8px 22px;
            border: 1px solid rgba(201, 162, 39, 0.4);
            color: var(--dourado);
            border-radius: 20px;
            font-size: 0.72rem;
            cursor: pointer;
            background: none;
            font-family: 'Outfit', sans-serif;
            font-weight: 500;
            letter-spacing: 1px;
            text-transform: uppercase;
            transition: 0.2s;
        }
        .btn-limpar:hover { background: var(--dourado); color: #000; }

        /* --- SKELETON --- */
        .skeleton-card { background: var(--card); border-radius: 14px; overflow: hidden; border: 1px solid rgba(255,255,255,0.04); }
        .sk-img { height: 280px; }
        .sk-body { padding: 20px; }
        .sk-line { height: 13px; border-radius: 4px; margin-bottom: 10px; }
        .sk-line.short { width: 40%; }
        .sk-line.med { width: 70%; }

        /* --- RESULTADO COUNT --- */
        .result-count {
            text-align: center;
            font-family: 'Outfit', sans-serif;
            font-size: 0.72rem;
            color: #555;
            letter-spacing: 1px;
            padding-bottom: 10px;
            text-transform: uppercase;
        }

        @media (max-width: 992px) {
            .search-section { padding: 45px 15px 10px; }
            .search-section h1 { font-size: 1.7rem; }
            .vinho-grid { grid-template-columns: 1fr; padding: 20px 5%; gap: 16px; }
            .vinho-img-container { height: 250px; }
        }
    </style>
</head>
<body>

    <div id="navbar-placeholder"></div>

    <div class="search-section">
        <h1>Nossa Adega</h1>
        <p class="sub-titulo">Um catálogo vivo de nossas melhores experiências e descobertas 🍷✨</p>
        <div class="search-container">
            <i class="fas fa-search" aria-hidden="true"></i>
            <input type="text" id="search" placeholder="Pesquisar vinho, uva ou país..." aria-label="Pesquisar vinho">
        </div>
    </div>

    <div class="filters-bar" id="filters-bar">
        <button class="filter-chip active" data-filter="todos">Todos</button>
        <button class="filter-chip" data-filter="Tinto">🍷 Tintos</button>
        <button class="filter-chip" data-filter="Branco">🥂 Brancos</button>
        <button class="filter-chip" data-filter="Rosé">🌸 Rosés</button>
        <button class="filter-chip" data-filter="Espumante">✨ Espumantes</button>
    </div>

    <div class="sort-bar">
        <span>Ordenar:</span>
        <button class="sort-btn active" data-sort="recentes">Mais Recentes</button>
        <button class="sort-btn" data-sort="nota-desc">Maior Nota</button>
        <button class="sort-btn" data-sort="nota-asc">Menor Nota</button>
        <button class="sort-btn" data-sort="az">A–Z</button>
    </div>

    <div class="result-count" id="result-count"></div>

    <!-- Skeleton loading -->
    <div class="vinho-grid" id="skeleton-grid">
        <div class="skeleton-card"><div class="sk-img skeleton"></div><div class="sk-body"><div class="sk-line skeleton med"></div><div class="sk-line skeleton short"></div><div class="sk-line skeleton med"></div></div></div>
        <div class="skeleton-card"><div class="sk-img skeleton"></div><div class="sk-body"><div class="sk-line skeleton med"></div><div class="sk-line skeleton short"></div><div class="sk-line skeleton med"></div></div></div>
        <div class="skeleton-card"><div class="sk-img skeleton"></div><div class="sk-body"><div class="sk-line skeleton med"></div><div class="sk-line skeleton short"></div><div class="sk-line skeleton med"></div></div></div>
        <div class="skeleton-card"><div class="sk-img skeleton"></div><div class="sk-body"><div class="sk-line skeleton med"></div><div class="sk-line skeleton short"></div><div class="sk-line skeleton med"></div></div></div>
        <div class="skeleton-card"><div class="sk-img skeleton"></div><div class="sk-body"><div class="sk-line skeleton med"></div><div class="sk-line skeleton short"></div><div class="sk-line skeleton med"></div></div></div>
        <div class="skeleton-card"><div class="sk-img skeleton"></div><div class="sk-body"><div class="sk-line skeleton med"></div><div class="sk-line skeleton short"></div><div class="sk-line skeleton med"></div></div></div>
    </div>

    <div class="vinho-grid" id="vinho-grid" style="display:none;"></div>

    <div id="footer-placeholder"></div>

    <script src="nav.js"></script>
    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxvM8_kK9_BXLAhhEjdmsAIgofCEjWvw-BcPXx4G1GEXeKkJwILDCkckuvg29FsiHFf/exec";
        const IMG_PADRAO = "https://images.unsplash.com/photo-1584916201218-f4242ceb4809?q=80&w=600&auto=format&fit=crop";
        let vinhos = [];
        let filtroAtual = 'todos';
        let ordenacaoAtual = 'recentes';
        let buscaAtual = '';

        function parseFloat2(val) {
            if (!val) return 0;
            return parseFloat(String(val).replace(',', '.')) || 0;
        }

        async function fetchVinhos() {
            try {
                vinhos = await fetchWithCache(SCRIPT_URL);

                // Verificar parâmetro de URL
                const params = new URLSearchParams(window.location.search);
                if (params.get('filtro') === 'ultimos') {
                    ordenacaoAtual = 'recentes';
                    document.querySelector('[data-sort="recentes"]').classList.add('active');
                }

                document.getElementById('skeleton-grid').style.display = 'none';
                document.getElementById('vinho-grid').style.display = 'grid';
                aplicarFiltros();
            } catch (e) {
                document.getElementById('skeleton-grid').innerHTML = `
                    <div class="empty-state" style="grid-column:1/-1">
                        <i class="fas fa-exclamation-triangle"></i>
                        <h3>Erro ao carregar a adega</h3>
                        <p>Tente recarregar a página.</p>
                    </div>`;
            }
        }

        function aplicarFiltros() {
            let lista = [...vinhos];

            // Filtro por tipo
            if (filtroAtual !== 'todos') {
                lista = lista.filter(v => {
                    const tipo = (v['Tipo'] || v['tipo'] || '').toLowerCase();
                    return tipo.includes(filtroAtual.toLowerCase());
                });
            }

            // Busca textual
            if (buscaAtual) {
                lista = lista.filter(v =>
                    Object.values(v).some(val => val && val.toString().toLowerCase().includes(buscaAtual))
                );
            }

            // Ordenação
            if (ordenacaoAtual === 'nota-desc') {
                lista.sort((a, b) => {
                    const ma = (parseFloat2(a['Pontuação Fellype']) + parseFloat2(a['Pontuação Hwlly'])) / 2;
                    const mb = (parseFloat2(b['Pontuação Fellype']) + parseFloat2(b['Pontuação Hwlly'])) / 2;
                    return mb - ma;
                });
            } else if (ordenacaoAtual === 'nota-asc') {
                lista.sort((a, b) => {
                    const ma = (parseFloat2(a['Pontuação Fellype']) + parseFloat2(a['Pontuação Hwlly'])) / 2;
                    const mb = (parseFloat2(b['Pontuação Fellype']) + parseFloat2(b['Pontuação Hwlly'])) / 2;
                    return ma - mb;
                });
            } else if (ordenacaoAtual === 'az') {
                lista.sort((a, b) => (a['Nome do Vinho'] || '').localeCompare(b['Nome do Vinho'] || ''));
            }
            // 'recentes' = ordem padrão da API

            renderVinhos(lista);
        }

        function renderVinhos(lista) {
            const grid = document.getElementById('vinho-grid');
            const count = document.getElementById('result-count');

            if (lista.length === 0) {
                count.textContent = '';
                grid.innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-wine-glass"></i>
                        <h3>Nenhum vinho encontrado</h3>
                        <p>Tente outros termos ou limpe os filtros.</p>
                        <button class="btn-limpar" onclick="limparFiltros()">Limpar filtros</button>
                    </div>`;
                return;
            }

            count.textContent = lista.length + ' vinho' + (lista.length !== 1 ? 's' : '');

            grid.innerHTML = lista.map(v => {
                let urlFinal = IMG_PADRAO;
                const fotoRaw = v['Foto'] || v['foto'];
                if (fotoRaw && fotoRaw.length > 10) {
                    if (fotoRaw.startsWith('data:image')) {
                        urlFinal = fotoRaw;
                    } else if (fotoRaw.includes('drive.google.com')) {
                        const id = fotoRaw.match(/[-\w]{25,}/);
                        urlFinal = id ? `https://lh3.googleusercontent.com/d/${id[0]}` : fotoRaw;
                    } else {
                        urlFinal = fotoRaw;
                    }
                }

                const notaF = parseFloat2(v['Pontuação Fellype']);
                const notaH = parseFloat2(v['Pontuação Hwlly']);

                const vinhoObj = {
                    nome: v['Nome do Vinho'],
                    produtor: v['Produtor'] || v['Vinícola'] || '',
                    pais: v['País'] || v['Pais'],
                    regiao: v['Região'] || v['Regiao'],
                    uva: v['Uva(s)'] || v['Uva'],
                    tipo: v['Tipo'],
                    safra: v['Safra'],
                    teor: v['Teor Alcoólico'] || v['Teor'],
                    classificacao: v['Classificação'] || v['Classificacao'],
                    data: v['Ano de Consumo'] || v['Data'],
                    notaF: notaF || null,
                    notaH: notaH || null,
                    foto: urlFinal,
                };

                return `
                <div class="vinho-card" onclick='WineModal.open(${JSON.stringify(vinhoObj).replace(/'/g, "\\'")})' tabindex="0" role="button" aria-label="Ver detalhes de ${v['Nome do Vinho'] || 'Rótulo Especial'}">
                    <div class="vinho-img-container">
                        <img class="vinho-img" src="${urlFinal}" loading="lazy" onerror="this.src='${IMG_PADRAO}'" alt="${v['Nome do Vinho'] || 'Foto do vinho'}">
                    </div>
                    <div class="vinho-info">
                        <h3 class="vinho-nome">${v['Nome do Vinho'] || 'Rótulo Especial'}</h3>
                        <span class="vinho-data"><i class="far fa-calendar-alt" aria-hidden="true"></i> ${v['Ano de Consumo'] || 'N/A'}</span>
                        <div class="vinho-detalhes">
                            <span>🍇 ${v['Uva(s)'] || 'N/A'}</span><br>
                            <span>🌍 ${v['País'] || 'N/A'} ${v['Safra'] ? '| ' + v['Safra'] : ''}</span>
                        </div>
                        <div class="notas">
                            <div class="nota-box">
                                <span>Fellype</span>
                                <div class="nota-valor">${notaF || '—'}</div>
                            </div>
                            <div class="nota-box">
                                <span>Hwlly</span>
                                <div class="nota-valor">${notaH || '—'}</div>
                            </div>
                        </div>
                    </div>
                </div>`;
            }).join('');

            // Tecla Enter nos cards (acessibilidade)
            grid.querySelectorAll('[role="button"]').forEach(card => {
                card.addEventListener('keypress', (e) => {
                    if (e.key === 'Enter') card.click();
                });
            });
        }

        function limparFiltros() {
            buscaAtual = '';
            filtroAtual = 'todos';
            document.getElementById('search').value = '';
            document.querySelectorAll('.filter-chip').forEach(c => c.classList.toggle('active', c.dataset.filter === 'todos'));
            aplicarFiltros();
        }

        // Busca
        document.getElementById('search').addEventListener('input', (e) => {
            buscaAtual = e.target.value.toLowerCase();
            aplicarFiltros();
        });

        // Filtros por tipo
        document.getElementById('filters-bar').addEventListener('click', (e) => {
            const chip = e.target.closest('.filter-chip');
            if (!chip) return;
            document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
            chip.classList.add('active');
            filtroAtual = chip.dataset.filter;
            aplicarFiltros();
        });

        // Ordenação
        document.querySelectorAll('.sort-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.sort-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                ordenacaoAtual = btn.dataset.sort;
                aplicarFiltros();
            });
        });

        fetchVinhos();
    </script>
</body>
</html>
