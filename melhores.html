<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vinhos do Mês - Fellype & Hwlly</title>
    <meta name="description" content="Nossa seleção mensal dos vinhos que mais nos surpreenderam. Veja as notas técnicas e por que eles foram os escolhidos.">
    <meta property="og:title" content="Os Melhores Vinhos do Mês | Adega F&H">
    <meta property="og:description" content="Nossa seleção mensal dos vinhos que mais nos surpreenderam.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://fellypehwlly-vinhos.space/melhores.html">
    <meta property="og:image" content="https://cdn-icons-png.flaticon.com/512/5821/5821090.png">
    <meta property="og:locale" content="pt_BR">

    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#800020">
    <link rel="icon" type="image/png" href="https://cdn-icons-png.flaticon.com/512/5821/5821090.png">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="shared.css">

    <style>
        .search-section {
            padding: 65px 20px 25px;
            text-align: center;
            background: linear-gradient(to bottom, #0e0507, var(--bg));
        }

        .search-section h1 {
            color: var(--dourado);
            font-size: 1.9rem;
            font-family: 'Cinzel', serif;
            letter-spacing: 4px;
            margin: 0;
            text-transform: uppercase;
        }

        .search-section h1::after {
            content: '';
            display: block;
            width: 36px;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--dourado), transparent);
            margin: 12px auto 0;
        }

        .search-section p {
            color: var(--subtexto);
            font-size: 0.85rem;
            font-style: italic;
            margin: 16px 0 0;
            font-family: 'Outfit', sans-serif;
            opacity: 0.8;
        }

        .vinho-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 22px;
            padding: 30px 5% 70px;
            max-width: 1400px;
            margin: 0 auto;
        }

        .vinho-card {
            background: var(--card);
            border-radius: 14px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.06);
            display: flex;
            flex-direction: column;
            box-shadow: var(--sombra-card);
            transition: var(--transicao);
        }

        .vinho-card:hover {
            border-color: rgba(201, 162, 39, 0.2);
            box-shadow: var(--sombra-hover);
        }

        .mes-destaque {
            background: linear-gradient(90deg, var(--vinho-escuro), #2a0110);
            color: var(--dourado-claro);
            padding: 11px 16px;
            border-bottom: 1px solid rgba(201, 162, 39, 0.2);
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
        }

        .mes-label {
            font-weight: 600;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            flex: 1;
            min-width: fit-content;
            font-family: 'Outfit', sans-serif;
        }

        .medalhas-toggle { display: flex; gap: 6px; }

        .btn-medalha {
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(201, 162, 39, 0.2);
            cursor: pointer;
            padding: 5px 10px;
            border-radius: 6px;
            display: flex;
            align-items: center;
            gap: 5px;
            filter: grayscale(100%);
            opacity: 0.5;
            transition: var(--transicao);
        }
        .btn-medalha.active { filter: grayscale(0%); opacity: 1; border-color: rgba(201, 162, 39, 0.5); background: rgba(201, 162, 39, 0.1); }

        .flag-icon-mini { width: 18px; height: 12px; object-fit: cover; border-radius: 2px; }

        .vinho-img-container { width: 100%; height: 250px; background: #000; cursor: pointer; overflow: hidden; }
        .vinho-img { width: 100%; height: 100%; object-fit: cover; transition: 0.45s ease; }
        .vinho-img-container:hover .vinho-img { transform: scale(1.04); }

        .vinho-info { padding: 16px; flex-grow: 1; display: flex; flex-direction: column; cursor: pointer; }

        .vinho-nome {
            font-size: 1rem;
            color: var(--dourado-claro);
            margin: 0 0 10px 0;
            min-height: 2.8em;
            display: flex;
            align-items: center;
            font-family: 'Cinzel', serif;
            font-weight: 400;
            letter-spacing: 0.5px;
            line-height: 1.4;
        }

        .vinho-detalhes { font-size: 0.82rem; color: #888; margin-bottom: 15px; font-family: 'Outfit', sans-serif; line-height: 1.6; }

        .notas {
            display: flex;
            justify-content: space-between;
            border-top: 1px solid rgba(255, 255, 255, 0.06);
            padding-top: 14px;
        }

        .nota-box { text-align: center; flex: 1; }

        .nota-box span {
            display: block;
            font-size: 0.58rem;
            color: #555;
            text-transform: uppercase;
            font-family: 'Outfit', sans-serif;
            letter-spacing: 1.5px;
            font-weight: 600;
            margin-bottom: 3px;
        }

        .nota-valor {
            color: var(--dourado);
            font-size: 1.25rem;
            font-weight: 600;
            font-family: 'Cinzel', serif;
        }

        .hidden { display: none !important; }

        /* Skeleton */
        .skeleton-card { background: var(--card); border-radius: 14px; overflow: hidden; border: 1px solid rgba(255,255,255,0.04); }
        .sk-header { height: 46px; background: rgba(58, 3, 18, 0.3); }
        .sk-img { height: 250px; }
        .sk-body { padding: 16px; }
        .sk-line { height: 13px; border-radius: 4px; margin-bottom: 10px; }
        .sk-line.med { width: 75%; }
        .sk-line.short { width: 45%; }

        #skeleton-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 22px;
            padding: 30px 5%;
            max-width: 1400px;
            margin: 0 auto;
        }

        @media (max-width: 768px) {
            .vinho-grid { grid-template-columns: 1fr; gap: 16px; padding: 15px; }
            #skeleton-grid { grid-template-columns: 1fr; padding: 15px; }
            .vinho-img-container { height: 220px; }
            .mes-destaque { padding: 12px; }
            .mes-label { font-size: 0.68rem; }
        }
    </style>
</head>
<body>

    <div id="navbar-placeholder"></div>

    <div class="search-section">
        <h1>Melhores do Mês</h1>
        <p>Os rótulos que mais marcaram cada período da nossa adega 🏆</p>
    </div>

    <!-- Skeleton -->
    <div id="skeleton-grid">
        <div class="skeleton-card"><div class="sk-header skeleton"></div><div class="sk-img skeleton"></div><div class="sk-body"><div class="sk-line skeleton med"></div><div class="sk-line skeleton short"></div></div></div>
        <div class="skeleton-card"><div class="sk-header skeleton"></div><div class="sk-img skeleton"></div><div class="sk-body"><div class="sk-line skeleton med"></div><div class="sk-line skeleton short"></div></div></div>
        <div class="skeleton-card"><div class="sk-header skeleton"></div><div class="sk-img skeleton"></div><div class="sk-body"><div class="sk-line skeleton med"></div><div class="sk-line skeleton short"></div></div></div>
        <div class="skeleton-card"><div class="sk-header skeleton"></div><div class="sk-img skeleton"></div><div class="sk-body"><div class="sk-line skeleton med"></div><div class="sk-line skeleton short"></div></div></div>
    </div>

    <div class="vinho-grid" id="vinho-grid" style="display:none;"></div>

    <div id="footer-placeholder"></div>

    <script src="nav.js"></script>
    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxvM8_kK9_BXLAhhEjdmsAIgofCEjWvw-BcPXx4G1GEXeKkJwILDCkckuvg29FsiHFf/exec";
        const IMG_PADRAO = "https://images.unsplash.com/photo-1584916201218-f4242ceb4809?q=80&w=600&auto=format&fit=crop";

        const getFlagUrl = (pais) => {
            if (!pais) return 'https://flagcdn.com/w80/un.png';
            const n = pais.normalize("NFD").replace(/[̀-ͯ]/g, "").toLowerCase().trim();
            const flags = { "argentina": "ar", "chile": "cl", "espanha": "es", "portugal": "pt", "brasil": "br", "franca": "fr", "italia": "it", "uruguai": "uy", "africa do sul": "za", "australia": "au" };
            return `https://flagcdn.com/w80/${flags[n] || "un"}.png`;
        };

        window.trocarVinho = (chave, pos) => {
            document.querySelectorAll(`[id^="btn-${chave}-"]`).forEach(b => b.classList.remove('active'));
            document.querySelectorAll(`[id^="conteudo-${chave}-"]`).forEach(c => c.classList.add('hidden'));
            document.getElementById(`btn-${chave}-${pos}`).classList.add('active');
            document.getElementById(`conteudo-${chave}-${pos}`).classList.remove('hidden');
        };

        async function fetchMelhores() {
            try {
                const vinhos = await fetchWithCache(SCRIPT_URL);
                const meses = ["", "Janeiro", "Fevereiro", "Março", "Abril", "Maio", "Junho", "Julho", "Agosto", "Setembro", "Outubro", "Novembro", "Dezembro"];
                const grupos = {};

                vinhos.filter(v => {
                    const e = String(v["Escolhido do Mês"] || "").toLowerCase();
                    return e !== "" && e !== "não";
                }).forEach(v => {
                    let label = "Destaque", chave = 0;
                    for (let k in v) {
                        let m = String(v[k]).match(/^(\d{2})\/(\d{2})\/(\d{4})$/);
                        if (m) { label = `${meses[parseInt(m[2])]} de ${m[3]}`; chave = `${m[3]}${m[2]}`; break; }
                    }
                    const pos = String(v["Escolhido do Mês"]).includes("2") ? 2 : 1;
                    if (!grupos[chave]) grupos[chave] = { label, chave, v1: null, v2: null };
                    if (pos === 1) grupos[chave].v1 = v; else grupos[chave].v2 = v;
                });

                render(Object.values(grupos).sort((a, b) => b.chave - a.chave));
            } catch (e) {
                document.getElementById('skeleton-grid').innerHTML = `
                    <div style="text-align:center; padding:60px; color:var(--subtexto); font-family:'Segoe UI',sans-serif;">
                        <i class="fas fa-exclamation-triangle" style="font-size:2rem; color:#333; display:block; margin-bottom:15px;"></i>
                        Erro ao carregar. Tente novamente.
                    </div>`;
            }
        }

        function buildVinhoObj(v, imgUrl) {
            return {
                nome: v["Nome do Vinho"] || "Vinho Especial",
                produtor: v["Produtor"] || v["Vinícola"] || '',
                pais: v["País"],
                uva: v["Uva(s)"] || v["Uva"],
                safra: v["Safra"],
                tipo: v["Tipo"],
                regiao: v["Região"] || v["Regiao"],
                teor: v["Teor Alcoólico"] || v["Teor"],
                classificacao: v["Classificação"] || v["Classificacao"],
                data: v["Ano de Consumo"],
                notaF: v["Pontuação Fellype"],
                notaH: v["Pontuação Hwlly"],
                foto: imgUrl,
            };
        }

        function render(lista) {
            const grid = document.getElementById('vinho-grid');
            grid.innerHTML = lista.map(g => `
                <div class="vinho-card">
                    <div class="mes-destaque">
                        <span class="mes-label">${g.label}</span>
                        <div class="medalhas-toggle">
                            ${g.v1 ? `<button class="btn-medalha active" id="btn-${g.chave}-1" onclick="trocarVinho('${g.chave}', 1)" aria-label="Ver 1º escolhido">🥇 <img src="${getFlagUrl(g.v1['País'])}" class="flag-icon-mini" alt="${g.v1['País'] || ''}"></button>` : ''}
                            ${g.v2 ? `<button class="btn-medalha ${!g.v1 ? 'active' : ''}" id="btn-${g.chave}-2" onclick="trocarVinho('${g.chave}', 2)" aria-label="Ver 2º escolhido">🥈 <img src="${getFlagUrl(g.v2['País'])}" class="flag-icon-mini" alt="${g.v2['País'] || ''}"></button>` : ''}
                        </div>
                    </div>
                    ${g.v1 ? renderVinho(g.v1, g.chave, 1, false) : ''}
                    ${g.v2 ? renderVinho(g.v2, g.chave, 2, g.v1 !== null) : ''}
                </div>
            `).join('');

            document.getElementById('skeleton-grid').style.display = 'none';
            grid.style.display = 'grid';
        }

        function renderVinho(v, chave, pos, hidden) {
            let img = v["Foto"] || v["foto"] || IMG_PADRAO;
            if (img.includes('drive.google.com')) {
                const id = img.match(/[-\w]{25,}/);
                if (id) img = `https://drive.google.com/thumbnail?id=${id[0]}&sz=w800`;
            }
            if (!img || img.length < 5) img = IMG_PADRAO;

            const vinhoObj = buildVinhoObj(v, img);
            const jsonStr = JSON.stringify(vinhoObj).replace(/'/g, "\\'");

            return `
                <div class="conteudo-vinho ${hidden ? 'hidden' : ''}" id="conteudo-${chave}-${pos}">
                    <div class="vinho-img-container" onclick='WineModal.open(${jsonStr})'>
                        <img src="${img}" class="vinho-img" loading="lazy" onerror="this.src='${IMG_PADRAO}'" alt="${v['Nome do Vinho'] || 'Foto do vinho'}">
                    </div>
                    <div class="vinho-info" onclick='WineModal.open(${jsonStr})'>
                        <h3 class="vinho-nome">${v["Nome do Vinho"] || "Vinho Especial"}</h3>
                        <div class="vinho-detalhes">
                            🍇 ${v["Uva(s)"] || "N/A"}<br>
                            🌍 ${v["País"] || "N/A"} ${v["Safra"] ? '| ' + v["Safra"] : ''}
                        </div>
                        <div class="notas">
                            <div class="nota-box"><span>Fellype</span><div class="nota-valor">${v["Pontuação Fellype"] || "—"}</div></div>
                            <div class="nota-box"><span>Hwlly</span><div class="nota-valor">${v["Pontuação Hwlly"] || "—"}</div></div>
                        </div>
                    </div>
                </div>`;
        }

        fetchMelhores();
    </script>
</body>
</html>
