<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fellype & Hwlly - Melhores do Mês</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root {
            --vinho-escuro: #4a0404; --vinho-vivo: #800020; --dourado: #d4af37;
            --dourado-claro: #f1d592; --bg: #0a0a0a; --card: #161616;
            --texto: #e0e0e0; --subtexto: #aaa; --transicao: all 0.3s ease;
        }

        body {
            margin: 0; font-family: 'Times New Roman', Times, serif;
            background-color: var(--bg); color: var(--texto); line-height: 1.8;
            font-size: 1.1rem; overflow-x: hidden;
        }

        h1, h2, h3, h4, .nav-logo a, .nav-links a {
            font-family: 'Segoe UI', sans-serif; font-weight: 300; letter-spacing: 1px;
        }

        .navbar {
            background: rgba(10, 10, 10, 0.98); display: flex; justify-content: space-between;
            align-items: center; padding: 15px 5%; position: sticky; top: 0; z-index: 1000;
            border-bottom: 1px solid rgba(212, 175, 55, 0.1); backdrop-filter: blur(10px); height: 70px; box-sizing: border-box;
        }
        .nav-logo a { color: var(--dourado); font-weight: bold; font-size: 1.3rem; text-decoration: none; letter-spacing: 2px; text-transform: uppercase; }
        
        .nav-links { list-style: none; display: flex; gap: 25px; margin: 0; padding: 0; align-items: center; }
        .nav-links a { text-decoration: none; color: #ccc; font-size: 0.85rem; text-transform: uppercase; transition: var(--transicao); position: relative; padding-bottom: 5px; }
        .nav-links a:hover, .nav-links a.active { color: var(--dourado-claro); }

        .menu-toggle { display: none; color: white; font-size: 1.5rem; cursor: pointer; }

        .search-section { padding: 60px 20px 40px; text-align: center; background: linear-gradient(to bottom, #111, var(--bg)); }
        .search-section h1 { color: var(--dourado); font-size: 2.5rem; margin-bottom: 5px; text-transform: uppercase; }
        .search-section p.sub-titulo { color: var(--subtexto); font-size: 1.1rem; font-style: italic; opacity: 0.8; }

        .vinho-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 30px; padding: 20px 5% 60px; max-width: 1300px; margin: 0 auto; }
        
        .vinho-card { background: var(--card); border-radius: 12px; overflow: hidden; border: 1px solid #222; transition: var(--transicao); display: flex; flex-direction: column; }
        .vinho-card:hover { transform: translateY(-8px); border-color: var(--dourado); }
        
        .mes-destaque { 
            background: var(--vinho-escuro); color: var(--dourado-claro); padding: 12px 15px; 
            font-weight: bold; font-size: 0.85rem; letter-spacing: 1px; text-transform: uppercase; 
            border-bottom: 1px solid var(--dourado); display: flex; justify-content: space-between; align-items: center;
            gap: 10px; min-height: 55px;
        }

        .mes-label { flex: 2; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        .medalhas-toggle { display: flex; gap: 6px; flex: 1; justify-content: flex-end; }
        .btn-medalha {
            background: rgba(0,0,0,0.5); border: 1px solid rgba(212, 175, 55, 0.3); 
            cursor: pointer; padding: 5px 8px; border-radius: 5px; 
            transition: var(--transicao); display: flex; align-items: center; gap: 5px;
            filter: grayscale(100%); opacity: 0.5; color: white; font-size: 0.85rem;
            white-space: nowrap;
        }
        .btn-medalha.active { filter: grayscale(0%); opacity: 1; border-color: var(--dourado); background: rgba(212, 175, 55, 0.25); }

        .conteudo-vinho { display: flex; flex-direction: column; flex-grow: 1; animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .hidden { display: none !important; }

        .vinho-img-container { width: 100%; height: 280px; background: #000; overflow: hidden; position: relative; }
        .vinho-img { width: 100%; height: 100%; object-fit: cover; transition: 0.5s; }
        
        .vinho-info { padding: 20px; flex-grow: 1; display: flex; flex-direction: column; }
        .vinho-nome { font-size: 1.1rem; color: var(--dourado-claro); margin: 0 0 5px 0; min-height: 2.4em; display: flex; align-items: center; }
        .vinho-detalhes { font-size: 0.85rem; color: #ccc; margin-bottom: 20px; line-height: 1.5; }
        
        .notas { display: flex; justify-content: space-between; border-top: 1px solid #333; padding-top: 15px; margin-top: auto; }
        .nota-box { text-align: center; flex: 1; }
        .nota-valor { color: var(--dourado); font-size: 1.2rem; font-weight: bold; }

        #loading { text-align: center; padding: 100px; color: var(--dourado); }
        footer { text-align: center; padding: 60px 20px; color: #555; font-size: 0.85rem; border-top: 1px solid #222; }

        @media (max-width: 992px) {
            .menu-toggle { display: block; }
            .nav-links { display: none; flex-direction: column; position: absolute; top: 70px; left: 0; width: 100%; background: #0a0a0a; padding: 20px; border-bottom: 1px solid var(--vinho-escuro); box-sizing: border-box; }
            .nav-links.active { display: flex; }
            .vinho-grid { grid-template-columns: repeat(2, 1fr); gap: 12px; padding: 10px; }
            .vinho-img-container { height: 180px; }
            .vinho-nome { font-size: 0.9rem; min-height: 3em; }
            .mes-destaque { flex-direction: column; padding: 10px 5px; height: auto; }
            .mes-label { font-size: 0.75rem; white-space: normal; text-align: center; margin-bottom: 5px; }
            .medalhas-toggle { justify-content: center; width: 100%; }
        }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="nav-logo"><a href="index.html">Fellype & Hwlly</a></div>
        <div class="menu-toggle" id="mobile-menu-icon"><i class="fas fa-bars"></i></div>
        <ul class="nav-links" id="nav-links-container">
            <li><a href="index.html">Página Inicial</a></li>
            <li><a href="catalogo.html">Últimos Vinhos</a></li>
            <li><a href="melhores.html" class="active">Escolhidos Mês</a></li>
            <li><a href="games.html">Games</a></li>
            <li><a href="cadastro.html">Cadastrar Novo</a></li>
        </ul>
    </nav>

    <div class="search-section">
        <h1>Melhores do Mês</h1>
        <p class="sub-titulo">Nossa seleção de garrafas inesquecíveis 🏆</p>
    </div>

    <div id="loading">Preparando a mesa... 🍷</div>
    <div class="vinho-grid" id="vinho-grid"></div>

    <footer>
        Ano 2026 • Guardado por Leblonzito & Ipanemita 🐾
    </footer>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxvM8_kK9_BXLAhhEjdmsAIgofCEjWvw-BcPXx4G1GEXeKkJwILDCkckuvg29FsiHFf/exec";
        const IMG_PADRAO = "https://images.unsplash.com/photo-1584916201218-f4242ceb4809?q=80&w=600&auto=format&fit=crop";

        // Mapeamento de bandeiras normalizado (tudo em minúsculo e sem espaços extras)
        const bandeirasMapeamento = {
            "brasil": "🇧🇷",
            "itália": "🇮🇹", "italia": "🇮🇹",
            "frança": "🇫🇷", "franca": "🇫🇷",
            "espanha": "🇪🇸",
            "portugal": "🇵🇹",
            "argentina": "🇦🇷",
            "chile": "🇨🇱",
            "uruguai": "🇺🇾",
            "eua": "🇺🇸", "estados unidos": "🇺🇸",
            "áfrica do sul": "🇿🇦", "africa do sul": "🇿🇦",
            "alemanha": "🇩🇪",
            "austrália": "🇦🇺", "australia": "🇦🇺",
            "hungria": "🇭🇺"
        };

        const mobileMenuIcon = document.getElementById('mobile-menu-icon');
        const navLinksContainer = document.getElementById('nav-links-container');
        mobileMenuIcon.addEventListener('click', () => {
            navLinksContainer.classList.toggle('active');
        });

        window.trocarVinho = function(chaveMes, posicao) {
            document.querySelectorAll(`[id^="btn-${chaveMes}-"]`).forEach(b => b.classList.remove('active'));
            document.querySelectorAll(`[id^="conteudo-${chaveMes}-"]`).forEach(c => c.classList.add('hidden'));

            const btn = document.getElementById(`btn-${chaveMes}-${posicao}`);
            const cont = document.getElementById(`conteudo-${chaveMes}-${posicao}`);
            if(btn) btn.classList.add('active');
            if(cont) cont.classList.remove('hidden');
        };

        async function fetchMelhores() {
            try {
                const response = await fetch(SCRIPT_URL);
                const todosVinhos = await response.json();
                const nomesMeses = ["", "Janeiro", "Fevereiro", "Março", "Abril", "Maio", "Junho", "Julho", "Agosto", "Setembro", "Outubro", "Novembro", "Dezembro"];

                const gruposMes = {};

                todosVinhos.filter(v => {
                    const val = String(v["Escolhido do Mês"] || "").trim().toLowerCase();
                    return val !== "" && val !== "não" && val !== "nao";
                }).forEach(v => {
                    let mesAnoLabel = "Destaque";
                    let chaveOrdenacao = 0;
                    
                    for (const key in v) {
                        const valor = String(v[key] || "").trim();
                        const match = valor.match(/^(\d{2})\/(\d{2})\/(\d{4})$/);
                        if (match) {
                            mesAnoLabel = `${nomesMeses[parseInt(match[2])]} de ${match[3]}`;
                            chaveOrdenacao = parseInt(`${match[3]}${match[2]}`);
                            break;
                        }
                    }

                    const escolha = String(v["Escolhido do Mês"] || "").trim().toLowerCase();
                    const posicao = (escolha === "2" || escolha.includes("2º") || escolha.includes("segundo")) ? 2 : 1;

                    if (!gruposMes[chaveOrdenacao]) {
                        gruposMes[chaveOrdenacao] = { label: mesAnoLabel, chave: chaveOrdenacao, vinho1: null, vinho2: null };
                    }
                    if (posicao === 1) gruposMes[chaveOrdenacao].vinho1 = v;
                    else gruposMes[chaveOrdenacao].vinho2 = v;
                });

                const listaFinal = Object.values(gruposMes).sort((a, b) => b.chave - a.chave);
                renderVinhosAgrupados(listaFinal);
                document.getElementById('loading').style.display = 'none';
            } catch (e) { document.getElementById('loading').innerText = "Erro ao carregar dados."; }
        }

        function getEmojiPais(nomePais) {
            if (!nomePais) return "🍷";
            const paisLimpo = nomePais.trim().toLowerCase();
            return bandeirasMapeamento[paisLimpo] || "🍷";
        }

        function renderBotaoMedalha(chave, posicao, ativo, pais) {
            const medalha = posicao === 1 ? '🥇' : '🥈';
            const emoji = getEmojiPais(pais);
            return `
                <button class="btn-medalha ${ativo ? 'active' : ''}" id="btn-${chave}-${posicao}" onclick="trocarVinho(${chave}, ${posicao})">
                    ${medalha} ${emoji}
                </button>`;
        }

        function renderConteudoVinho(v, chave, posicao, isHidden) {
            if (!v) return '';
            let urlFinal = IMG_PADRAO;
            const fotoRaw = v["Foto"] || v["foto"] || "";
            if (fotoRaw.length > 10) {
                if (fotoRaw.startsWith('data:image')) urlFinal = fotoRaw;
                else if (fotoRaw.includes('drive.google.com')) {
                    const matchId = fotoRaw.match(/[-\w]{25,}/);
                    if (matchId) urlFinal = `https://drive.google.com/thumbnail?id=${matchId[0]}&sz=w800`;
                } else urlFinal = fotoRaw;
            }

            return `
            <div class="conteudo-vinho ${isHidden ? 'hidden' : ''}" id="conteudo-${chave}-${posicao}">
                <div class="vinho-img-container">
                    <img class="vinho-img" src="${urlFinal}" loading="lazy" onerror="this.src='${IMG_PADRAO}'">
                </div>
                <div class="vinho-info">
                    <h3 class="vinho-nome">${v["Nome do Vinho"] || "Rótulo Especial"}</h3>
                    <div class="vinho-detalhes">
                        <span>🍇 ${v["Uva(s)"] || "N/A"}</span><br>
                        <span>🌍 ${v["País"] || "N/A"} | ${v["Safra"] || "-"}</span>
                    </div>
                    <div class="notas">
                        <div class="nota-box"><span>Fellype</span><div class="nota-valor">${v["Pontuação Fellype"] || "-"}</div></div>
                        <div class="nota-box"><span>Hwlly</span><div class="nota-valor">${v["Pontuação Hwlly"] || "-"}</div></div>
                    </div>
                </div>
            </div>`;
        }

        function renderVinhosAgrupados(listaGrupos) {
            const grid = document.getElementById('vinho-grid');
            if(listaGrupos.length === 0) {
                grid.innerHTML = '<p style="grid-column: 1/-1; text-align: center; color: #aaa;">Nenhum vinho selecionado na planilha.</p>';
                return;
            }

            grid.innerHTML = listaGrupos.map(grupo => {
                const temV1 = grupo.vinho1 !== null;
                const temV2 = grupo.vinho2 !== null;
                const mostrarV1 = temV1;
                const mostrarV2 = !temV1 && temV2;

                return `
                <div class="vinho-card">
                    <div class="mes-destaque">
                        <span class="mes-label">${grupo.label}</span>
                        <div class="medalhas-toggle">
                            ${temV1 ? renderBotaoMedalha(grupo.chave, 1, mostrarV1, grupo.vinho1["País"]) : ''}
                            ${temV2 ? renderBotaoMedalha(grupo.chave, 2, mostrarV2, grupo.vinho2["País"]) : ''}
                        </div>
                    </div>
                    ${renderConteudoVinho(grupo.vinho1, grupo.chave, 1, !mostrarV1)}
                    ${renderConteudoVinho(grupo.vinho2, grupo.chave, 2, !mostrarV2)}
                </div>`;
            }).join('');
        }

        fetchMelhores();
    </script>
</body>
</html>
