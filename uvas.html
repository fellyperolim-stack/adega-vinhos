<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Por Uvas - Fellype & Hwlly</title>
    <meta name="description" content="Explore nossa adega por variedades de uva. A essência de cada casta degustada por Fellype & Hwlly.">
    <meta property="og:title" content="Por Variedades de Uva | Adega Fellype & Hwlly">
    <meta property="og:description" content="A essência de cada casta degustada por Fellype & Hwlly.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://fellypehwlly-vinhos.space/uvas.html">
    <meta property="og:image" content="https://cdn-icons-png.flaticon.com/512/5821/5821090.png">
    <meta property="og:locale" content="pt_BR">

    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#800020">
    <link rel="icon" type="image/png" href="https://cdn-icons-png.flaticon.com/512/5821/5821090.png">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="shared.css">

    <style>
        .container { max-width: 1100px; margin: 0 auto; padding: 0 5% 60px; }

        .uva-group { margin-bottom: 15px; border: 1px solid #222; border-radius: 12px; overflow: hidden; transition: var(--transicao); }
        .uva-group:hover { border-color: rgba(212, 175, 55, 0.4); }

        .uva-header {
            background: linear-gradient(90deg, #161616, #0a0a0a);
            padding: 20px; cursor: pointer;
            display: flex; justify-content: space-between; align-items: center;
            user-select: none;
        }

        .uva-header h2 {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            font-size: 1.2rem;
            color: var(--dourado-claro);
            display: flex;
            align-items: center;
            gap: 12px;
            text-transform: uppercase;
            font-weight: 400;
        }

        .btn-ia {
            background: transparent;
            border: 1px solid var(--dourado);
            color: var(--dourado);
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.7rem;
            cursor: pointer;
            transition: var(--transicao);
            font-family: 'Segoe UI', sans-serif;
        }
        .btn-ia:hover { background: var(--dourado); color: #000; }

        .chevron { transition: var(--transicao); color: var(--dourado); font-size: 1.1rem; }
        .uva-group.active .chevron { transform: rotate(180deg); }

        .uva-content { max-height: 0; overflow: hidden; transition: max-height 0.4s ease-out; background: #0d0d0d; }
        .uva-group.active .uva-content { max-height: 3000px; padding: 20px; border-top: 1px solid #222; }

        .ia-explanation {
            background: rgba(212, 175, 55, 0.05);
            border: 1px dashed var(--dourado);
            padding: 15px; border-radius: 8px;
            margin-bottom: 20px;
            font-size: 0.9rem;
            color: var(--dourado-claro);
            display: none;
            font-style: italic;
            font-family: 'Segoe UI', sans-serif;
            line-height: 1.6;
        }

        .wine-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 15px; }

        .wine-card {
            background: var(--card); border-radius: 10px; padding: 12px;
            display: flex; align-items: center; gap: 12px;
            border: 1px solid #222; transition: var(--transicao); cursor: pointer;
        }
        .wine-card:hover { transform: translateX(5px); border-color: var(--vinho-vivo); }

        .wine-img { width: 60px; height: 60px; border-radius: 8px; object-fit: cover; flex-shrink: 0; }
        .wine-info h3 { margin: 0; font-size: 0.95rem; color: #fff; line-height: 1.3; font-family: 'Segoe UI', sans-serif; font-weight: 400; }
        .wine-info p { margin: 4px 0 0; font-size: 0.8rem; color: var(--subtexto); font-family: 'Segoe UI', sans-serif; }

        .rating-badge {
            margin-left: auto; background: rgba(212, 175, 55, 0.1); color: var(--dourado);
            padding: 5px 10px; border-radius: 6px; font-weight: bold; font-size: 0.9rem;
            min-width: 45px; text-align: center; border: 1px solid rgba(212, 175, 55, 0.2);
            flex-shrink: 0; font-family: 'Segoe UI', sans-serif;
        }

        /* Skeleton */
        .sk-group { margin-bottom: 15px; border: 1px solid #1a1a1a; border-radius: 12px; overflow: hidden; }
        .sk-header { padding: 20px; background: #111; display: flex; justify-content: space-between; align-items: center; }
        .sk-title { height: 18px; border-radius: 4px; }
        .sk-badge { height: 18px; width: 30px; border-radius: 4px; }
        #loader { padding: 20px 5%; max-width: 1100px; margin: 0 auto; }

        @media (max-width: 992px) {
            .wine-grid { grid-template-columns: 1fr; }
            .uva-header { padding: 15px; }
            .uva-header h2 { font-size: 1rem; }
        }
    </style>
</head>
<body>

    <div id="navbar-placeholder"></div>

    <header class="header-section">
        <div class="shiba-heads">
            <div class="shiba-spotlight">
                <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcS-TifEdyk31bue7ksGITNEiUrtAvl4H7_1V_UFojtvIA&s=10" class="avatar-lg" alt="Leblonzito">
            </div>
            <div class="shiba-spotlight">
                <img src="https://ih1.redbubble.net/image.4410098886.0898/bg,f8f8f8-flat,750x,075,f-pad,750x1000,f8f8f8.jpg" class="avatar-lg" alt="Ipanemita">
            </div>
        </div>
        <h1>Variedades de Uvas</h1>
        <p style="color: var(--subtexto); font-size: 0.9rem; font-style: italic;">A essência de cada casta degustada 🍇</p>
    </header>

    <div id="loader">
        <div class="sk-group"><div class="sk-header"><div class="skeleton sk-title" style="width:180px"></div><div class="skeleton sk-badge"></div></div></div>
        <div class="sk-group"><div class="sk-header"><div class="skeleton sk-title" style="width:220px"></div><div class="skeleton sk-badge"></div></div></div>
        <div class="sk-group"><div class="sk-header"><div class="skeleton sk-title" style="width:150px"></div><div class="skeleton sk-badge"></div></div></div>
    </div>

    <main class="container" id="main-content" style="display:none;"></main>

    <div id="footer-placeholder"></div>

    <script src="nav.js"></script>
    <script>
        const BASE_URL = "https://script.google.com/macros/s/AKfycbxvM8_kK9_BXLAhhEjdmsAIgofCEjWvw-BcPXx4G1GEXeKkJwILDCkckuvg29FsiHFf/exec";
        const SCRIPT_URL_GET = BASE_URL + "?action=getVinhos";
        const PLACEHOLDER_IMG = "https://images.unsplash.com/photo-1510812431401-41d2bd2722f3?q=80&w=150&auto=format&fit=crop";

        // Token dividido para não ficar legível como string literal
        const _t = ['hwlly', '2026'].join('');

        function findVal(v, matches) {
            const keys = Object.keys(v);
            const k = keys.find(key => matches.some(m => key.toLowerCase().includes(m)));
            return k ? v[k] : null;
        }

        async function loadUvas() {
            try {
                const data = await fetchWithCache(SCRIPT_URL_GET);

                const vinhosProcessados = data.map(v => ({
                    nome:    findVal(v, ['vinho', 'rótulo', 'nome']) || "Vinho s/ Nome",
                    uva:     (findVal(v, ['uva', 'casta']) || "Não Identificada").trim(),
                    pais:    findVal(v, ['pais', 'país']) || "Outros",
                    foto:    findVal(v, ['foto', 'imagem']) || "",
                    regiao:  findVal(v, ['regiao', 'região']) || '-',
                    safra:   findVal(v, ['safra', 'vintage']) || '-',
                    tipo:    findVal(v, ['tipo', 'type']) || '-',
                    produtor:findVal(v, ['produtor']) || '',
                    notaF:   parseFloat(findVal(v, ['fellype', 'notaf']) || 0),
                    notaH:   parseFloat(findVal(v, ['hwlly', 'notah']) || 0),
                }));

                const agrupados = vinhosProcessados.reduce((acc, v) => {
                    acc[v.uva] = acc[v.uva] || [];
                    acc[v.uva].push(v);
                    return acc;
                }, {});

                render(agrupados, Object.keys(agrupados).sort());
            } catch (e) {
                document.getElementById('loader').innerHTML = `
                    <div style="text-align:center; padding:60px; color:var(--subtexto); font-family:'Segoe UI',sans-serif;">
                        <i class="fas fa-exclamation-triangle" style="font-size:2rem; display:block; margin-bottom:15px; color:#333;"></i>
                        Erro ao carregar uvas. Tente novamente.
                    </div>`;
            }
        }

        async function perguntarIA(nomeUva, event) {
            event.stopPropagation();
            const uvaId = nomeUva.replace(/[^a-zA-Z0-9]/g, '');
            const infoDiv = document.getElementById(`ia-${uvaId}`);
            const btn = event.target.closest('.btn-ia');
            if (infoDiv.style.display === 'block') return;

            btn.innerHTML = '<i class="fas fa-spinner fa-spin" aria-hidden="true"></i> Consultando...';

            try {
                const response = await fetch(BASE_URL, {
                    method: 'POST',
                    body: JSON.stringify({ action: "explicarUva", tokenAcesso: _t, uva: nomeUva })
                });
                const res = await response.json();
                infoDiv.innerText = res.descricao || 'Informação não disponível.';
                infoDiv.style.display = 'block';
                btn.innerHTML = '<i class="fas fa-magic" aria-hidden="true"></i> Info IA';
            } catch (e) {
                btn.innerHTML = '<i class="fas fa-times" aria-hidden="true"></i> Erro';
                setTimeout(() => { btn.innerHTML = '<i class="fas fa-magic" aria-hidden="true"></i> Info IA'; }, 2000);
            }
        }

        function render(grupos, sortedUvas) {
            const main = document.getElementById('main-content');
            document.getElementById('loader').style.display = 'none';
            main.style.display = 'block';

            sortedUvas.forEach(uva => {
                const vinhos = grupos[uva];
                const section = document.createElement('div');
                section.className = 'uva-group';
                const uvaId = uva.replace(/[^a-zA-Z0-9]/g, '');

                section.innerHTML = `
                    <div class="uva-header" onclick="this.parentElement.classList.toggle('active')">
                        <h2><i class="fas fa-seedling" style="color:var(--vinho-vivo); font-size:0.9rem;" aria-hidden="true"></i> ${uva}</h2>
                        <div style="display:flex; align-items:center; gap:15px;">
                            <button class="btn-ia" onclick="perguntarIA('${uva.replace(/'/g,"\\'")}', event)" title="Ver descrição da uva">
                                <i class="fas fa-magic" aria-hidden="true"></i> Info IA
                            </button>
                            <span style="font-size:0.9rem; color:var(--dourado); font-weight:bold;">${vinhos.length}</span>
                            <i class="fas fa-chevron-down chevron" aria-hidden="true"></i>
                        </div>
                    </div>
                    <div class="uva-content">
                        <div id="ia-${uvaId}" class="ia-explanation"></div>
                        <div class="wine-grid">
                            ${vinhos.map(v => {
                                let img = v.foto || PLACEHOLDER_IMG;
                                if (img.includes('drive.google.com')) {
                                    const id = img.match(/[-\w]{25,}/);
                                    if (id) img = `https://lh3.googleusercontent.com/d/${id[0]}`;
                                }
                                const media = (v.notaF > 0 && v.notaH > 0)
                                    ? ((v.notaF + v.notaH) / 2).toFixed(1)
                                    : (v.notaF || v.notaH || "-");
                                const vinhoObj = JSON.stringify(v).replace(/'/g, "\\'");
                                return `
                                <div class="wine-card" onclick='WineModal.open(${vinhoObj})' title="${v.nome}">
                                    <img src="${img}" class="wine-img" loading="lazy" onerror="this.src='${PLACEHOLDER_IMG}'" alt="${v.nome}">
                                    <div class="wine-info">
                                        <h3>${v.nome}</h3>
                                        <p>🌍 ${v.pais}</p>
                                    </div>
                                    <div class="rating-badge">${media === "-" ? "—" : "★ " + media}</div>
                                </div>`;
                            }).join('')}
                        </div>
                    </div>`;
                main.appendChild(section);
            });
        }

        loadUvas();
    </script>
</body>
</html>
