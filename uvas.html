<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Variedades de Uvas - VinhoChat</title>
    <link rel="stylesheet" href="style.css"> 
    <style>
        .uvas-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            padding: 20px;
        }
        .uva-card {
            background: #1a1a1a; /* Cor escura do seu padrão */
            border: 1px solid #333;
            border-radius: 15px;
            padding: 20px;
            transition: 0.3s;
            cursor: pointer;
        }
        .uva-card:hover { border-color: #ffcc00; }
        .uva-nome { color: #ffcc00; font-size: 1.5rem; margin-bottom: 10px; font-family: serif; }
        .uva-desc { color: #ccc; font-size: 0.9rem; line-height: 1.5; }
        .ia-tag { 
            font-size: 0.7rem; 
            background: #444; 
            padding: 2px 8px; 
            border-radius: 10px; 
            color: #eee;
            margin-bottom: 10px;
            display: inline-block;
        }
    </style>
</head>
<body>

    <header>
        <h1>Nossas Uvas 🍇</h1>
        <button class="btn-voltar" onclick="location.href='catalogo.html'">← Voltar</button>
    </header>

    <main id="uvasLista" class="uvas-grid">
        <p style="color: white; text-align: center;">Buscando variedades na adega...</p>
    </main>

    <script>
        const SCRIPT_URL = "SUA_URL_DO_APP_SCRIPT_AQUI"; // COLE AQUI A URL DO SEU DEPLOY
        const TOKEN = "hwlly2026";

        async function carregarUvas() {
            try {
                const response = await fetch(SCRIPT_URL);
                const vinhos = await response.json();

                // Pega a coluna "Uva" (ajuste para o nome exato da sua planilha se for diferente)
                const uvasUnicas = [...new Set(vinhos.map(v => v.Uva).filter(u => u))];
                
                const container = document.getElementById('uvasLista');
                container.innerHTML = "";

                uvasUnicas.sort().forEach(uva => {
                    const card = document.createElement('div');
                    card.className = 'uva-card';
                    card.innerHTML = `
                        <div class="ia-tag">Clique para IA explicar</div>
                        <div class="uva-nome">${uva}</div>
                        <div class="uva-desc" id="desc-${uva.replace(/\s+/g, '')}">
                            Clique para conhecer as características desta uva e harmonizações.
                        </div>
                    `;
                    card.onclick = () => explicarComIA(uva);
                    container.appendChild(card);
                });

            } catch (e) {
                document.getElementById('uvasLista').innerHTML = "<p style='color:red'>Erro ao conectar com a planilha.</p>";
            }
        }

        async function explicarComIA(nomeUva) {
            const idDesc = `desc-${nomeUva.replace(/\s+/g, '')}`;
            const campo = document.getElementById(idDesc);
            
            if (campo.dataset.loaded === "true") return;

            campo.innerHTML = "Consultando Sommelier IA... 🍷";

            try {
                const res = await fetch(SCRIPT_URL, {
                    method: 'POST',
                    body: JSON.stringify({
                        action: "explicarUva",
                        tokenAcesso: TOKEN,
                        uva: nomeUva
                    })
                });
                const data = await res.json();
                campo.innerHTML = data.descricao;
                campo.dataset.loaded = "true";
            } catch (e) {
                campo.innerHTML = "O sommelier está ocupado agora. Tente novamente.";
            }
        }

        carregarUvas();
    </script>
</body>
</html>
