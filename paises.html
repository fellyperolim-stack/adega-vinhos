<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Por Países - Fellype & Hwlly</title>
    <meta name="description" content="Explore os terroirs do mundo através das nossas viagens. De Portugal ao Uruguai, veja todos os vinhos catalogados por Fellype & Hwlly divididos por país de origem.">
    <meta name="keywords" content="vinhos por país, vinhos portugueses, vinhos chilenos, vinhos argentinos, adega internacional, Fellype e Hwlly">
    <meta property="og:title" content="Mapa da Adega por Países | Fellype & Hwlly">
    <meta property="og:description" content="Explore nossa adega por terroir: vinhos de 11 países diferentes.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://fellypehwlly-vinhos.space/paises.html">
    <meta property="og:image" content="https://cdn-icons-png.flaticon.com/512/5821/5821090.png">
    <meta property="og:locale" content="pt_BR">

    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#800020">
    <link rel="icon" type="image/png" href="https://cdn-icons-png.flaticon.com/512/5821/5821090.png">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="shared.css">

    <style>
        .container { max-width: 1100px; margin: 0 auto; padding: 0 5% 70px; }

        .country-group {
            margin-bottom: 12px;
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 14px;
            overflow: hidden;
            transition: var(--transicao);
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.3);
        }
        .country-group:hover { border-color: rgba(201, 162, 39, 0.25); }

        .country-header {
            background: linear-gradient(90deg, #141414, #0c0c0c);
            padding: 18px 20px;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            user-select: none;
        }

        .country-header h2 {
            margin: 0;
            font-family: 'Cinzel', serif;
            font-size: 1rem;
            color: var(--dourado-claro);
            display: flex;
            align-items: center;
            gap: 12px;
            text-transform: uppercase;
            font-weight: 400;
            letter-spacing: 2px;
        }

        .country-header img { width: 28px; height: auto; border-radius: 3px; box-shadow: 0 2px 8px rgba(0,0,0,0.6); }
        .chevron { transition: var(--transicao); color: var(--dourado); font-size: 0.95rem; opacity: 0.7; }
        .country-group.active .chevron { transform: rotate(180deg); opacity: 1; }

        .country-content { max-height: 0; overflow: hidden; transition: max-height 0.4s ease-out; background: #0a0a0a; }
        .country-group.active .country-content { max-height: 3000px; padding: 18px; border-top: 1px solid rgba(255, 255, 255, 0.05); }

        .wine-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 12px; }

        .wine-card {
            background: rgba(255, 255, 255, 0.02);
            border-radius: 10px;
            padding: 12px;
            display: flex;
            align-items: center;
            gap: 12px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: var(--transicao);
            cursor: pointer;
        }
        .wine-card:hover {
            transform: translateX(4px);
            border-color: rgba(139, 0, 32, 0.4);
            background: rgba(255, 255, 255, 0.04);
        }

        .wine-img { width: 56px; height: 56px; border-radius: 7px; object-fit: cover; flex-shrink: 0; box-shadow: 0 2px 8px rgba(0,0,0,0.5); }

        .wine-info h3 {
            margin: 0;
            font-size: 0.88rem;
            color: var(--texto);
            line-height: 1.35;
            font-family: 'Outfit', sans-serif;
            font-weight: 400;
        }

        .wine-info p {
            margin: 4px 0 0;
            font-size: 0.76rem;
            color: #666;
            font-family: 'Outfit', sans-serif;
        }

        .rating-badge {
            margin-left: auto;
            background: rgba(201, 162, 39, 0.07);
            color: var(--dourado);
            padding: 5px 10px;
            border-radius: 6px;
            font-weight: 600;
            font-size: 0.82rem;
            min-width: 48px;
            text-align: center;
            border: 1px solid rgba(201, 162, 39, 0.15);
            flex-shrink: 0;
            font-family: 'Cinzel', serif;
        }

        /* Skeleton */
        .sk-group { margin-bottom: 12px; border: 1px solid rgba(255,255,255,0.04); border-radius: 14px; overflow: hidden; }
        .sk-header { padding: 18px 20px; background: #111; display: flex; justify-content: space-between; align-items: center; }
        .sk-title { height: 16px; border-radius: 4px; }
        .sk-badge { height: 16px; width: 30px; border-radius: 4px; }
        #loader { padding: 20px 5%; max-width: 1100px; margin: 0 auto; }

        @media (max-width: 992px) {
            .wine-grid { grid-template-columns: 1fr; }
            .country-header { padding: 15px 16px; }
            .country-header h2 { font-size: 0.9rem; }
        }
    </style>
</head>
<body>

    <div id="navbar-placeholder"></div>

    <header class="header-section">
        <div class="shiba-heads">
            <div class="shiba-spotlight">
                <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcS-TifEdyk31bue7ksGITNEiUrtAvl4H7_1V_UFojtvIA&s=10" class="avatar-lg" alt="Leblonzito">
            </div>
            <div class="shiba-spotlight">
                <img src="https://ih1.redbubble.net/image.4410098886.0898/bg,f8f8f8-flat,750x,075,f-pad,750x1000,f8f8f8.jpg" class="avatar-lg" alt="Ipanemita">
            </div>
        </div>
        <h1>Mapa da Adega</h1>
        <p style="color: var(--subtexto); font-size: 0.9rem; font-style: italic;">Exploração por Origem e Terroir 🌍</p>
    </header>

    <div id="loader">
        <div class="sk-group"><div class="sk-header"><div class="skeleton sk-title" style="width:200px"></div><div class="skeleton sk-badge"></div></div></div>
        <div class="sk-group"><div class="sk-header"><div class="skeleton sk-title" style="width:160px"></div><div class="skeleton sk-badge"></div></div></div>
        <div class="sk-group"><div class="sk-header"><div class="skeleton sk-title" style="width:240px"></div><div class="skeleton sk-badge"></div></div></div>
    </div>

    <main class="container" id="main-content" style="display:none;"></main>

    <div id="footer-placeholder"></div>

    <script src="nav.js"></script>
    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxvM8_kK9_BXLAhhEjdmsAIgofCEjWvw-BcPXx4G1GEXeKkJwILDCkckuvg29FsiHFf/exec?action=getVinhos";
        const PLACEHOLDER_IMG = "https://images.unsplash.com/photo-1510812431401-41d2bd2722f3?q=80&w=150&auto=format&fit=crop";

        const getFlag = (paisNome) => {
            if (!paisNome) return 'https://flagcdn.com/w80/un.png';
            const n = paisNome.normalize("NFD").replace(/[̀-ͯ]/g, "").toLowerCase().trim();
            const flags = {
                "argentina": "ar", "chile": "cl", "espanha": "es", "portugal": "pt",
                "brasil": "br", "franca": "fr", "italia": "it", "africa do sul": "za",
                "uruguai": "uy", "hungria": "hu", "australia": "au", "alemanha": "de"
            };
            return `https://flagcdn.com/w80/${flags[n] || "un"}.png`;
        };

        function findVal(v, matches) {
            const keys = Object.keys(v);
            const k = keys.find(key => matches.some(m => key.toLowerCase().includes(m)));
            return k ? v[k] : null;
        }

        async function loadWines() {
            try {
                const data = await fetchWithCache(SCRIPT_URL);

                const vinhosProcessados = data.map(v => {
                    const nome = findVal(v, ['vinho', 'rótulo', 'nome']) || "Vinho s/ Nome";
                    const uva = findVal(v, ['uva', 'casta']) || "Uva s/ info";
                    const pais = findVal(v, ['pais', 'país', 'origem']) || "Outros";
                    const foto = findVal(v, ['foto', 'imagem', 'link']) || "";
                    const notaF = parseFloat(findVal(v, ['fellype', 'notaf']) || 0);
                    const notaH = parseFloat(findVal(v, ['hwlly', 'notah']) || 0);
                    const regiao = findVal(v, ['regiao', 'região']) || '-';
                    const safra = findVal(v, ['safra', 'vintage']) || '-';
                    const tipo = findVal(v, ['tipo', 'type']) || '-';
                    const produtor = findVal(v, ['produtor']) || '';

                    let mediaExibicao = "-";
                    if (notaF > 0 || notaH > 0) {
                        mediaExibicao = (notaF > 0 && notaH > 0)
                            ? ((notaF + notaH) / 2).toFixed(1)
                            : (notaF || notaH).toFixed(1);
                    }

                    return { nome, pais, uva, foto, media: mediaExibicao, notaF, notaH, regiao, safra, tipo, produtor };
                });

                const agrupados = vinhosProcessados.reduce((acc, v) => {
                    acc[v.pais] = acc[v.pais] || [];
                    acc[v.pais].push(v);
                    return acc;
                }, {});

                const sortedPaises = Object.keys(agrupados).sort((a, b) => agrupados[b].length - agrupados[a].length);
                render(agrupados, sortedPaises);
            } catch (e) {
                document.getElementById('loader').innerHTML = `
                    <div style="text-align:center; padding:60px; color:var(--subtexto); font-family:'Segoe UI',sans-serif;">
                        <i class="fas fa-exclamation-triangle" style="font-size:2rem; display:block; margin-bottom:15px; color:#333;"></i>
                        Erro ao carregar o mapa. Tente novamente.
                    </div>`;
            }
        }

        function render(grupos, sortedPaises) {
            const main = document.getElementById('main-content');
            document.getElementById('loader').style.display = 'none';
            main.style.display = 'block';

            sortedPaises.forEach(pais => {
                const vinhos = grupos[pais];
                const section = document.createElement('div');
                section.className = 'country-group';

                section.innerHTML = `
                    <div class="country-header" onclick="this.parentElement.classList.toggle('active')">
                        <h2><img src="${getFlag(pais)}" alt="Bandeira de ${pais}"> ${pais}</h2>
                        <div style="display:flex; align-items:center; gap:10px;">
                            <span style="font-size:0.9rem; color:var(--dourado); font-weight:bold;">${vinhos.length}</span>
                            <i class="fas fa-chevron-down chevron" aria-hidden="true"></i>
                        </div>
                    </div>
                    <div class="country-content">
                        <div class="wine-grid">
                            ${vinhos.map(v => {
                                let img = v.foto || PLACEHOLDER_IMG;
                                if (img.includes('drive.google.com')) {
                                    const id = img.match(/[-\w]{25,}/);
                                    if (id) img = `https://lh3.googleusercontent.com/d/${id[0]}`;
                                }
                                const vinhoObj = JSON.stringify(v).replace(/'/g, "\\'");
                                return `
                                <div class="wine-card" onclick='WineModal.open(${vinhoObj})' title="${v.nome}">
                                    <img src="${img || PLACEHOLDER_IMG}" class="wine-img" loading="lazy" onerror="this.src='${PLACEHOLDER_IMG}'" alt="${v.nome}">
                                    <div class="wine-info">
                                        <h3>${v.nome}</h3>
                                        <p>🍇 ${v.uva}</p>
                                    </div>
                                    <div class="rating-badge">${v.media === "-" ? "—" : "★ " + v.media}</div>
                                </div>`;
                            }).join('')}
                        </div>
                    </div>`;
                main.appendChild(section);
            });
        }

        loadWines();
    </script>
</body>
</html>
