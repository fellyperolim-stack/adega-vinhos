<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adega por Nações | Fellype & Hwlly 🍷</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #d4af37; --wine: #4a0e0e; --black: #050505;
            --glass: rgba(255, 255, 255, 0.05); --glass-border: rgba(255, 255, 255, 0.1);
        }
        body { 
            margin: 0; font-family: 'Outfit', sans-serif; background: var(--black); color: #fff; 
            background-image: radial-gradient(circle at 50% -20%, #2a0a0a 0%, #050505 80%);
            background-attachment: fixed; min-height: 100vh;
        }

        /* --- MENU DE NAVEGAÇÃO --- */
        nav { background: rgba(0,0,0,0.9); padding: 15px 20px; border-bottom: 1px solid var(--glass-border); position: sticky; top: 0; z-index: 1000; backdrop-filter: blur(10px); }
        .nav-links { list-style: none; display: flex; justify-content: center; align-items: center; gap: 20px; margin: 0; padding: 0; }
        .nav-links li a { color: #fff; text-decoration: none; font-size: 14px; font-weight: 400; transition: 0.3s; opacity: 0.8; }
        .nav-links li a:hover, .nav-links li a.active { color: var(--gold); opacity: 1; }
        
        .dropdown { position: relative; display: inline-block; }
        .dropdown-content { display: none; position: absolute; background: #111; min-width: 160px; box-shadow: 0 8px 16px rgba(0,0,0,0.5); border-radius: 8px; overflow: hidden; margin-top: 10px; }
        .dropdown-content a { color: white; padding: 12px 16px; text-decoration: none; display: block; font-size: 13px; }
        .dropdown-content a:hover { background: var(--wine); color: var(--gold); }
        .dropdown:hover .dropdown-content { display: block; }

        /* --- CONTEÚDO --- */
        .header-nations { padding: 40px 20px; text-align: center; }
        .shiba-mini { width: 45px; height: 45px; border-radius: 50%; border: 2px solid var(--gold); object-fit: cover; }
        h1 { font-family: 'Cinzel', serif; color: var(--gold); margin: 15px 0 5px; font-size: 26px; letter-spacing: 2px; }
        
        .container { max-width: 1100px; margin: 0 auto; padding: 0 20px 50px; }

        .country-group { margin-bottom: 40px; animation: fadeIn 0.8s ease; }
        .country-label { 
            display: flex; align-items: center; justify-content: space-between;
            padding: 15px 25px; background: var(--wine); border-radius: 15px;
            border: 1px solid var(--gold); margin-bottom: 20px;
        }
        .country-label h2 { font-family: 'Cinzel', serif; margin: 0; font-size: 20px; color: var(--gold); }
        .badge-count { background: #fff; color: var(--wine); padding: 2px 10px; border-radius: 8px; font-weight: 800; }

        .wine-shelf { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; }
        .wine-item {
            background: var(--glass); border: 1px solid var(--glass-border); border-radius: 20px;
            padding: 15px; display: flex; align-items: center; gap: 15px; transition: 0.3s;
        }
        .wine-item:hover { border-color: var(--gold); background: rgba(255,255,255,0.08); }
        .wine-thumb { width: 70px; height: 70px; border-radius: 12px; object-fit: cover; background: #111; }
        
        .wine-name { font-family: 'Cinzel', serif; font-size: 15px; color: #fff; margin-bottom: 4px; }
        .wine-sub { font-size: 12px; color: #aaa; }
        .score-pill { background: rgba(212, 175, 55, 0.1); border: 1px solid var(--gold); color: var(--gold); padding: 4px 8px; border-radius: 8px; font-size: 12px; font-weight: 700; white-space: nowrap; }

        #status-msg { text-align: center; padding: 50px; color: var(--gold); font-family: 'Cinzel'; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <nav>
        <ul class="nav-links" id="nav-links-container">
            <li><a href="index.html">Página Inicial</a></li>
            <li><a href="catalogo.html?filtro=ultimos">Últimos Vinhos</a></li>
            <li><a href="melhores.html">Escolhidos Mês</a></li>
            <li><a href="cadastro.html">Cadastrar Novo</a></li>
            <li class="dropdown">
                <a href="javascript:void(0)" class="dropbtn">Explorar <i class="fa fa-caret-down"></i></a>
                <div class="dropdown-content">
                    <a href="paises.html" class="active">Por Países</a>
                    <a href="uvas.html">Por Uvas</a>
                    <a href="vinicolas.html">Vinícolas</a>
                </div>
            </li>
        </ul>
    </nav>

    <div class="header-nations">
        <div style="display:flex; justify-content:center; gap:10px">
            <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcS-TifEdyk31bue7ksGITNEiUrtAvl4H7_1V_UFojtvIA&s=10" class="shiba-mini">
            <img src="https://ih1.redbubble.net/image.4410098886.0898/bg,f8f8f8-flat,750x,075,f-pad,750x1000,f8f8f8.jpg" class="shiba-mini">
        </div>
        <h1>MAPA DA ADEGA</h1>
        <p style="color:#888; font-size: 13px;">Exploração por Origem e Terroir</p>
    </div>

    <div class="container" id="nations-container">
        <div id="status-msg">Leblonzito está buscando os registros...</div>
    </div>

    <script>
        // Verifique se esta URL está correta e se o script está publicado como "Web App" e acessível a "Anyone"
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxvM8_kK9_BXLAhhEjdmsAIgofCEjWvw-BcPXx4G1GEXeKkJwILDCkckuvg29FsiHFf/exec?action=getVinhos";

        async function loadNations() {
            const container = document.getElementById('nations-container');
            const status = document.getElementById('status-msg');

            try {
                const response = await fetch(SCRIPT_URL);
                if (!response.ok) throw new Error("Erro na rede ao acessar a planilha.");
                
                const vinhos = await response.json();
                
                if (!vinhos || vinhos.length === 0) {
                    status.innerHTML = "Nenhum vinho encontrado na adega.";
                    return;
                }

                // Agrupar por país (Garante que trata nulos/vazios)
                const grupos = vinhos.reduce((acc, v) => {
                    const p = v.pais && v.pais.trim() !== "" ? v.pais : "Outros/Não Informado";
                    if (!acc[p]) acc[p] = [];
                    acc[p].push(v);
                    return acc;
                }, {});

                render(grupos);
            } catch (e) {
                console.error(e);
                status.innerHTML = "Erro ao carregar: " + e.message + "<br><small>Verifique se o Apps Script está publicado corretamente.</small>";
            }
        }

        function render(grupos) {
            const container = document.getElementById('nations-container');
            container.innerHTML = '';

            Object.keys(grupos).sort().forEach(pais => {
                const vinhos = grupos[pais];
                const section = document.createElement('div');
                section.className = 'country-group';

                section.innerHTML = `
                    <div class="country-label">
                        <h2>${pais}</h2>
                        <span class="badge-count">${vinhos.length}</span>
                    </div>
                    <div class="wine-shelf">
                        ${vinhos.map(v => {
                            // Cálculo da média com proteção contra valores inválidos
                            const nf = parseFloat(v.notF) || 0;
                            const nh = parseFloat(v.notH) || 0;
                            const media = (nf + nh) / 2;
                            
                            return `
                            <div class="wine-item">
                                <img src="${v.foto || 'https://via.placeholder.com/100/1a0505/d4af37?text=🍷'}" class="wine-thumb" onerror="this.src='https://via.placeholder.com/100/1a0505/d4af37?text=🍷'">
                                <div style="flex-grow:1">
                                    <div class="wine-name">${v.wineName || 'Sem Nome'}</div>
                                    <div class="wine-sub">${v.uva || 'Uva não informada'} | ${v.year || 'S/A'}</div>
                                </div>
                                <div class="score-pill">★ ${media.toFixed(1)}</div>
                            </div>`;
                        }).join('')}
                    </div>
                `;
                container.appendChild(section);
            });
        }

        loadNations();
    </script>
</body>
</html>
