<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Por Países - Fellype & Hwlly</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --vinho-escuro: #4a0404; --vinho-vivo: #800020; --dourado: #d4af37;
            --dourado-claro: #f1d592; --bg: #0a0a0a; --card: #161616;
            --texto: #e0e0e0; --subtexto: #aaa; --transicao: all 0.3s ease;
        }

        body {
            margin: 0; font-family: 'Times New Roman', Times, serif;
            background-color: var(--bg); color: var(--texto); line-height: 1.8;
        }

        /* --- NAVBAR (PADRÃO INDEX COM BLUR) --- */
        .navbar {
            background: rgba(10, 10, 10, 0.98); display: flex; justify-content: space-between;
            align-items: center; padding: 15px 5%; position: sticky; top: 0; z-index: 1000;
            border-bottom: 1px solid rgba(212, 175, 55, 0.1); backdrop-filter: blur(10px); height: 70px; box-sizing: border-box;
        }
        .nav-logo a { color: var(--dourado); font-weight: bold; font-size: 1.3rem; text-decoration: none; text-transform: uppercase; font-family: 'Segoe UI', sans-serif; }
        .nav-links { list-style: none; display: flex; gap: 25px; margin: 0; padding: 0; }
        .nav-links a { text-decoration: none; color: #ccc; font-size: 0.85rem; text-transform: uppercase; font-family: 'Segoe UI', sans-serif; transition: var(--transicao); position: relative; padding-bottom: 5px; }
        .nav-links a.active, .nav-links a:hover { color: var(--dourado-claro); }
        .nav-links a.active::after { content: ''; position: absolute; width: 100%; height: 1px; bottom: 0; left: 0; background-color: var(--dourado); }
        
        .dropdown { position: relative; }
        .dropdown-content { display: none; position: absolute; background: #1a1a1a; min-width: 180px; border: 1px solid #333; top: 30px; border-radius: 5px; }
        .dropdown:hover .dropdown-content { display: block; }
        .dropdown-content a { padding: 12px; display: block; text-transform: none; }
        .dropdown-content a:hover { background: var(--vinho-vivo); }

        /* --- HEADER COM OS SHIBAS DO CHAT (FOCADOS NO ROSTO) --- */
        .header-section { text-align: center; padding: 60px 20px 40px; background: rgba(0,0,0,0.3); }
        .header-section h1 { color: var(--dourado); font-family: 'Segoe UI', sans-serif; text-transform: uppercase; letter-spacing: 3px; margin: 15px 0 5px; }
        .shiba-spotlight { background: #fff; border-radius: 20px; padding: 2px; display: inline-flex; box-shadow: 0 0 15px rgba(255, 255, 255, 0.1); border: 1.5px solid var(--gold); overflow: hidden; justify-content: center; align-items: center; }
        .avatar-lg { width: 100px; height: 100px; border-radius: 15px; object-fit: cover; object-position: center 20%; } /* Zoom focado no rosto */
        .shiba-heads { display: flex; justify-content: center; gap: 20px; margin-bottom: 10px; }

        /* --- CONTEÚDO PRINCIPAL --- */
        .container { max-width: 1000px; margin: 0 auto; padding: 0 20px 80px; }

        /* --- ACORDEÃO (EXPANDIR/RECOLHER) --- */
        .country-group { margin-bottom: 15px; border: 1px solid #222; border-radius: 10px; overflow: hidden; }
        .country-header {
            background: linear-gradient(90deg, #1a1a1a, #0a0a0a);
            padding: 20px 25px; cursor: pointer; display: flex; justify-content: space-between;
            align-items: center; transition: var(--transicao); border-left: 4px solid transparent;
        }
        .country-header:hover { background: #222; border-left-color: var(--dourado); }
        .country-header h2 { margin: 0; font-family: 'Segoe UI', sans-serif; font-size: 1.2rem; color: var(--dourado-claro); display: flex; align-items: center; gap: 15px; }
        .chevron { transition: var(--transicao); color: var(--dourado); }
        .country-group.active .chevron { transform: rotate(180deg); }

        .country-content { max-height: 0; overflow: hidden; transition: max-height 0.5s ease-out; background: #0d0d0d; }
        .country-group.active .country-content { max-height: 3000px; padding: 20px; }

        /* --- GRID DE VINHOS --- */
        .wine-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 15px; }
        .wine-card {
            background: var(--card); border-radius: 8px; padding: 12px; display: flex; align-items: center; gap: 12px;
            border: 1px solid transparent; transition: 0.3s;
        }
        .wine-card:hover { border-color: var(--dourado); transform: translateY(-3px); }
        .wine-img { width: 60px; height: 60px; border-radius: 6px; object-fit: cover; background: #000; }
        .wine-info h3 { margin: 0; font-size: 0.95rem; color: #fff; line-height: 1.2; font-family: 'Segoe UI', sans-serif; }
        .wine-info p { margin: 3px 0 0; font-size: 0.8rem; color: var(--subtexto); }
        .rating-badge { margin-left: auto; background: rgba(212, 175, 55, 0.1); color: var(--dourado); padding: 4px 8px; border-radius: 5px; font-weight: bold; font-size: 0.85rem; border: 1px solid rgba(212, 175, 55, 0.2); }

        #loader { text-align: center; color: var(--dourado); padding: 100px; font-family: 'Segoe UI', sans-serif; }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="nav-logo"><a href="index.html">Fellype & Hwlly</a></div>
        <ul class="nav-links">
            <li><a href="index.html">Página Inicial</a></li>
            <li><a href="catalogo.html?filtro=ultimos">Últimos Vinhos</a></li>
            <li><a href="melhores.html">Escolhidos Mês</a></li>
            <li><a href="cadastro.html">Cadastrar Novo</a></li>
            <li class="dropdown">
                <a href="#" class="active" style="color:var(--dourado)">Explorar <i class="fa fa-caret-down"></i></a>
                <div class="dropdown-content">
                    <a href="paises.html">Por Países</a>
                    <a href="uvas.html">Por Uvas</a>
                    <a href="vinicolas.html">Vinícolas</a>
                </div>
            </li>
        </ul>
    </nav>

    <header class="header-section">
        <div class="shiba-heads">
            <div class="shiba-spotlight"><img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcS-TifEdyk31bue7ksGITNEiUrtAvl4H7_1V_UFojtvIA&s=10" class="avatar-lg" alt="Leblonzito"></div>
            <div class="shiba-spotlight"><img src="https://ih1.redbubble.net/image.4410098886.0898/bg,f8f8f8-flat,750x,075,f-pad,750x1000,f8f8f8.jpg" class="avatar-lg" alt="Ipanemita"></div>
        </div>
        <h1>Mapa da Adega</h1>
        <p style="color: var(--subtexto)">Curadoria Inteligente por Leblonzito & Ipanemita</p>
    </header>

    <div id="loader">Leblonzito e Ipanemita estão consultando os registros...</div>
    <main class="container" id="main-content" style="display:none;"></main>

    <script>
        // URL da API (Script publicado)
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxvM8_kK9_BXLAhhEjdmsAIgofCEjWvw-BcPXx4G1GEXeKkJwILDCkckuvg29FsiHFf/exec?action=getVinhos";

        // Mapeamento dinâmico de bandeiras (Flag CDN)
        const getFlag = (paisNome) => {
            const paisLower = paisNome.toLowerCase();
            const flags = { "argentina": "ar", "chile": "cl", "espanha": "es", "portugal": "pt", "brasil": "br", "frança": "fr", "itália": "it", "áfrica do sul": "za", "uruguai": "uy" };
            const code = flags[paisLower] || "un";
            return `https://flagcdn.com/w80/${code}.png`;
        };

        async function loadWines() {
            try {
                const response = await fetch(SCRIPT_URL);
                const data = await response.json();
                
                // Mapeamento defensivo para corrigir erro de nome de coluna
                const vinhosProcessados = data.map(v => ({
                    nome: v.wineName || v.nome || v.Nome || "Vinho s/ Nome",
                    pais: v.pais || v.Pais || v.País || "Outros",
                    uva: v.uva || v.Uva || "Castas Variadas",
                    ano: v.year || v.ano || v.Ano || "S/A",
                    foto: v.foto || v.Foto || v.imagem || "",
                    nota: ((parseFloat(v.notF || v.notaF || 0) + parseFloat(v.notH || v.notaH || 0)) / 2).toFixed(1)
                }));

                const agrupados = vinhosProcessados.reduce((acc, v) => {
                    acc[v.pais] = acc[v.pais] || [];
                    acc[v.pais].push(v);
                    return acc;
                }, {});

                // Ordenar: Países com MAIS vinhos primeiro
                const sortedPaises = Object.keys(agrupados).sort((a, b) => agrupados[b].length - agrupados[a].length);

                render(agrupados, sortedPaises);
            } catch (error) {
                document.getElementById('loader').innerHTML = "Erro ao carregar dados. Verifique a conexão.";
            }
        }

        function render(grupos, sortedPaises) {
            const main = document.getElementById('main-content');
            const loader = document.getElementById('loader');
            
            sortedPaises.forEach(pais => {
                const vinhos = grupos[pais];
                const section = document.createElement('div');
                section.className = 'country-group';
                
                section.innerHTML = `
                    <div class="country-header" onclick="this.parentElement.classList.toggle('active')">
                        <h2><img src="${getFlag(pais)}" alt="Bandeira" style="width:30px; border-radius:4px;"> ${pais.toUpperCase()}</h2>
                        <div style="display:flex; align-items:center; gap:15px;">
                            <span style="font-size:0.9rem; color:var(--subtexto)">${vinhos.length} rótulos</span>
                            <i class="fas fa-chevron-down chevron"></i>
                        </div>
                    </div>
                    <div class="country-content">
                        <div class="wine-grid">
                            ${vinhos.map(v => `
                                <div class="wine-card">
                                    <img src="${v.foto || 'https://via.placeholder.com/150/0a0a0a/d4af37?text=🍷'}" class="wine-img" onerror="this.src='https://via.placeholder.com/150/0a0a0a/d4af37?text=🍷'">
                                    <div class="wine-info">
                                        <h3>${v.nome}</h3>
                                        <p>${v.uva} • ${v.ano}</p>
                                    </div>
                                    <div class="rating-badge">★ ${v.nota}</div>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                `;
                main.appendChild(section);
            });

            loader.style.display = 'none';
            main.style.display = 'block';
        }

        loadWines();
    </script>
</body>
</html>
