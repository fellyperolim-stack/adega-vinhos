<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mapa da Adega - Fellype & Hwlly</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --vinho: #800020; --dourado: #d4af37; --bg: #050505; --card: #111; --texto: #e0e0e0;
        }
        body { background: var(--bg); color: var(--texto); font-family: 'Segoe UI', sans-serif; margin: 0; }
        
        /* --- HEADER COM OS SHIBAS OFICIAIS --- */
        .shiba-header { display: flex; justify-content: center; gap: 30px; padding: 40px 0 20px; align-items: center; }
        .shiba-box { text-align: center; }
        .shiba-box img { width: 100px; height: 100px; border-radius: 50%; border: 3px solid var(--dourado); box-shadow: 0 0 20px rgba(212, 175, 55, 0.4); object-fit: cover; }
        .shiba-box p { margin: 8px 0 0; font-weight: bold; color: var(--dourado); font-size: 0.9rem; text-transform: uppercase; }

        .map-title { text-align: center; margin-bottom: 40px; }
        .map-title h1 { color: var(--dourado); text-transform: uppercase; letter-spacing: 5px; font-size: 2.2rem; margin: 0; }
        .map-title p { color: #666; font-style: italic; margin-top: 5px; }

        .container { max-width: 1100px; margin: 0 auto; padding: 20px; }

        /* --- ACORDEÃO --- */
        .country-block { margin-bottom: 12px; border: 1px solid #222; border-radius: 12px; overflow: hidden; }
        .country-btn {
            width: 100%; background: #161616; padding: 20px 30px; border: none; cursor: pointer;
            display: flex; justify-content: space-between; align-items: center; color: #fff; transition: 0.3s;
        }
        .country-btn:hover { background: #222; }
        .country-info { display: flex; align-items: center; gap: 15px; font-size: 1.2rem; font-weight: bold; }
        .flag-icon { width: 35px; border-radius: 4px; border: 1px solid #333; }
        .wine-count { background: var(--vinho); color: #fff; padding: 2px 10px; border-radius: 12px; font-size: 0.75rem; }

        .content { max-height: 0; overflow: hidden; transition: max-height 0.5s ease-out; background: #080808; }
        .country-block.open .content { max-height: 5000px; padding: 20px; }
        .country-block.open .fa-chevron-down { transform: rotate(180deg); }

        /* --- GRID E CARDS --- */
        .wine-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 15px; }
        .wine-card { 
            background: var(--card); border-radius: 10px; display: flex; align-items: center; padding: 15px; gap: 15px; 
            border: 1px solid #222; transition: 0.3s;
        }
        .wine-card:hover { border-color: var(--dourado); transform: scale(1.02); }
        .wine-img { width: 75px; height: 75px; border-radius: 8px; object-fit: cover; background: #000; }
        .wine-info { flex-grow: 1; }
        .wine-info h3 { margin: 0; font-size: 1rem; color: #fff; }
        .wine-info p { margin: 4px 0 0; font-size: 0.8rem; color: #888; }
        
        .rating-box { text-align: center; border-left: 1px solid #333; padding-left: 15px; }
        .rating-box span { display: block; font-size: 1.2rem; font-weight: bold; color: var(--dourado); }
        .rating-box label { font-size: 0.6rem; color: #555; text-transform: uppercase; }

        #loader { text-align: center; padding: 80px; color: var(--dourado); font-size: 1.2rem; }
    </style>
</head>
<body>

    <div class="shiba-header">
        <div class="shiba-box">
            <img src="https://i.ibb.co/Vpgm6mH/leblonzito-terno.png" alt="Leblonzito">
            <p>Leblonzito</p>
        </div>
        <div class="shiba-box">
            <img src="https://i.ibb.co/vYm6m8y/ipanemita-joias.png" alt="Ipanemita">
            <p>Ipanemita</p>
        </div>
    </div>

    <div class="map-title">
        <h1>Mapa da Adega</h1>
        <p>A maior coleção de vinhos das galáxias</p>
    </div>

    <div class="container">
        <div id="loader"><i class="fas fa-wine-bottle fa-spin"></i> Abrindo a adega...</div>
        <div id="paises-container"></div>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbxvM8_kK9_BXLAhhEjdmsAIgofCEjWvw-BcPXx4G1GEXeKkJwILDCkckuvg29FsiHFf/exec?action=getVinhos";

        const getFlag = (pais) => {
            const flags = { "Argentina": "ar", "Chile": "cl", "Espanha": "es", "Portugal": "pt", "Brasil": "br", "França": "fr", "Itália": "it", "África do Sul": "za", "Uruguai": "uy" };
            return `https://flagcdn.com/w80/${flags[pais] || "un"}.png`;
        };

        async function load() {
            try {
                const res = await fetch(API_URL);
                const data = await res.json();
                const paises = {};

                data.forEach(v => {
                    // MAPEAMENTO EXATO PELAS SUAS COLUNAS
                    const nome = v["nomedovinho"] || v["vinho"] || "Vinho s/ Nome";
                    const uva = v["uvas"] || v["uva"] || "Uva não informada";
                    const pais = v["pais"] || v["país"] || "Outros";
                    const foto = v["linkdafoto"] || v["foto"] || "";
                    
                    // NOTAS COLUNA M (Fellype) e N (Hwlly)
                    const nF = parseFloat(v["pontuacaofellype"]) || 0;
                    const nH = parseFloat(v["pontuacaohwlly"]) || 0;
                    const media = (nF > 0 && nH > 0) ? ((nF + nH) / 2).toFixed(1) : (nF || nH || "0.0");

                    if (!paises[pais]) paises[pais] = [];
                    paises[pais].push({ nome, uva, foto, media });
                });

                // Ordenar: Países com MAIS vinhos primeiro
                const sortedPaises = Object.keys(paises).sort((a, b) => paises[b].length - paises[a].length);
                render(paises, sortedPaises);
            } catch (e) { document.getElementById('loader').innerText = "Erro ao carregar os dados."; }
        }

        function render(paises, keys) {
            const container = document.getElementById('paises-container');
            document.getElementById('loader').style.display = 'none';

            keys.forEach(pais => {
                const vinhos = paises[pais];
                const block = document.createElement('div');
                block.className = 'country-block';
                block.innerHTML = `
                    <button class="country-btn" onclick="this.parentElement.classList.toggle('open')">
                        <div class="country-info">
                            <img src="${getFlag(pais)}" class="flag-icon">
                            ${pais} <span class="wine-count">${vinhos.length}</span>
                        </div>
                        <i class="fas fa-chevron-down"></i>
                    </button>
                    <div class="content">
                        <div class="wine-grid">
                            ${vinhos.map(v => `
                                <div class="wine-card">
                                    <img src="${v.foto || 'https://via.placeholder.com/80/0a0a0a/d4af37?text=🍷'}" class="wine-img" onerror="this.src='https://via.placeholder.com/80/1a0a0a/d4af37?text=🍷'">
                                    <div class="wine-info">
                                        <h3>${v.nome}</h3>
                                        <p><i class="fas fa-seedling"></i> ${v.uva}</p>
                                    </div>
                                    <div class="rating-box">
                                        <span>${v.media}</span>
                                        <label>Média</label>
                                    </div>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                `;
                container.appendChild(block);
            });
        }
        load();
    </script>
</body>
</html>
