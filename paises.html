<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Por Países - Fellype & Hwlly</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --vinho-escuro: #4a0404; --vinho-vivo: #800020; --dourado: #d4af37;
            --dourado-claro: #f1d592; --bg: #0a0a0a; --card: #161616;
            --texto: #e0e0e0; --subtexto: #aaa; --transicao: all 0.3s ease;
        }

        body {
            margin: 0; font-family: 'Times New Roman', Times, serif;
            background-color: var(--bg); color: var(--texto); line-height: 1.6;
            overflow-x: hidden;
        }

        /* --- NAVBAR RESPONSIVA --- */
        .navbar {
            background: rgba(10, 10, 10, 0.98); display: flex; justify-content: space-between;
            align-items: center; padding: 0 5%; position: sticky; top: 0; z-index: 1000;
            border-bottom: 1px solid rgba(212, 175, 55, 0.1); backdrop-filter: blur(10px); height: 70px;
        }
        .nav-logo a { color: var(--dourado); font-weight: bold; font-size: 1.1rem; text-decoration: none; text-transform: uppercase; font-family: 'Segoe UI', sans-serif; letter-spacing: 1px; }
        
        .nav-links { list-style: none; display: flex; gap: 15px; margin: 0; padding: 0; }
        .nav-links a { text-decoration: none; color: #ccc; font-size: 0.75rem; text-transform: uppercase; font-family: 'Segoe UI', sans-serif; transition: var(--transicao); position: relative; }
        .nav-links a.active { color: var(--dourado-claro); }
        
        .dropdown { position: relative; }
        .dropdown-content { display: none; position: absolute; background: #1a1a1a; min-width: 140px; border: 1px solid #333; top: 25px; right: 0; border-radius: 5px; }
        .dropdown:hover .dropdown-content { display: block; }
        .dropdown-content a { padding: 10px; display: block; text-transform: none; font-size: 0.8rem; }

        /* --- HEADER AJUSTADO (MOBILE FIRST) --- */
        .header-section { text-align: center; padding: 40px 15px 30px; background: rgba(0,0,0,0.3); border-bottom: 1px solid rgba(212, 175, 55, 0.1); }
        .header-section h1 { color: var(--dourado); font-family: 'Segoe UI', sans-serif; text-transform: uppercase; letter-spacing: 2px; margin: 15px 0 5px; font-size: 1.5rem; }
        .shiba-heads { display: flex; justify-content: center; gap: 15px; margin-bottom: 10px; }
        .shiba-spotlight { background: #fff; border-radius: 15px; padding: 2px; display: inline-flex; border: 1.5px solid var(--dourado); overflow: hidden; }
        .avatar-lg { width: 70px; height: 70px; border-radius: 12px; object-fit: cover; object-position: center 20%; }

        /* --- CONTEÚDO --- */
        .container { max-width: 1000px; margin: 0 auto; padding: 0 15px 60px; }

        /* --- ACORDEÃO RESPONSIVO --- */
        .country-group { margin-bottom: 12px; border: 1px solid #222; border-radius: 8px; overflow: hidden; }
        .country-header {
            background: linear-gradient(90deg, #1a1a1a, #0a0a0a);
            padding: 15px 18px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; border-left: 3px solid transparent;
        }
        .country-header h2 { margin: 0; font-family: 'Segoe UI', sans-serif; font-size: 1rem; color: var(--dourado-claro); display: flex; align-items: center; gap: 10px; text-transform: uppercase; }
        .country-header img { width: 24px; height: auto; border-radius: 3px; }
        .chevron { transition: var(--transicao); color: var(--dourado); font-size: 1rem; }
        .country-group.active .chevron { transform: rotate(180deg); }
        
        .country-content { max-height: 0; overflow: hidden; transition: max-height 0.4s ease-out; background: #0d0d0d; }
        .country-group.active .country-content { max-height: none; padding: 15px; }

        /* --- GRID DE VINHOS --- */
        .wine-grid { display: grid; grid-template-columns: 1fr; gap: 12px; }
        .wine-card { background: var(--card); border-radius: 8px; padding: 10px; display: flex; align-items: center; gap: 10px; border: 1px solid #222; }
        .wine-img { width: 50px; height: 50px; border-radius: 5px; object-fit: cover; }
        .wine-info h3 { margin: 0; font-size: 0.85rem; color: #fff; line-height: 1.2; font-family: 'Segoe UI', sans-serif; }
        .wine-info p { margin: 2px 0 0; font-size: 0.75rem; color: var(--subtexto); }
        .rating-badge { margin-left: auto; background: rgba(212, 175, 55, 0.1); color: var(--dourado); padding: 3px 6px; border-radius: 4px; font-weight: bold; font-size: 0.8rem; min-width: 30px; text-align: center; }

        /* --- MEDIA QUERIES PARA DESKTOP --- */
        @media (min-width: 768px) {
            .nav-logo a { font-size: 1.3rem; }
            .nav-links a { font-size: 0.85rem; }
            .avatar-lg { width: 100px; height: 100px; }
            .header-section h1 { font-size: 2rem; }
            .wine-grid { grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); }
            .country-header h2 { font-size: 1.2rem; }
        }

        #loader { text-align: center; color: var(--dourado); padding: 100px 20px; font-family: 'Segoe UI', sans-serif; }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="nav-logo"><a href="index.html">Fellype & Hwlly</a></div>
        <ul class="nav-links">
            <li class="dropdown">
                <a href="#" class="active">Menu <i class="fa fa-caret-down"></i></a>
                <div class="dropdown-content">
                    <a href="index.html">Início</a>
                    <a href="catalogo.html">Catálogo</a>
                    <a href="melhores.html">Favoritos</a>
                    <a href="paises.html">Países</a>
                </div>
            </li>
        </ul>
    </nav>

    <header class="header-section">
        <div class="shiba-heads">
            <div class="shiba-spotlight"><img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcS-TifEdyk31bue7ksGITNEiUrtAvl4H7_1V_UFojtvIA&s=10" class="avatar-lg" alt="Leblonzito"></div>
            <div class="shiba-spotlight"><img src="https://ih1.redbubble.net/image.4410098886.0898/bg,f8f8f8-flat,750x,075,f-pad,750x1000,f8f8f8.jpg" class="avatar-lg" alt="Ipanemita"></div>
        </div>
        <h1>Mapa da Adega</h1>
        <p style="color: var(--subtexto); font-size: 0.8rem;">Exploração por Origem e Terroir</p>
    </header>

    <div id="loader"><i class="fas fa-wine-bottle fa-spin"></i> Carregando...</div>
    <main class="container" id="main-content" style="display:none;"></main>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxvM8_kK9_BXLAhhEjdmsAIgofCEjWvw-BcPXx4G1GEXeKkJwILDCkckuvg29FsiHFf/exec?action=getVinhos";
        const PLACEHOLDER_IMG = "https://images.unsplash.com/photo-1510812431401-41d2bd2722f3?q=80&w=150&auto=format&fit=crop";

        const getFlag = (paisNome) => {
            if (!paisNome) return 'https://flagcdn.com/w80/un.png';
            const n = paisNome.normalize("NFD").replace(/[\u0300-\u036f]/g, "").toLowerCase().trim();
            const flags = { 
                "argentina": "ar", "chile": "cl", "espanha": "es", "portugal": "pt", 
                "brasil": "br", "franca": "fr", "italia": "it", "africa do sul": "za", 
                "uruguai": "uy", "hungria": "hu", "australia": "au", "alemanha": "de"
            };
            return `https://flagcdn.com/w80/${flags[n] || "un"}.png`;
        };

        async function loadWines() {
            try {
                const response = await fetch(SCRIPT_URL);
                const data = await response.json();
                
                const vinhosProcessados = data.map(v => {
                    const keys = Object.keys(v);
                    const findValue = (matches) => {
                        const keyMatch = keys.find(k => matches.some(p => k.toLowerCase().includes(p)));
                        return keyMatch ? v[keyMatch] : null;
                    };

                    const nome = findValue(['vinho', 'rótulo', 'B']) || "Vinho s/ Nome";
                    const uva = findValue(['uva', 'casta', 'E']) || "Uva s/ info";
                    const pais = findValue(['pais', 'país', 'origem', 'D']) || "Outros";
                    const foto = findValue(['foto', 'imagem', 'link', 'K']) || "";
                    const notaF = parseFloat(findValue(['fellype', 'notaf', 'M']) || 0);
                    const notaH = parseFloat(findValue(['hwlly', 'notah', 'N']) || 0);
                    
                    let mediaExibicao = "-";
                    if (notaF > 0 || notaH > 0) {
                        mediaExibicao = (notaF > 0 && notaH > 0) ? ((notaF + notaH) / 2).toFixed(1) : (notaF || notaH).toFixed(1);
                    }
                    return { nome, pais, uva, foto, media: mediaExibicao };
                });

                const agrupados = vinhosProcessados.reduce((acc, v) => {
                    acc[v.pais] = acc[v.pais] || [];
                    acc[v.pais].push(v);
                    return acc;
                }, {});

                const sortedPaises = Object.keys(agrupados).sort((a, b) => agrupados[b].length - agrupados[a].length);
                render(agrupados, sortedPaises);
            } catch (e) { document.getElementById('loader').innerText = "Erro ao carregar."; }
        }

        function render(grupos, sortedPaises) {
            const main = document.getElementById('main-content');
            document.getElementById('loader').style.display = 'none';
            main.style.display = 'block';
            
            sortedPaises.forEach(pais => {
                const vinhos = grupos[pais];
                const section = document.createElement('div');
                section.className = 'country-group';
                section.innerHTML = `
                    <div class="country-header" onclick="this.parentElement.classList.toggle('active')">
                        <h2><img src="${getFlag(pais)}"> ${pais}</h2>
                        <div style="display:flex; align-items:center; gap:10px;">
                            <span style="font-size:0.8rem; color:var(--subtexto)">${vinhos.length}</span>
                            <i class="fas fa-chevron-down chevron"></i>
                        </div>
                    </div>
                    <div class="country-content">
                        <div class="wine-grid">
                            ${vinhos.map(v => `
                                <div class="wine-card">
                                    <img src="${v.foto || PLACEHOLDER_IMG}" class="wine-img" onerror="this.src='${PLACEHOLDER_IMG}'">
                                    <div class="wine-info">
                                        <h3>${v.nome}</h3>
                                        <p>${v.uva}</p>
                                    </div>
                                    <div class="rating-badge">${v.media === "-" ? "" : "★"} ${v.media}</div>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                `;
                main.appendChild(section);
            });
        }
        loadWines();
    </script>
</body>
</html>
