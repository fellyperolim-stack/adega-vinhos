<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mapa da Adega - Fellype & Hwlly</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --vinho: #800020; --dourado: #d4af37; --bg: #050505; --card: #111; --texto: #e0e0e0;
        }
        body { background: var(--bg); color: var(--texto); font-family: 'Segoe UI', sans-serif; margin: 0; }
        
        /* --- HEADER COM OS SHIBAS --- */
        .shiba-header { display: flex; justify-content: center; gap: 20px; padding: 40px 0 20px; }
        .shiba-header img { width: 80px; height: 80px; border-radius: 50%; border: 2px solid var(--dourado); box-shadow: 0 0 15px rgba(212, 175, 55, 0.3); }
        .map-title { text-align: center; margin-bottom: 40px; }
        .map-title h1 { color: var(--dourado); text-transform: uppercase; letter-spacing: 5px; font-size: 2.2rem; margin: 10px 0; }
        .map-title p { color: #888; font-style: italic; font-size: 0.9rem; }

        .container { max-width: 1100px; margin: 0 auto; padding: 20px; }

        /* --- ACORDEÃO E BANDEIRAS --- */
        .country-block { margin-bottom: 15px; border: 1px solid #222; border-radius: 12px; overflow: hidden; transition: 0.3s; }
        .country-block:hover { border-color: var(--dourado); }
        .country-btn {
            width: 100%; background: #161616; padding: 20px 30px; border: none; cursor: pointer;
            display: flex; justify-content: space-between; align-items: center; color: #fff;
        }
        .country-info { display: flex; align-items: center; gap: 15px; font-size: 1.3rem; font-weight: bold; }
        .flag-icon { width: 32px; border-radius: 4px; box-shadow: 0 0 5px rgba(0,0,0,0.5); }
        .wine-count { background: var(--vinho); color: #fff; padding: 2px 12px; border-radius: 20px; font-size: 0.8rem; }

        .content { max-height: 0; overflow: hidden; transition: max-height 0.5s cubic-bezier(0, 1, 0, 1); background: #0a0a0a; }
        .country-block.open .content { max-height: 5000px; padding: 25px; transition: max-height 1s ease-in; }

        /* --- CARDS DOS VINHOS --- */
        .wine-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 20px; }
        .wine-card { 
            background: var(--card); border-radius: 10px; display: flex; align-items: center; padding: 15px; gap: 15px; 
            border-bottom: 3px solid transparent; transition: 0.3s;
        }
        .wine-card:hover { border-bottom-color: var(--dourado); transform: translateY(-5px); }
        .wine-img { width: 80px; height: 80px; border-radius: 8px; object-fit: cover; background: #000; border: 1px solid #333; }
        .wine-info { flex-grow: 1; }
        .wine-info h3 { margin: 0; font-size: 1.05rem; color: var(--dourado); line-height: 1.3; }
        .wine-info p { margin: 5px 0 0; font-size: 0.85rem; color: #aaa; }
        .rating { text-align: center; background: rgba(212, 175, 55, 0.1); padding: 8px; border-radius: 8px; min-width: 45px; }
        .rating span { display: block; font-size: 1.1rem; font-weight: bold; color: var(--dourado); }
        .rating label { font-size: 0.6rem; text-transform: uppercase; color: #666; }

        #loader { text-align: center; padding: 100px; color: var(--dourado); }
    </style>
</head>
<body>

    <div class="shiba-header">
        <img src="https://i.imgur.com/8N69uY0.png" alt="Leblonzito">
        <img src="https://i.imgur.com/G566qN7.png" alt="Ipanemita">
    </div>

    <div class="map-title">
        <h1>Mapa da Adega</h1>
        <p>Curadoria Inteligente por Leblonzito & Ipanemita</p>
    </div>

    <div class="container">
        <div id="loader"><i class="fas fa-wine-glass-alt fa-spin"></i> Olhando as prateleiras...</div>
        <div id="paises-container"></div>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbxvM8_kK9_BXLAhhEjdmsAIgofCEjWvw-BcPXx4G1GEXeKkJwILDCkckuvg29FsiHFf/exec?action=getVinhos";

        // Mapeamento de bandeiras automático via API de flags
        const getFlag = (pais) => {
            const flags = { "Argentina": "ar", "Chile": "cl", "Espanha": "es", "Portugal": "pt", "Brasil": "br", "França": "fr", "Itália": "it", "África do Sul": "za", "Uruguai": "uy" };
            const code = flags[pais] || "un";
            return `https://flagcdn.com/w80/${code}.png`;
        };

        async function load() {
            try {
                const res = await fetch(API_URL);
                const data = await res.json();
                const paises = {};

                data.forEach(v => {
                    // Mapeamento forçado pelas letras da sua planilha
                    const nome = v.B || v.vinho || "Vinho Desconhecido";
                    const uva = v.E || v.uva || "Uva não informada";
                    const pais = v.D || v.pais || "Outros"; // Ajustado para D/E conforme a lógica de países
                    const foto = v.K || v.foto || "";
                    const nF = parseFloat(v.M) || 0;
                    const nH = parseFloat(v.N) || 0;
                    const media = (nF > 0 && nH > 0) ? ((nF + nH) / 2).toFixed(1) : (nF || nH || "0.0");

                    if (!paises[pais]) paises[pais] = [];
                    paises[pais].push({ nome, uva, foto, media });
                });

                // Ordenar: Países com MAIS vinhos primeiro
                const sortedPaises = Object.keys(paises).sort((a, b) => paises[b].length - paises[a].length);
                render(paises, sortedPaises);
            } catch (e) { document.getElementById('loader').innerHTML = "Erro ao conectar com a planilha."; }
        }

        function render(paises, sortedKeys) {
            const container = document.getElementById('paises-container');
            document.getElementById('loader').style.display = 'none';

            sortedKeys.forEach(pais => {
                const vinhos = paises[pais];
                const div = document.createElement('div');
                div.className = 'country-block';
                div.innerHTML = `
                    <button class="country-btn" onclick="this.parentElement.classList.toggle('open')">
                        <div class="country-info">
                            <img src="${getFlag(pais)}" class="flag-icon">
                            ${pais} <span class="wine-count">${vinhos.length}</span>
                        </div>
                        <i class="fas fa-chevron-down"></i>
                    </button>
                    <div class="content">
                        <div class="wine-grid">
                            ${vinhos.map(v => `
                                <div class="wine-card">
                                    <img src="${v.foto || 'https://i.imgur.com/A6D3v6p.png'}" class="wine-img" onerror="this.src='https://i.imgur.com/A6D3v6p.png'">
                                    <div class="wine-info">
                                        <h3>${v.nome}</h3>
                                        <p><i class="fas fa-seedling"></i> ${v.uva}</p>
                                    </div>
                                    <div class="rating">
                                        <span>${v.media}</span>
                                        <label>Média</label>
                                    </div>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                `;
                container.appendChild(div);
            });
        }
        load();
    </script>
</body>
</html>
