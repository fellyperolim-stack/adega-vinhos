<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mapa da Adega - Fellype & Hwlly</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --vinho-escuro: #1a0a0a; --vinho-medio: #2d0a0a; --dourado: #d4af37;
            --texto: #e0e0e0; --bg: #050505; --card: #121212;
        }

        body {
            background-color: var(--bg); color: var(--texto);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0;
        }

        /* --- NAVBAR --- */
        .navbar {
            background: #000; padding: 15px 5%; display: flex; justify-content: space-between;
            align-items: center; border-bottom: 1px solid #222; position: sticky; top: 0; z-index: 100;
        }
        .nav-logo { color: var(--dourado); font-weight: bold; font-size: 1.2rem; text-decoration: none; }
        .nav-links { list-style: none; display: flex; gap: 20px; margin: 0; }
        .nav-links a { color: #888; text-decoration: none; font-size: 0.85rem; text-transform: uppercase; transition: 0.3s; }
        .nav-links a:hover, .nav-links a.active { color: var(--dourado); }

        /* --- CONTAINER --- */
        .container { max-width: 1100px; margin: 40px auto; padding: 0 20px; }
        .title-section { text-align: center; margin-bottom: 50px; }
        .title-section h1 { color: var(--dourado); letter-spacing: 4px; text-transform: uppercase; font-size: 2rem; margin-bottom: 10px; }
        .title-section p { color: #666; font-style: italic; }

        /* --- ACORDEÃO --- */
        .country-block { margin-bottom: 12px; border: 1px solid #1a1a1a; border-radius: 8px; overflow: hidden; }
        .country-btn {
            width: 100%; background: #111; padding: 18px 25px; border: none;
            display: flex; justify-content: space-between; align-items: center;
            cursor: pointer; transition: 0.3s; border-left: 4px solid transparent;
        }
        .country-btn:hover { background: #181818; border-left-color: var(--dourado); }
        .country-btn h2 { margin: 0; font-size: 1.1rem; color: #fff; display: flex; align-items: center; gap: 12px; }
        .country-btn .badge { background: var(--vinho-medio); color: var(--dourado); padding: 2px 10px; border-radius: 12px; font-size: 0.8rem; }
        
        .content { max-height: 0; overflow: hidden; transition: max-height 0.4s ease-out; background: #080808; }
        .country-block.open .content { max-height: 3000px; padding: 20px; }
        .country-block.open .fa-chevron-down { transform: rotate(180deg); transition: 0.3s; }

        /* --- GRID --- */
        .wine-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 15px; }
        .wine-card {
            background: var(--card); border-radius: 10px; display: flex; align-items: center;
            padding: 12px; gap: 15px; border: 1px solid #1f1f1f;
        }
        .wine-img { width: 70px; height: 70px; border-radius: 6px; object-fit: cover; background: #000; border: 1px solid #333; }
        .wine-details { flex-grow: 1; }
        .wine-details h3 { margin: 0; font-size: 1rem; color: #fff; }
        .wine-details p { margin: 4px 0 0; font-size: 0.8rem; color: #777; }
        .media-nota { background: rgba(212, 175, 55, 0.1); color: var(--dourado); padding: 5px 8px; border-radius: 4px; font-weight: bold; font-size: 0.9rem; }

        #loading { text-align: center; color: var(--dourado); margin-top: 100px; }
    </style>
</head>
<body>

    <nav class="navbar">
        <a href="index.html" class="nav-logo">FELLYPE & HWLLY</a>
        <ul class="nav-links">
            <li><a href="index.html">Página Inicial</a></li>
            <li><a href="vinhos.html">Últimos Vinhos</a></li>
            <li><a href="escolhidos.html">Escolhidos Mês</a></li>
            <li><a href="cadastrar.html">Cadastrar Novo</a></li>
            <li><a href="paises.html" class="active">Explorar ▼</a></li>
        </ul>
    </nav>

    <div class="container">
        <div class="title-section">
            <h1>Mapa da Adega</h1>
            <p>Clique no país para expandir os rótulos registrados</p>
        </div>

        <div id="loading"><i class="fas fa-spinner fa-spin"></i> Consultando registros na planilha...</div>
        <div id="paises-container"></div>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbxvM8_kK9_BXLAhhEjdmsAIgofCEjWvw-BcPXx4G1GEXeKkJwILDCkckuvg29FsiHFf/exec?action=getVinhos";

        async function fetchVinhos() {
            try {
                const response = await fetch(API_URL);
                const rawData = await response.json();
                
                // Agrupamento por país
                const paises = {};

                rawData.forEach(item => {
                    // Mapeamento dinâmico para evitar erro de nome de coluna
                    const nome = item.vinho || item.wineName || item.Vinho || "Vinho sem nome";
                    const uva = item.uva || item.Uva || "Uva não informada";
                    const pais = item.pais || item.Pais || item.País || "Outros";
                    const foto = item.foto || item.Foto || item.Link || "";
                    
                    // Cálculo da média (Fellype + Hwlly / 2)
                    const nF = parseFloat(item.notaFellype || item.notF || item.M || 0);
                    const nH = parseFloat(item.notaHwlly || item.notH || item.N || 0);
                    const media = (nF > 0 && nH > 0) ? ((nF + nH) / 2).toFixed(1) : (nF || nH || "0.0");

                    if (!paises[pais]) paises[pais] = [];
                    paises[pais].push({ nome, uva, foto, media });
                });

                renderPaises(paises);
            } catch (error) {
                document.getElementById('loading').innerHTML = "Erro ao carregar dados. Verifique a conexão.";
            }
        }

        function renderPaises(paises) {
            const container = document.getElementById('paises-container');
            document.getElementById('loading').style.display = 'none';

            // Ordenar países alfabeticamente
            const nomesPaises = Object.keys(paises).sort();

            nomesPaises.forEach(nomePais => {
                const vinhos = paises[nomePais];
                const bloco = document.createElement('div');
                bloco.className = 'country-block';
                
                bloco.innerHTML = `
                    <button class="country-btn" onclick="toggleBlock(this)">
                        <h2><i class="fas fa-wine-bottle"></i> ${nomePais} <span class="badge">${vinhos.length}</span></h2>
                        <i class="fas fa-chevron-down" style="color: #444;"></i>
                    </button>
                    <div class="content">
                        <div class="wine-grid">
                            ${vinhos.map(v => `
                                <div class="wine-card">
                                    <img src="${v.foto || 'https://via.placeholder.com/80/1a0a0a/d4af37?text=🍷'}" class="wine-img" onerror="this.src='https://via.placeholder.com/80/1a0a0a/d4af37?text=🍷'">
                                    <div class="wine-details">
                                        <h3>${v.nome}</h3>
                                        <p>${v.uva}</p>
                                    </div>
                                    <div class="media-nota">★ ${v.media}</div>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                `;
                container.appendChild(bloco);
            });
        }

        function toggleBlock(btn) {
            const block = btn.parentElement;
            block.classList.toggle('open');
        }

        fetchVinhos();
    </script>
</body>
</html>
