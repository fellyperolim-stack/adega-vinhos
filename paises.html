<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adega por Nações | Fellype & Hwlly 🍷</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #d4af37; --wine: #4a0e0e; --black: #050505;
            --glass: rgba(255, 255, 255, 0.05); --glass-border: rgba(255, 255, 255, 0.1);
        }
        body { 
            margin: 0; font-family: 'Outfit', sans-serif; background: var(--black); color: #fff; 
            background-image: radial-gradient(circle at 50% -20%, #2a0a0a 0%, #050505 80%);
            background-attachment: fixed;
        }

        /* Header Estilizado com os Dogs */
        .header-nations {
            padding: 50px 20px; text-align: center; background: rgba(0,0,0,0.6);
            border-bottom: 1px solid var(--gold);
        }
        .shiba-mini { width: 45px; height: 45px; border-radius: 50%; border: 2px solid var(--gold); object-fit: cover; }
        h1 { font-family: 'Cinzel', serif; color: var(--gold); margin: 15px 0 5px; font-size: 26px; letter-spacing: 2px; }
        
        .container { max-width: 1100px; margin: 0 auto; padding: 30px 20px; }

        /* Accordion / Seção por País */
        .country-group { margin-bottom: 40px; animation: fadeIn 0.8s ease; }
        .country-label { 
            display: flex; align-items: center; justify-content: space-between;
            padding: 15px 25px; background: var(--wine); border-radius: 15px;
            border: 1px solid var(--gold); box-shadow: 0 10px 20px rgba(0,0,0,0.3);
            margin-bottom: 20px;
        }
        .country-label h2 { font-family: 'Cinzel', serif; margin: 0; font-size: 20px; color: var(--gold); }
        .badge-count { background: #fff; color: var(--wine); padding: 2px 10px; border-radius: 8px; font-weight: 800; font-size: 14px; }

        /* Grid de Mini Cards */
        .wine-shelf { 
            display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; 
        }

        .wine-item {
            background: var(--glass); border: 1px solid var(--glass-border); border-radius: 20px;
            padding: 15px; display: flex; align-items: center; gap: 15px; backdrop-filter: blur(10px);
            transition: 0.3s;
        }
        .wine-item:hover { border-color: var(--gold); background: rgba(255,255,255,0.08); transform: scale(1.02); }

        .wine-thumb { width: 70px; height: 70px; border-radius: 12px; object-fit: cover; border: 1px solid var(--glass-border); }
        
        .wine-details { flex-grow: 1; }
        .wine-name { font-family: 'Cinzel', serif; font-size: 16px; color: #fff; margin-bottom: 4px; }
        .wine-sub { font-size: 12px; color: #aaa; }

        .score-pill { 
            background: rgba(212, 175, 55, 0.1); border: 1px solid var(--gold); 
            color: var(--gold); padding: 4px 8px; border-radius: 8px; font-size: 12px; font-weight: 700;
        }

        .btn-float {
            position: fixed; bottom: 30px; left: 30px; background: var(--gold); color: #000;
            padding: 15px 25px; border-radius: 30px; text-decoration: none; font-weight: 700;
            box-shadow: 0 5px 15px rgba(212, 175, 55, 0.3); z-index: 100; font-size: 14px;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <a href="catalogo.html" class="btn-float">← VOLTAR À LISTA GERAL</a>

    <div class="header-nations">
        <div style="display:flex; justify-content:center; gap:10px">
            <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcS-TifEdyk31bue7ksGITNEiUrtAvl4H7_1V_UFojtvIA&s=10" class="shiba-mini">
            <img src="https://ih1.redbubble.net/image.4410098886.0898/bg,f8f8f8-flat,750x,075,f-pad,750x1000,f8f8f8.jpg" class="shiba-mini">
        </div>
        <h1>MAPA DA ADEGA</h1>
        <p style="color:#888; font-size: 13px;">Exploração por Origem e Terroir</p>
    </div>

    <div class="container" id="nations-container">
        <div style="text-align:center; padding:50px; color:var(--gold)">Consultando registros...</div>
    </div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxvM8_kK9_BXLAhhEjdmsAIgofCEjWvw-BcPXx4G1GEXeKkJwILDCkckuvg29FsiHFf/exec?action=getVinhos";

        async function loadNations() {
            try {
                const response = await fetch(SCRIPT_URL);
                const vinhos = await response.json();
                
                // Agrupar por país
                const grupos = vinhos.reduce((acc, v) => {
                    const p = v.pais || "Não Informado";
                    if (!acc[p]) acc[p] = [];
                    acc[p].push(v);
                    return acc;
                }, {});

                render(grupos);
            } catch (e) {
                document.getElementById('nations-container').innerHTML = "Erro ao carregar dados.";
            }
        }

        function render(grupos) {
            const container = document.getElementById('nations-container');
            container.innerHTML = '';

            Object.keys(grupos).sort().forEach(pais => {
                const vinhos = grupos[pais];
                const section = document.createElement('div');
                section.className = 'country-group';

                section.innerHTML = `
                    <div class="country-label">
                        <h2>${pais}</h2>
                        <span class="badge-count">${vinhos.length}</span>
                    </div>
                    <div class="wine-shelf">
                        ${vinhos.map(v => `
                            <div class="wine-item">
                                <img src="${v.foto || 'https://via.placeholder.com/100'}" class="wine-thumb">
                                <div class="wine-details">
                                    <div class="wine-name">${v.wineName}</div>
                                    <div class="wine-sub">${v.uva} | ${v.year}</div>
                                </div>
                                <div class="score-pill">★ ${((parseFloat(v.notF) + parseFloat(v.notH))/2).toFixed(1)}</div>
                            </div>
                        `).join('')}
                    </div>
                `;
                container.appendChild(section);
            });
        }

        loadNations();
    </script>
</body>
</html>
